<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habla — Espanhol A1–C2</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C62828;--red-dark:#b71c1c;--red-light:#ffebee;
  --yellow:#FBC02D;--yellow-dark:#F57F17;--yellow-light:#fff8e1;
  --bg:#F5F5F5;--white:#FFFFFF;--text:#333333;--text-muted:#757575;
  --border:#E0E0E0;--shadow:0 2px 12px rgba(0,0,0,.08);
}
h1,h2,h3,h4,.badge,.score,.student-overall,.level-tab,
.nav-btn,.complete-btn,.check-btn,.choice-btn,
.t-nav-btn,.logout-btn{font-family:'Poppins',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F5F5F5;color:#333333;min-height:100vh}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#C62828,#e53935)}
.login-box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.2);text-align:center}
.login-box h1{font-size:1.8rem;color:#C62828;margin-bottom:6px}
.login-box p{color:#757575;margin-bottom:28px}
.login-choice{display:flex;gap:14px;margin-bottom:24px}
.choice-btn{flex:1;padding:18px 10px;border:2px solid #e2e8f0;border-radius:12px;background:#FFFFFF;cursor:pointer;font-size:.95rem;font-weight:600;color:#374151;transition:.2s}
.choice-btn:hover,.choice-btn.active{border-color:#C62828;background:#fff8e1;color:#C62828}
.choice-btn.teacher-choice:hover,.choice-btn.teacher-choice.active{border-color:#F57F17;background:#fff8e1;color:#F57F17}
.login-form{display:none}
.login-form.show{display:block}
.login-form input{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:12px 16px;font-size:1rem;margin-bottom:12px;outline:none;transition:.2s}
.login-form input:focus{border-color:#C62828}
.login-form button{width:100%;background:#C62828;color:#fff;border:none;padding:13px;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:.2s}
.login-form button:hover{background:#b71c1c}
.login-form.teacher-form button{background:#FBC02D}
.login-form.teacher-form button:hover{background:#F57F17}
.login-error{color:#ef4444;font-size:.85rem;margin-top:6px;display:none}
.login-error.show{display:block}

/* NAV */
#topbar{background:linear-gradient(135deg,#C62828,#e53935);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#topbar h1{font-size:1.2rem;font-weight:700;cursor:pointer}
#topbar h1 span{color:#93c5fd}
.user-badge{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:.82rem}
.level-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.level-tab{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:.82rem;transition:.2s}
.level-tab:hover,.level-tab.active{background:#fff;color:#C62828;font-weight:600}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:.82rem;transition:.2s}
.logout-btn:hover{background:rgba(255,255,255,.3)}

/* HOME */
/* HOME v2 */
.home-greeting{background:linear-gradient(135deg,#C62828,#e53935);color:#fff;border-radius:16px;padding:26px 28px;margin-bottom:20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.home-greeting-text h2{font-family:'Poppins',sans-serif;font-size:1.45rem;margin-bottom:3px}
.home-greeting-text p{font-size:.88rem;opacity:.88}
.home-greeting-avatar{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;flex-shrink:0}
.home-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:24px}
.home-card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);border-top:3px solid;transition:.2s}
.home-card.clickable{cursor:pointer}
.home-card.clickable:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.home-card-label{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.home-card-title{font-size:.97rem;font-weight:700;color:#1a1a2e;margin-bottom:3px;line-height:1.35}
.home-card-sub{font-size:.78rem;color:#6b7280;margin-bottom:12px;line-height:1.5}
.home-card-action{display:inline-block;font-size:.78rem;font-weight:700;padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Poppins',sans-serif;transition:.15s;text-decoration:none}
.home-card-progress{height:8px;background:#F5F5F5;border-radius:5px;overflow:hidden;margin-bottom:8px}
.home-card-progress-fill{height:100%;border-radius:5px;transition:.6s}
.home-card-pct{font-size:1.6rem;font-weight:800;line-height:1;margin-bottom:4px}
/* HOME legacy */
.hero{text-align:center;padding:36px 20px;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:28px}
.hero h2{font-size:1.9rem;color:#C62828;margin-bottom:8px}
.hero p{color:#4a5568}
.level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.level-card{background:#fff;border-radius:12px;padding:22px 14px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:.2s;border-top:4px solid}
.level-card:hover{transform:translateY(-4px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.lc-a1{border-color:#10b981}.lc-a2{border-color:#3b82f6}.lc-b1{border-color:#8b5cf6}.lc-b2{border-color:#f59e0b}.lc-c1{border-color:#ef4444}.lc-c2{border-color:#ec4899}
.level-card .badge{font-size:2rem;font-weight:800;margin-bottom:6px}
.lc-a1 .badge{color:#10b981}.lc-a2 .badge{color:#3b82f6}.lc-b1 .badge{color:#8b5cf6}.lc-b2 .badge{color:#f59e0b}.lc-c1 .badge{color:#ef4444}.lc-c2 .badge{color:#ec4899}
.level-card h3{font-size:.9rem;color:#2d3748;margin-bottom:3px}
.level-card p{font-size:.78rem;color:#718096}
.progress-bar{height:7px;background:#e2e8f0;border-radius:4px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#C62828,#FBC02D);border-radius:4px;transition:.5s}

/* MODULE LIST */
#module-list{max-width:860px;margin:28px auto;padding:0 16px}
.back-btn{background:none;border:none;color:#C62828;cursor:pointer;font-size:.92rem;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.back-btn:hover{text-decoration:underline}
.level-header{background:#fff;border-radius:12px;padding:18px 22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.level-header h2{font-size:1.3rem;color:#C62828}
.level-header p{color:#4a5568;margin-top:4px;font-size:.9rem}
.module-grid{display:grid;gap:9px}
.module-item{background:#fff;border-radius:10px;padding:14px 18px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.06);display:flex;align-items:center;gap:12px;transition:.2s}
.module-item:hover{background:#fff8e1;border-left:4px solid #C62828}
.module-num{background:#ffebee;color:#C62828;font-weight:700;font-size:.78rem;padding:4px 10px;border-radius:20px;white-space:nowrap}
.module-item h3{font-size:.92rem;color:#2d3748;flex:1}
.module-done{margin-left:auto;color:#10b981;font-size:1rem;font-weight:700}

/* MODULE CONTENT */
#module-content{max-width:820px;margin:22px auto;padding:0 16px}
.module-card{background:#fff;border-radius:14px;padding:26px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:18px}
.module-card h2{font-size:1.35rem;color:#C62828;margin-bottom:6px}
.module-tag{display:inline-block;background:#ffebee;color:#C62828;font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:12px;margin-bottom:14px}
p{line-height:1.7;color:#374151;margin-bottom:10px}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.88rem}
th{background:#333333;color:#fff;padding:8px 12px;text-align:left}
td{padding:8px 12px;border-bottom:1px solid #e2e8f0}
tr:nth-child(even) td{background:#FFFFFF}
.example-box{background:#f0fdf4;border-left:4px solid #10b981;padding:11px 15px;border-radius:0 8px 8px 0;margin:10px 0;font-size:.9rem}
.tip-box{background:#fffbeb;border-left:4px solid #f59e0b;padding:11px 15px;border-radius:0 8px 8px 0;margin:10px 0;font-size:.9rem}

/* EXERCISES */
.exercise-section{background:#FFFFFF;border-radius:12px;padding:18px;margin-top:18px}
.exercise-section h3{font-size:.95rem;font-weight:700;color:#2d3748;margin-bottom:14px}
.ex-item{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ex-item p{font-weight:500;margin-bottom:10px;color:#333333}
.options{display:flex;flex-direction:column;gap:7px}
.opt-btn{background:#F5F5F5;border:2px solid #e2e8f0;border-radius:8px;padding:9px 13px;text-align:left;cursor:pointer;font-size:.88rem;transition:.2s}
.opt-btn:hover{border-color:#C62828;background:#fff8e1}
.opt-btn.correct{background:#dcfce7;border-color:#10b981;color:#065f46}
.opt-btn.wrong{background:#fee2e2;border-color:#ef4444;color:#7f1d1d}
.fill-input{border:2px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:.88rem;width:100%;max-width:300px;margin-bottom:8px;outline:none}
.fill-input:focus{border-color:#C62828}
.fill-input.correct{border-color:#10b981;background:#dcfce7}
.fill-input.wrong{border-color:#ef4444;background:#fee2e2}
.check-btn{background:#C62828;color:#fff;border:none;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:.86rem;margin-top:4px}
.check-btn:hover{background:#b71c1c}
.feedback{font-size:.86rem;margin-top:8px;padding:6px 10px;border-radius:6px;display:none}
.feedback.show{display:block}
.feedback.ok{background:#dcfce7;color:#065f46}
.feedback.no{background:#fee2e2;color:#7f1d1d}

/* NAV BTNS */
.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:22px;flex-wrap:wrap;gap:10px}
.nav-btn{background:#C62828;color:#fff;border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-size:.88rem;transition:.2s}
.nav-btn:hover{background:#b71c1c}
.nav-btn.secondary{background:#e2e8f0;color:#374151}
.nav-btn.secondary:hover{background:#cbd5e1}
.nav-btn.home-btn{background:#C62828;color:#fff}
.nav-btn.home-btn:hover{background:#b71c1c}
.complete-btn{background:#10b981;color:#fff;border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-size:.88rem;transition:.2s}
.complete-btn:hover{background:#059669}
.complete-btn.done{background:#fff;color:#10b981;border:2px solid #10b981;font-weight:700}

/* RESULTS */
.results-summary{border-radius:12px;padding:14px 18px;margin-top:14px;display:none}
.results-summary.show{display:block}
.results-summary h4{font-size:.95rem;margin-bottom:6px}
.results-summary .score{font-size:1.7rem;font-weight:800}
.results-summary p{font-size:.88rem;margin-top:4px}
.auto-saved-badge{border-radius:8px;padding:5px 12px;font-size:.82rem;font-weight:600;display:inline-block;margin-top:6px;background:#dcfce7;color:#065f46}

/* TEACHER NOTE (visível para aluno) */
.teacher-note-box{background:#fff8e1;border-left:4px solid #FBC02D;border-radius:0 10px 10px 0;padding:14px 16px;margin-top:14px}
.teacher-note-box h4{color:#C62828;font-size:.88rem;font-weight:700;margin-bottom:6px}
.teacher-note-box p{color:#374151;font-size:.9rem;margin:0}
.teacher-note-box .note-meta{font-size:.78rem;color:#6b7280;margin-top:4px}

/* TEACHER AREA */
#teacher-area{display:none}
.teacher-topbar{background:linear-gradient(135deg,#F57F17,#FBC02D);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.teacher-topbar h1{font-size:1.2rem;font-weight:700}
.teacher-topbar h1 span{color:#FBC02D}
.t-content{max-width:960px;margin:28px auto;padding:0 16px}
.t-section-title{font-size:1.2rem;font-weight:700;color:#F57F17;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #e0e7ff}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:28px}
.student-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;transition:.2s;border-top:3px solid #C62828}
.student-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.12)}
.student-card h3{font-size:1rem;color:#C62828;margin-bottom:6px}
.student-card p{font-size:.82rem;color:#718096}
.student-overall{font-size:1.4rem;font-weight:800;color:#F57F17;margin-bottom:4px}
.t-back-btn{background:none;border:none;color:#FBC02D;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:6px}
.t-back-btn:hover{text-decoration:underline}

/* STUDENT DETAIL (teacher view) */
.student-detail-header{background:#fff;border-radius:12px;padding:18px 22px;margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.student-detail-header h2{font-size:1.3rem;color:#F57F17}
.level-block{background:#fff;border-radius:12px;padding:18px 22px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.level-block h3{font-size:1rem;color:#C62828;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.mod-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;flex-wrap:wrap}
.mod-row:last-child{border-bottom:none}
.mod-info{flex:1;min-width:160px}
.mod-info h4{font-size:.88rem;color:#2d3748;margin-bottom:2px}
.mod-answers{font-size:.78rem;color:#718096}
.mod-status-done{background:#dcfce7;color:#065f46;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.mod-status-pending{background:#fef3c7;color:#92400e;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.unlock-btn{background:#FBC02D;color:#fff;border:none;padding:5px 13px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:600;transition:.2s}
.unlock-btn:hover{background:#F57F17}
.revoke-btn{background:none;border:1px solid #d1d5db;color:#6b7280;padding:4px 10px;border-radius:7px;cursor:pointer;font-size:.74rem;transition:.2s}
.revoke-btn:hover{border-color:#ef4444;color:#ef4444}
.teacher-unlocked-badge{font-size:.72rem;font-weight:700;color:#F57F17;background:#fff8e1;padding:2px 9px;border-radius:10px}
.note-area{flex:1;min-width:200px}
.note-textarea{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:.82rem;resize:vertical;min-height:60px;font-family:inherit;outline:none;transition:.2s}
.note-textarea:focus{border-color:#F57F17}
.save-note-btn{background:#FBC02D;color:#fff;border:none;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:.8rem;margin-top:5px;transition:.2s}
.save-note-btn:hover{background:#F57F17}
.note-saved-label{color:#10b981;font-size:.78rem;margin-top:4px;display:none}
.answers-detail{font-size:.78rem;margin-top:4px}
.ans-correct{color:#065f46;background:#dcfce7;padding:2px 7px;border-radius:4px;display:inline-block;margin:2px;font-size:.75rem}
.ans-wrong{color:#7f1d1d;background:#fee2e2;padding:2px 7px;border-radius:4px;display:inline-block;margin:2px;font-size:.75rem}

/* TEACHER — ver exercícios do aluno */
.mod-exercises-toggle{background:none;border:1px solid #e0e7ff;color:#C62828;font-size:.78rem;padding:4px 11px;border-radius:6px;cursor:pointer;margin-top:6px;transition:.2s}
.mod-exercises-toggle:hover{background:#fff8e1}
.teacher-exercises{margin-top:10px;display:none;border-top:1px solid #f1f5f9;padding-top:10px}
.teacher-exercises.open{display:block}
.t-ex-row{padding:8px 10px;border-radius:8px;margin-bottom:6px;border:1px solid #f1f5f9}
.t-ex-row.t-ex-ok{background:#f0fdf4;border-color:#bbf7d0}
.t-ex-row.t-ex-fail{background:#fff1f2;border-color:#fecdd3}
.t-ex-row.t-ex-unanswered{background:#FFFFFF;border-color:#e2e8f0;opacity:.7}
.t-ex-question{font-size:.83rem;color:#333333;font-weight:600;margin-bottom:5px;line-height:1.4}
.t-ex-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:.76rem;align-items:center}
.t-ex-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;opacity:.7;margin-right:2px}
.t-ex-student-ok{background:#dcfce7;color:#065f46;padding:3px 9px;border-radius:4px;font-weight:600}
.t-ex-student-fail{background:#fee2e2;color:#7f1d1d;padding:3px 9px;border-radius:4px;font-weight:600}
.t-ex-correct-ans{background:#fff8e1;color:#F57F17;padding:3px 9px;border-radius:4px;font-weight:600}
.t-ex-unanswered-tag{background:#e2e8f0;color:#64748b;padding:3px 9px;border-radius:4px}

/* LOCK */
.mod-locked{opacity:.55;cursor:not-allowed!important}
.mod-locked:hover{background:#fff!important;transform:none!important;border-left:none!important}
.lock-icon{color:#94a3b8;font-size:1rem;margin-left:auto;flex-shrink:0}
.unlock-hint{font-size:.71rem;color:#f59e0b;margin-top:2px;font-weight:500}

/* SKILL CHIPS */
.skill-chip{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-right:4px;margin-bottom:4px}

/* SKILL PROFILE BARS */
.sp-profile{display:flex;flex-direction:column;gap:6px}
.sp-row{display:flex;align-items:center;gap:8px}
.sp-label{font-size:.74rem;color:#4b5563;width:95px;flex-shrink:0;text-align:right}
.sp-bar{flex:1;height:9px;background:#e2e8f0;border-radius:5px;overflow:hidden}
.sp-fill{height:100%;border-radius:5px;transition:.5s}
.sp-pct{font-size:.72rem;font-weight:700;width:38px;text-align:right}

/* CONTINUE BANNER */
.continue-banner{background:#fff8e1;border:2px solid #bfdbfe;border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}

/* REINFORCEMENT QUIZ */
.reinforcement-box{background:#fff8e1;border:2px solid #FBC02D;border-radius:12px;padding:16px 18px;margin-top:14px}
.reinforcement-box h4{color:#F57F17;font-size:.95rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.reinforcement-tag{display:inline-block;background:#fef3c7;color:#92400e;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-right:4px}
.rein-mod-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #fde68a}
.rein-mod-row:last-child{border-bottom:none}

/* ADAPTIVE PATH */
.adaptive-path{background:#fff;border-radius:14px;padding:18px 22px;margin-bottom:22px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.adaptive-path h3{font-size:.93rem;font-weight:700;color:#C62828;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.path-steps{display:flex;flex-direction:column;gap:8px}
.path-step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:.18s;border:1.5px solid transparent}
.path-step:hover{transform:translateX(3px)}
.path-step-next{background:#fff8e1;border-color:#FBC02D}
.path-step-weak{background:#fff7ed;border-color:#fed7aa}
.path-step-upcoming{background:#FFFFFF;border-color:#e2e8f0}
.path-step-done{background:#f0fdf4;border-color:#bbf7d0;opacity:.7;cursor:default}
.path-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;flex-shrink:0}
.path-info{flex:1}
.path-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.path-title{font-size:.88rem;font-weight:600;color:#C62828}
.path-meta{font-size:.73rem;color:#718096;margin-top:1px}
.path-arrow{font-size:1rem;color:#94a3b8}

/* TEACHER NAV */
.teacher-nav{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.t-nav-btn{background:#fff8e1;color:#F57F17;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s}
.t-nav-btn:hover,.t-nav-btn.active{background:#FBC02D;color:#fff}

/* GERADOR DE SUGESTÕES */
.sug-panel{background:linear-gradient(135deg,#fff8e1,#ffebee);border:2px solid #FBC02D;border-radius:14px;padding:18px 22px;margin-bottom:18px}
.sug-panel-title{font-size:.92rem;font-weight:800;color:#F57F17;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.sug-panel-sub{font-size:.78rem;color:#F57F17;margin-bottom:14px}
.sug-gen-form{background:#fff;border-radius:11px;padding:16px 18px;border:1.5px solid #E0E0E0;margin-bottom:14px}
.sug-field{margin-bottom:11px}
.sug-label{font-size:.71rem;font-weight:800;color:#C62828;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sug-select{width:100%;border:1.5px solid #E0E0E0;border-radius:8px;padding:8px 11px;font-size:.86rem;font-family:inherit;outline:none;background:#fff;transition:.2s}
.sug-select:focus{border-color:#F57F17}
.sug-input{width:100%;border:1.5px solid #ddd6fe;border-radius:8px;padding:8px 11px;font-size:.86rem;font-family:inherit;outline:none;background:#fff;transition:.2s;box-sizing:border-box}
.sug-input:focus{border-color:#F57F17}
.sug-card{background:#fff;border-radius:12px;border:1.5px solid #ddd6fe;margin-bottom:10px;overflow:hidden;transition:.15s}
.sug-card:hover{border-color:#FBC02D;box-shadow:0 3px 12px rgba(124,58,237,.1)}
.sug-card-header{padding:13px 16px 10px;display:flex;align-items:flex-start;gap:10px}
.sug-reason{font-size:.69rem;font-weight:800;padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.sug-card-title{font-size:.91rem;font-weight:700;color:#C62828;margin-bottom:3px}
.sug-card-why{font-size:.77rem;color:#F57F17;line-height:1.5}
.sug-card-blocks{display:flex;gap:5px;flex-wrap:wrap;padding:0 16px 8px}
.sug-card-footer{padding:10px 16px;border-top:1px solid #f5f3ff;display:flex;gap:7px;flex-wrap:wrap}
.sug-btn{border:none;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:700;transition:.15s}
.auto-sug-banner{background:#fff8e1;border:1.5px solid #FBC02D;border-radius:12px;padding:14px 17px;margin-bottom:14px}
.auto-sug-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none}

/* BANCO DE ATIVIDADES */
.bank-card{background:#fff;border-radius:13px;border:1.5px solid #e2e8f0;overflow:hidden;margin-bottom:11px;transition:.15s}
.bank-card:hover{border-color:#C62828;box-shadow:0 3px 14px rgba(198,40,40,.1)}
.bank-card-header{padding:14px 17px 10px;display:flex;align-items:flex-start;gap:11px}
.bank-card-info{flex:1;min-width:0}
.bank-card-title{font-size:.94rem;font-weight:700;color:#C62828;margin-bottom:4px}
.bank-card-desc{font-size:.79rem;color:#6b7280;line-height:1.5}
.bank-card-blocks{display:flex;gap:5px;flex-wrap:wrap;padding:0 17px 10px}
.bank-block-chip{font-size:.67rem;font-weight:700;padding:2px 8px;border-radius:8px}
.bank-card-footer{padding:10px 17px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.bank-tag{font-size:.68rem;background:#F5F5F5;color:#475569;padding:2px 8px;border-radius:8px;font-weight:600}
.bank-card-btns{display:flex;gap:6px}
.bank-btn{border:none;padding:6px 13px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:700;transition:.15s}
.send-panel{background:#f0fdf4;border:2px solid #86efac;border-radius:0 0 12px 12px;padding:16px 18px}
.send-student-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #dcfce7;cursor:pointer;font-size:.84rem;color:#C62828}
.send-student-row:last-child{border-bottom:none}
.send-student-row input{accent-color:#C62828;cursor:pointer}
.bank-form{background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.09);overflow:hidden;margin-bottom:20px}
.bank-form-header{padding:16px 22px 12px;border-bottom:2px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.bank-form-header h3{font-size:.98rem;font-weight:700;color:#C62828;display:flex;align-items:center;gap:8px}
.bb-input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:.86rem;font-family:inherit;outline:none;box-sizing:border-box;transition:.2s;background:#fff}
.bb-input:focus{border-color:#C62828;box-shadow:0 0 0 3px rgba(198,40,40,.1)}
.bb-ta{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:.86rem;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;transition:.2s;background:#fff}
.bb-ta:focus{border-color:#C62828;box-shadow:0 0 0 3px rgba(198,40,40,.1)}
.bb-block-card{border-radius:11px;padding:13px 15px;margin-bottom:9px;position:relative}

/* AULAS */
.lesson-card{background:#fff;border-radius:13px;border:1.5px solid #e2e8f0;padding:0;overflow:hidden;margin-bottom:11px;transition:.15s;cursor:pointer}
.lesson-card:hover{border-color:#C62828;box-shadow:0 3px 14px rgba(198,40,40,.1);transform:translateY(-1px)}
.lesson-card-header{display:flex;align-items:center;gap:11px;padding:14px 17px}
.lesson-type-badge{font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.ltb-apostila{background:#fff8e1;color:#1d4ed8}
.ltb-personalizada{background:#fdf4ff;color:#9333ea}
.lesson-card-title{font-size:.92rem;font-weight:700;color:#C62828;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-card-date{font-size:.74rem;color:#94a3b8;flex-shrink:0}
.lesson-card-meta{display:flex;gap:8px;padding:0 17px 12px;flex-wrap:wrap}
.lesson-meta-pill{font-size:.7rem;background:#F5F5F5;color:#475569;padding:2px 9px;border-radius:10px;font-weight:600;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-form{background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.09);overflow:hidden;margin-bottom:20px}
.lesson-form-header{padding:18px 22px 14px;border-bottom:2px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.lesson-form-header h3{font-size:1rem;font-weight:700;color:#C62828;display:flex;align-items:center;gap:8px}
.lesson-type-toggle{display:flex;gap:0;border:2px solid #e2e8f0;border-radius:10px;overflow:hidden}
.ltt-btn{background:#FFFFFF;color:#64748b;border:none;padding:7px 16px;cursor:pointer;font-size:.81rem;font-weight:700;transition:.15s}
.ltt-btn.active-apostila{background:#fff8e1;color:#1d4ed8}
.ltt-btn.active-personalizada{background:#fff8e1;color:#F57F17}
.lesson-form-body{padding:18px 22px}
.lf-field{margin-bottom:14px}
.lf-label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.lf-input{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:.88rem;font-family:inherit;outline:none;box-sizing:border-box;transition:.2s;background:#fff}
.lf-input:focus{border-color:#C62828;box-shadow:0 0 0 3px rgba(198,40,40,.1)}
.lf-ta{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:.88rem;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;transition:.2s;background:#fff}
.lf-ta:focus{border-color:#C62828;box-shadow:0 0 0 3px rgba(198,40,40,.1)}
.lf-section-title{font-size:.82rem;font-weight:800;color:#374151;padding:10px 0 6px;border-bottom:1.5px solid #f1f5f9;margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.04em}
.mod-pick-level{border:1px solid #e2e8f0;border-radius:9px;overflow:hidden;margin-bottom:6px}
.mod-pick-level summary{padding:8px 12px;cursor:pointer;font-size:.82rem;font-weight:700;color:#374151;background:#FFFFFF;display:flex;align-items:center;justify-content:space-between;user-select:none}
.mod-pick-level summary:hover{background:#F5F5F5}
.mod-pick-check{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:.82rem;color:#374151;border-bottom:1px solid #f8fafc;cursor:pointer;transition:.1s}
.mod-pick-check:hover{background:#fff8e1}
.mod-pick-check:last-child{border-bottom:none}
.mod-pick-check input{accent-color:#C62828;cursor:pointer}
.lesson-detail-section{margin-bottom:16px}
.lesson-detail-label{font-size:.7rem;font-weight:800;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.lesson-detail-text{font-size:.88rem;color:#374151;line-height:1.72;background:#FFFFFF;border-radius:9px;padding:11px 14px;white-space:pre-wrap}
.lesson-module-chip{display:inline-flex;align-items:center;gap:5px;background:#fff8e1;color:#1d4ed8;font-size:.74rem;font-weight:700;padding:3px 10px;border-radius:10px;margin:3px;cursor:pointer;border:1px solid #bfdbfe;transition:.15s}
.lesson-module-chip:hover{background:#ffcdd2}

/* PAINEL DO DIA */
.panel-section{background:#fff;border-radius:14px;padding:18px 22px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.panel-section-title{font-size:.92rem;font-weight:700;color:#C62828;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.panel-section-title span{display:flex;align-items:center;gap:7px}
.today-card{background:#FFFFFF;border:1.5px solid #e0e7ff;border-radius:11px;padding:13px 15px;display:flex;align-items:center;gap:13px;transition:.15s;margin-bottom:9px}
.today-card:hover{border-color:#a5b4fc;background:#f0f4ff;transform:translateX(2px)}
.today-card-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#C62828,#FBC02D);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;flex-shrink:0}
.today-card-info{flex:1;min-width:0}
.today-card-name{font-size:.92rem;font-weight:700;color:#C62828}
.today-card-meta{font-size:.74rem;color:#6b7280;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.today-card-actions{display:flex;gap:6px;flex-shrink:0}
.panel-action-btn{border:none;padding:6px 13px;border-radius:7px;cursor:pointer;font-size:.78rem;font-weight:700;transition:.15s}
.upcoming-day-block{margin-bottom:12px}
.upcoming-day-label{font-size:.76rem;font-weight:800;color:#F57F17;background:#fff8e1;padding:3px 12px;border-radius:20px;display:inline-block;margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em}
.upcoming-day-label.today-label{background:#FBC02D;color:#fff}
.upcoming-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#FFFFFF;border-radius:9px;margin-bottom:5px;border:1px solid #e2e8f0;transition:.15s}
.upcoming-row:hover{border-color:#FBC02D;background:#fff8e1}
.upcoming-time{font-size:.78rem;font-weight:800;color:#F57F17;min-width:40px}
.upcoming-name{font-size:.85rem;font-weight:600;color:#C62828;flex:1}
.panel-alert-card{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:10px;margin-bottom:8px;border:1.5px solid;transition:.15s;cursor:pointer}
.panel-alert-card:hover{transform:translateX(2px)}
.pal-red{background:#fff5f5;border-color:#fca5a5}
.pal-orange{background:#fff7ed;border-color:#fed7aa}
.pal-yellow{background:#fefce8;border-color:#fde68a}
.pal-blue{background:#fff8e1;border-color:#FBC02D}
.pal-purple{background:#fff8e1;border-color:#FBC02D}
.pal-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.pal-title{font-size:.86rem;font-weight:700;color:#333333}
.pal-sub{font-size:.75rem;color:#6b7280;margin-top:2px}
.schedule-editor{background:#FFFFFF;border:1.5px solid #e0e7ff;border-radius:11px;padding:14px 16px;margin-top:14px}
.schedule-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #e2e8f0;flex-wrap:wrap}
.schedule-row:last-child{border-bottom:none}
.schedule-name{font-size:.84rem;font-weight:700;color:#C62828;min-width:100px}
.day-check{display:flex;align-items:center;gap:3px;font-size:.74rem;color:#374151;cursor:pointer}
.day-check input{accent-color:#F57F17;cursor:pointer}
.schedule-time{border:1.5px solid #ddd6fe;border-radius:7px;padding:4px 8px;font-size:.8rem;outline:none;width:80px;font-family:inherit;color:#C62828}
.schedule-time:focus{border-color:#F57F17}

/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:22px}
.analytics-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.analytics-card h4{font-size:.88rem;font-weight:700;color:#374151;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alert-red{background:#ef4444}.alert-yellow{background:#f59e0b}.alert-blue{background:#3b82f6}.alert-green{background:#10b981}
.alert-text{font-size:.83rem;color:#374151;font-weight:500}
.alert-sub{font-size:.74rem;color:#9ca3af;margin-top:1px}

/* ALERT CARDS */
.alert-card{border-radius:10px;padding:13px 15px;margin-bottom:10px;border-left:4px solid;display:flex;gap:12px;align-items:flex-start}
.alert-card-critical{background:#fff1f2;border-color:#ef4444}
.alert-card-warning {background:#fffbeb;border-color:#f59e0b}
.alert-card-skill   {background:#f0f4ff;border-color:#C62828}
.alert-card-stuck   {background:#ffebee;border-color:#C62828}
.alert-card-pace    {background:#FFFFFF;border-color:#94a3b8}
.alert-card-good    {background:#f0fdf4;border-color:#22c55e}
.alert-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.alert-body{}
.alert-title{font-size:.85rem;font-weight:700;color:#333333;margin-bottom:2px}
.alert-msg{font-size:.78rem;color:#4b5563;line-height:1.5}
.alert-action{display:inline-block;margin-top:5px;font-size:.74rem;font-weight:700;color:#C62828;background:#ffebee;padding:2px 9px;border-radius:10px;cursor:pointer;border:none}
.alert-action:hover{background:#ffcdd2}

/* SKILL EVOLUTION */
.evo-table{width:100%;border-collapse:separate;border-spacing:0 5px;font-size:.82rem}
.evo-table td{padding:5px 8px}
.evo-name{color:#374151;font-weight:600;width:90px}
.evo-bar-wrap{width:160px}
.evo-mini-bar{height:7px;border-radius:4px;display:flex;overflow:hidden;background:#e2e8f0}
.evo-mini-early{height:100%;opacity:.45}
.evo-mini-now{height:100%;border-radius:4px}
.evo-pcts{display:flex;gap:4px;align-items:center;font-size:.75rem;white-space:nowrap}
.evo-pct-early{color:#94a3b8}
.evo-arrow{font-size:.85rem;font-weight:700}
.evo-arrow-up{color:#10b981}.evo-arrow-down{color:#ef4444}.evo-arrow-flat{color:#94a3b8}
.evo-pct-now{font-weight:700}
.evo-badge{font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:4px}
.evo-badge-up  {background:#dcfce7;color:#166534}
.evo-badge-down{background:#fee2e2;color:#7f1d1d}
.evo-badge-flat{background:#F5F5F5;color:#64748b}

/* STUDENT DETAIL TABS */
.student-tabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:2px solid #E0E0E0;padding-bottom:0}
.stab{background:none;border:none;padding:9px 18px;font-size:.88rem;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s}
.stab:hover{color:#C62828}
.stab.active{color:#C62828;border-bottom-color:#C62828}

/* ANALYSIS CARDS */
.astat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.astat-card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07);text-align:center}
.astat-val{font-size:1.5rem;font-weight:800;color:#C62828;line-height:1}
.astat-lbl{font-size:.72rem;color:#6b7280;margin-top:4px}

/* RECOMMENDATION CARDS */
.rec-card{border-radius:10px;padding:13px 15px;margin-bottom:9px;display:flex;gap:12px;align-items:flex-start;border-left:4px solid}
.rec-urgent  {background:#fff1f2;border-color:#ef4444}
.rec-review  {background:#fff7ed;border-color:#f59e0b}
.rec-advance {background:#f0fdf4;border-color:#22c55e}
.rec-normal  {background:#f0f4ff;border-color:#C62828}
.rec-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.rec-title{font-size:.85rem;font-weight:700;color:#333333;margin-bottom:2px}
.rec-desc{font-size:.78rem;color:#4b5563;line-height:1.5}
.rec-tag{display:inline-block;font-size:.7rem;font-weight:700;background:#ffebee;color:#C62828;padding:2px 8px;border-radius:8px;margin-top:4px;margin-right:4px}

/* EX-TYPE BARS */
.extype-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.extype-label{font-size:.78rem;color:#374151;font-weight:600;width:110px;flex-shrink:0}
.extype-bar{flex:1;height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden}
.extype-fill{height:100%;border-radius:5px;transition:.5s}
.extype-pct{font-size:.75rem;font-weight:700;width:38px;text-align:right}

/* PERSONALIZED TRAIL */
.trail-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:10px;margin-bottom:8px;border:1.5px solid #e0e7ff;background:#faf8ff;transition:.15s}
.trail-item-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;background:#fff8e1;color:#F57F17}
.trail-item-info{flex:1;min-width:0}
.trail-item-title{font-size:.88rem;font-weight:600;color:#C62828}
.trail-item-meta{font-size:.73rem;color:#6b7280;margin-top:2px}
.trail-item-actions{display:flex;gap:4px;align-items:flex-start;flex-shrink:0}
.trail-action-btn{background:none;border:1px solid #e0e7ff;border-radius:6px;cursor:pointer;font-size:.76rem;padding:4px 8px;color:#6b7280;transition:.15s;white-space:nowrap;line-height:1}
.trail-action-btn:hover{border-color:#F57F17;color:#F57F17;background:#fff8e1}
.mod-picker{background:#FFFFFF;border-radius:10px;padding:12px}
.mod-picker-level{margin-bottom:7px}
.mod-picker-level summary{font-size:.82rem;font-weight:700;color:#374151;cursor:pointer;padding:6px 10px;border-radius:7px;background:#fff;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;list-style:none;user-select:none}
.mod-picker-level summary:hover{background:#fff8e1;border-color:#FBC02D}
.mod-picker-item{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:7px;margin-top:4px;background:#fff;border:1px solid #f1f5f9;font-size:.8rem;color:#374151}
.mod-picker-add{background:#FBC02D;color:#fff;border:none;padding:3px 11px;border-radius:6px;cursor:pointer;font-size:.74rem;font-weight:600;transition:.2s;white-space:nowrap}
.mod-picker-add:hover{background:#F57F17}
.mod-picker-skip{background:none;border:1px solid #cbd5e1;color:#64748b;padding:3px 9px;border-radius:6px;cursor:pointer;font-size:.74rem;transition:.2s;white-space:nowrap}
.mod-picker-skip:hover{border-color:#ef4444;color:#ef4444}
.extra-builder{background:#fff7ed;border:2px solid #fed7aa;border-radius:12px;padding:16px;margin-top:12px}
.extra-builder h4{font-size:.88rem;font-weight:700;color:#c2410c;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.extra-q-card{background:#fff;border:1px solid #e2e8f0;border-radius:9px;padding:13px 14px;margin-bottom:8px;position:relative}
.extra-q-type{font-size:.7rem;font-weight:700;color:#C62828;background:#ffebee;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:7px}
.extra-q-remove{position:absolute;top:8px;right:8px;background:none;border:none;color:#94a3b8;cursor:pointer;font-size:.82rem;padding:2px 6px;border-radius:4px;line-height:1}
.extra-q-remove:hover{color:#ef4444;background:#fee2e2}

.log-entry-chevron{color:#94a3b8;font-size:.85rem;transition:.2s;flex-shrink:0}
.log-entry-body{padding:0 16px 16px;border-top:1px solid #f1f5f9;display:none}
.log-entry.open .log-entry-body{display:block}
.log-entry.open .log-entry-chevron{transform:rotate(180deg)}
.log-field{margin-top:13px}
.log-field-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.log-field-text{font-size:.86rem;color:#374151;line-height:1.7;white-space:pre-wrap;background:#FFFFFF;border-radius:8px;padding:9px 12px}
.log-field-empty{font-size:.82rem;color:#cbd5e1;font-style:italic}
.log-form-card{background:#fff8e1;border:2px solid #c4b5fd;border-radius:14px;padding:18px 20px;margin-bottom:16px}
.log-form-card h4{font-size:.93rem;font-weight:700;color:#F57F17;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.log-form-field{margin-bottom:12px}
.log-form-label{font-size:.72rem;font-weight:700;color:#5b21b6;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:flex;align-items:center;gap:5px}

.log-form-ta:focus{border-color:#F57F17;box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.log-form-input{width:100%;border:1.5px solid #ddd6fe;border-radius:8px;padding:8px 12px;font-size:.86rem;font-family:inherit;outline:none;box-sizing:border-box;transition:.2s;background:#fff}
.log-form-input:focus{border-color:#F57F17;box-shadow:0 0 0 3px rgba(124,58,237,.1)}

/* DIAGNOSTIC TEST */
.diag-badge{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 12px;border-radius:12px;margin-right:6px}
.diag-banner{background:#fff;border-radius:14px;padding:18px 22px;margin-bottom:18px;box-shadow:0 2px 12px rgba(0,0,0,.08);border-top:4px solid #f59e0b}
.diag-banner h3{font-size:.95rem;font-weight:700;color:#92400e;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.diag-start-btn{background:#f59e0b;color:#fff;border:none;padding:9px 22px;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:700;transition:.2s;display:inline-block;margin-top:10px}
.diag-start-btn:hover{background:#d97706}
.diag-result-badge{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px}
.diag-pass{background:#dcfce7;color:#166534}
.diag-fail{background:#fee2e2;color:#7f1d1d}

.report-container{max-width:820px;margin:0 auto;padding:0 16px 40px}

.report-print-btn:hover{background:#fff8e1}

.report-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.report-table tr:last-child td{border-bottom:none}
.action-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f8fafc}
.action-row:last-child{border-bottom:none}
.action-priority{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.action-text{font-size:.84rem;color:#333333;font-weight:500;line-height:1.5}
.action-sub{font-size:.76rem;color:#6b7280;margin-top:2px}
.plan-aula{background:#FFFFFF;border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:3px solid #C62828}

.plan-tag{display:inline-block;font-size:.7rem;font-weight:700;background:#ffebee;color:#C62828;padding:2px 8px;border-radius:8px;margin-top:5px;margin-right:4px}
.report-exec{background:linear-gradient(135deg,#C62828,#e53935);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px}
.report-exec h2{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.report-exec p{font-size:.85rem;opacity:.85;line-height:1.6}
.report-metric{text-align:center;background:rgba(255,255,255,.15);border-radius:8px;padding:10px 14px}
.report-metric-val{font-size:1.4rem;font-weight:800;line-height:1}
.report-metric-lbl{font-size:.68rem;opacity:.8;margin-top:3px}

/* RESPONSIVE */

  .login-choice{flex-direction:column}

// Per-student proxies
function getProgress(){
  const s = getStudents();
  return (s[currentUser.name] && s[currentUser.name].progress) || {};
}
function getAnswers(){
  const s = getStudents();
  return (s[currentUser.name] && s[currentUser.name].answers) || {};
}
function persistProgress(p){
  const s = getStudents();
  if(!s[currentUser.name]) s[currentUser.name]={progress:{},answers:{}};
  s[currentUser.name].progress = p;
  saveStudents(s);
}
function persistAnswers(a){
  const s = getStudents();
  if(!s[currentUser.name]) s[currentUser.name]={progress:{},answers:{}};
  s[currentUser.name].answers = a;
  saveStudents(s);
}

function saveProgress(level, idx){
  const p = getProgress();
  if(!p[level]) p[level]=[];
  if(!p[level].includes(idx)) p[level].push(idx);
  persistProgress(p);
}
function isDone(level, idx){
  const p = getProgress();
  return p[level] && p[level].includes(idx);
}
function saveAnswer(level, modIdx, exIdx, value, correct){
  const a = getAnswers();
  if(!a[level]) a[level]={};
  if(!a[level][modIdx]) a[level][modIdx]={};
  a[level][modIdx][exIdx] = { value, correct, ts: Date.now() };
  persistAnswers(a);
  checkAutoComplete(level, modIdx);
}
function getModuleAnswers(level, modIdx){
  const a = getAnswers();
  return (a[level] && a[level][modIdx]) ? a[level][modIdx] : {};
}

/* ================================================================
   TIME TRACKING
================================================================ */
function trackModuleOpen(level, modIdx){
  const s = getStudents();
  if(!s[currentUser.name]) return;
  const stu = s[currentUser.name];
  if(!stu.moduleOpenTimes)  stu.moduleOpenTimes  = {};
  if(!stu.moduleRetries)    stu.moduleRetries    = {};
  if(!stu.firstAccess)      stu.firstAccess      = Date.now();
  stu.moduleOpenTimes[`${level}-${modIdx}`] = Date.now();
  stu.lastActive = Date.now();
  // conta tentativas apenas em módulos ainda não concluídos
  const key = `${level}-${modIdx}`;
  const prog = stu.progress || {};
  const done = (prog[level]||[]).includes(modIdx);
  if(!done) stu.moduleRetries[key] = (stu.moduleRetries[key]||0) + 1;
  saveStudents(s);
}
function trackModuleComplete(level, modIdx){
  const s = getStudents();
  if(!s[currentUser.name]) return;
  const stu = s[currentUser.name];
  const key = `${level}-${modIdx}`;
  const openTime = stu.moduleOpenTimes && stu.moduleOpenTimes[key];
  if(openTime){
    const spent = Math.round((Date.now() - openTime) / 1000);
    if(spent > 10 && spent < 7200){   // ignora <10s e >2h (aba esquecida)
      if(!stu.responseTimes) stu.responseTimes = {};
      const prev = stu.responseTimes[key];
      stu.responseTimes[key] = prev ? Math.round((prev + spent) / 2) : spent;
    }
  }
  saveStudents(s);
}
function formatTime(secs){
  if(secs < 60) return secs + 's';
  const m = Math.floor(secs/60), s = secs % 60;
  return m + 'min' + (s > 0 ? ' ' + s + 's' : '');
}

function getSkillStats(studentName){
  const data = getStudents()[studentName] || {};
  const ans  = data.answers || {};
  const stats = {grammar:{c:0,t:0},vocabulary:{c:0,t:0},communication:{c:0,t:0},reading:{c:0,t:0},writing:{c:0,t:0}};
  LEVELS.forEach(lv => {
    Object.keys(ans[lv]||{}).forEach(mi => {
      const skills = SKILL_TAGS[`${lv}-${mi}`] || ['grammar'];
      Object.values(ans[lv][mi]).forEach(a => {
        skills.forEach(sk => { if(stats[sk]){ stats[sk].t++; if(a.correct) stats[sk].c++; } });
      });
    });
  });
  return stats;
}
function getWeakSkills(stats){
  return Object.entries(stats)
    .filter(([,v]) => v.t >= 2)
    .map(([k,v]) => ({skill:k, pct:Math.round(v.c/v.t*100), total:v.t}))
    .sort((a,b) => a.pct - b.pct);
}
function getClassStats(){
  const combined = {grammar:{c:0,t:0},vocabulary:{c:0,t:0},communication:{c:0,t:0},reading:{c:0,t:0},writing:{c:0,t:0}};
  Object.keys(getStudents()).forEach(name => {
    const s = getSkillStats(name);
    Object.keys(combined).forEach(sk => { combined[sk].c += s[sk].c; combined[sk].t += s[sk].t; });
  });
  return combined;
}
function renderSkillBars(stats){
  return Object.entries(stats).map(([sk,v]) => {
    if(v.t === 0) return '';
    const pct = Math.round(v.c/v.t*100);
    const col = pct < 60 ? '#ef4444' : pct < 80 ? '#f59e0b' : '#10b981';
    return `<div class="sp-row">
      <span class="sp-label">${SKILL_LABELS[sk]}</span>
      <div class="sp-bar"><div class="sp-fill" style="width:${pct}%;background:${SKILL_COLORS[sk]}"></div></div>
      <span class="sp-pct" style="color:${col}">${pct}%</span>
    </div>`;
  }).join('');
}

/* ================================================================
   SKILL EVOLUTION — compara primeira metade vs segunda metade de respostas
================================================================ */
function getSkillEvolution(studentName){
  const data = getStudents()[studentName] || {};
  const ans  = data.answers || {};
  const all  = [];

  LEVELS.forEach(lv => {
    Object.keys(ans[lv]||{}).forEach(mi => {
      const skills = SKILL_TAGS[`${lv}-${mi}`] || ['grammar'];
      Object.values(ans[lv][mi]).forEach(a => {
        all.push({correct: a.correct, skills, ts: a.ts || 0});
      });
    });
  });

  if(all.length < 6) return null; // dados insuficientes

  all.sort((a, b) => a.ts - b.ts);
  const mid    = Math.floor(all.length / 2);
  const early  = all.slice(0, mid);
  const recent = all.slice(mid);

  function calcStats(list){
    const s = {grammar:{c:0,t:0},vocabulary:{c:0,t:0},communication:{c:0,t:0},reading:{c:0,t:0},writing:{c:0,t:0}};
    list.forEach(a => a.skills.forEach(sk => {
      if(s[sk]){ s[sk].t++; if(a.correct) s[sk].c++; }
    }));
    return s;
  }
  return { early: calcStats(early), recent: calcStats(recent) };
}

function renderSkillEvolutionTable(evolution){
  if(!evolution) return '<p style="color:#94a3b8;font-size:.8rem">Ainda não há dados suficientes para mostrar evolução (mínimo 6 questões respondidas).</p>';

  const { early, recent } = evolution;
  let rows = '';

  Object.keys(SKILL_LABELS).forEach(sk => {
    const e = early[sk], r = recent[sk];
    if(!e || e.t === 0 || r.t === 0) return;
    const pEarly  = Math.round(e.c / e.t * 100);
    const pRecent = Math.round(r.c / r.t * 100);
    const diff    = pRecent - pEarly;
    const arrow   = diff > 3 ? '▲' : diff < -3 ? '▼' : '→';
    const arrowCls= diff > 3 ? 'evo-arrow-up' : diff < -3 ? 'evo-arrow-down' : 'evo-arrow-flat';
    const badge   = diff > 3 ? `<span class="evo-badge evo-badge-up">+${diff}%</span>`
                  : diff < -3 ? `<span class="evo-badge evo-badge-down">${diff}%</span>`
                  : `<span class="evo-badge evo-badge-flat">estável</span>`;
    const col = SKILL_COLORS[sk];

    rows += `<tr>
      <td class="evo-name">${SKILL_ICONS[sk]} ${SKILL_LABELS[sk]}</td>
      <td class="evo-bar-wrap">
        <div class="evo-mini-bar">
          <div class="evo-mini-early" style="width:${pEarly}%;background:${col}"></div>
        </div>
        <div class="evo-mini-bar" style="margin-top:2px">
          <div class="evo-mini-now" style="width:${pRecent}%;background:${col}"></div>
        </div>
      </td>
      <td class="evo-pcts">
        <span class="evo-pct-early">${pEarly}%</span>
        <span class="evo-arrow ${arrowCls}">${arrow}</span>
        <span class="evo-pct-now" style="color:${col}">${pRecent}%</span>
        ${badge}
      </td>
    </tr>`;
  });

  return rows
    ? `<table class="evo-table">
        <thead><tr>
          <td style="font-size:.7rem;color:#94a3b8;padding-bottom:4px">Habilidade</td>
          <td style="font-size:.7rem;color:#94a3b8">Início → Agora</td>
          <td style="font-size:.7rem;color:#94a3b8">Variação</td>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`
    : '<p style="color:#94a3b8;font-size:.8rem">Dados insuficientes por habilidade.</p>';
}

/* ================================================================
   ALERT GENERATION — alertas ricos e descritivos
================================================================ */
function fmtDate(ts){ return ts ? new Date(ts).toLocaleDateString('pt-BR') : '—'; }
function daysSince(ts){ return ts ? Math.floor((Date.now()-ts)/86400000) : 999; }

function generateAlerts(studentName, data){
  const alerts   = [];
  const progress = data.progress || {};
  const status   = getEngagementStatus(data);
  const stats    = getSkillStats(studentName);
  const weak     = getWeakSkills(stats);
  const retries  = data.moduleRetries || {};
  const totalDone= LEVELS.reduce((s,lv)=>(progress[lv]||[]).length+s, 0);
  const totalMods= LEVELS.reduce((s,lv)=>CONTENT[lv].length+s, 0);

  // ── Engajamento ──────────────────────────────────────────────
  if(status === 'inativo'){
    const d = daysSince(data.lastActive);
    alerts.push({ cat:'critical', icon:'🔴',
      title:`${studentName} está desengajado`,
      msg:`Sem nenhum acesso há <strong>${d} dias</strong>. Último acesso: ${fmtDate(data.lastActive)}. Considere entrar em contato diretamente.`,
      action:'Enviar lembrete', priority:1 });
  } else if(status === 'risco'){
    const d = daysSince(data.lastActive);
    alerts.push({ cat:'warning', icon:'🟡',
      title:`${studentName} pode estar perdendo o ritmo`,
      msg:`Sem acesso há ${d} dias (último: ${fmtDate(data.lastActive)}). Uma mensagem de incentivo pode ajudar.`,
      priority:2 });
  }

  // ── Dificuldade grave em habilidade ──────────────────────────
  if(weak[0] && weak[0].pct < 40 && weak[0].total >= 4){
    alerts.push({ cat:'skill', icon:'📉',
      title:`Dificuldade grave — ${SKILL_LABELS[weak[0].skill]}`,
      msg:`${studentName} tem apenas <strong>${weak[0].pct}%</strong> de acerto em ${SKILL_LABELS[weak[0].skill]} (${weak[0].total} questões). Recomendado: revisão em aula e exercícios extras.`,
      priority:2 });
  } else if(weak[0] && weak[0].pct < 60 && weak[0].total >= 3){
    alerts.push({ cat:'skill', icon:'⚠️',
      title:`Precisa reforço em ${SKILL_LABELS[weak[0].skill]}`,
      msg:`${studentName} acertou ${weak[0].pct}% das questões de ${SKILL_LABELS[weak[0].skill]}. Sugestão: atividade complementar sobre este tópico.`,
      priority:3 });
  }

  // ── Travado em módulo (3+ tentativas sem concluir) ────────────
  Object.entries(retries).forEach(([key, count]) => {
    if(count < 3) return;
    const [lv, mi] = key.split('-');
    const mod = CONTENT[lv] && CONTENT[lv][parseInt(mi)];
    const done = (progress[lv]||[]).includes(parseInt(mi));
    if(mod && !done){
      alerts.push({ cat:'stuck', icon:'🔁',
        title:`${studentName} travado em módulo`,
        msg:`"${mod.title}" (Nível ${lv}) foi tentado <strong>${count} vezes</strong> sem conclusão. Pode precisar de explicação presencial ou material de apoio.`,
        priority:2 });
    }
  });

  // ── Ritmo lento ───────────────────────────────────────────────
  if(totalDone >= 3 && data.firstAccess){
    const weeks = Math.max((Date.now() - data.firstAccess) / (7*86400000), 1);
    const pace  = totalDone / weeks;
    if(pace < 0.8 && weeks > 2){
      alerts.push({ cat:'pace', icon:'🐢',
        title:`Ritmo abaixo do esperado`,
        msg:`${studentName} conclui em média <strong>${pace.toFixed(1)} módulo/semana</strong>. Verificar se há dificuldades técnicas ou de tempo.`,
        priority:4 });
    }
  }

  // ── Destaque positivo ─────────────────────────────────────────
  const evo = getSkillEvolution(studentName);
  if(evo){
    const improvements = Object.keys(SKILL_LABELS).filter(sk => {
      const e = evo.early[sk], r = evo.recent[sk];
      return e && e.t > 0 && r && r.t > 0 && (Math.round(r.c/r.t*100) - Math.round(e.c/e.t*100)) >= 15;
    });
    if(improvements.length){
      alerts.push({ cat:'good', icon:'🌟',
        title:`${studentName} está evoluindo!`,
        msg:`Melhora de 15%+ em: <strong>${improvements.map(s=>SKILL_LABELS[s]).join(', ')}</strong>. Vale destacar em aula!`,
        priority:5 });
    }
  }

  // ── Zero progresso mas cadastrado há mais de 3 dias ───────────
  if(totalDone === 0 && data.firstAccess && daysSince(data.firstAccess) > 3){
    alerts.push({ cat:'warning', icon:'🚫',
      title:`${studentName} nunca iniciou um módulo`,
      msg:`Cadastrado há ${daysSince(data.firstAccess)} dias mas ainda não completou nenhuma atividade. Verificar barreiras de acesso.`,
      priority:2 });
  }

  return alerts.sort((a,b) => a.priority - b.priority);
}

/* ================================================================
   ADAPTIVE UNLOCKING — desbloqueio por sequência + domínio de habilidade
================================================================ */
let reinforcementState = null; // mini-quiz ativo

function getStudentSkillPct(skill){
  // % de acerto na habilidade para o usuário atual
  const s = getSkillStats(currentUser && currentUser.name)[skill] || {c:0,t:0};
  return s.t > 0 ? Math.round(s.c/s.t*100) : 0;
}

function getReinDoneKey(level, modIdx){ return `rein_${level}_${modIdx}`; }

function isReinforcementDone(level, modIdx){
  const s = getStudents()[currentUser && currentUser.name];
  return !!(s && s.reinforcementDone && s.reinforcementDone[getReinDoneKey(level, modIdx)]);
}

/* ── Desbloqueio manual pelo professor ── */
function isTeacherUnlocked(studentName, level, modIdx){
  const s = getStudents()[studentName];
  return !!(s && s.teacherUnlocked && s.teacherUnlocked[`${level}-${modIdx}`]);
}
function teacherUnlockModule(studentName, level, modIdx){
  const s = getStudents();
  if(!s[studentName]) return;
  if(!s[studentName].teacherUnlocked) s[studentName].teacherUnlocked = {};
  s[studentName].teacherUnlocked[`${level}-${modIdx}`] = { at: Date.now() };
  saveStudents(s);
  showStudentDetail(studentName);
}
function teacherRevokeModule(studentName, level, modIdx){
  const s = getStudents();
  if(!s[studentName]?.teacherUnlocked) return;
  delete s[studentName].teacherUnlocked[`${level}-${modIdx}`];
  saveStudents(s);
  showStudentDetail(studentName);
}

function isModuleUnlocked(level, modIdx){
  // Primeiro módulo do A1: sempre aberto
  if(level === 'A1' && modIdx === 0) return true;
  // Desbloqueio manual pelo professor
  if(currentUser && isTeacherUnlocked(currentUser.name, level, modIdx)) return true;
  // Módulo dispensado pelo professor → tratado como desbloqueado
  if(currentUser && isModuleSkipped(currentUser.name, level, modIdx)) return true;

  // Primeiro módulo de outro nível: precisa 70% do nível anterior
  if(modIdx === 0){
    const prevLv = LEVELS[LEVELS.indexOf(level) - 1];
    const done   = (getProgress()[prevLv]||[]).length;
    if((done / CONTENT[prevLv].length) >= LEVEL_UNLOCK_PCT) return true;
    // Bypass de maestria: todas as habilidades principais do nível com ≥80%
    const lvSkills = [...new Set(Object.entries(SKILL_TAGS)
      .filter(([k]) => k.startsWith(level+'-'))
      .flatMap(([,v]) => v))];
    if(lvSkills.length && lvSkills.every(sk => getStudentSkillPct(sk) >= 80)) return true;
    return false;
  }

  // Módulo N no mesmo nível
  if(isPrevModulePassable(level, modIdx-1)) return true;
  // Mini-quiz de reforço concluído para este módulo → desbloqueia
  if(isReinforcementDone(level, modIdx)) return true;
  // Bypass de maestria: ≥80% em TODAS as habilidades deste módulo
  const modSkills = SKILL_TAGS[`${level}-${modIdx}`] || [];
  if(modSkills.length && modSkills.every(sk => getStudentSkillPct(sk) >= 80)) return true;
  return false;
}

function isPrevModulePassable(level, modIdx){
  if(isDone(level, modIdx)) return true;
  // Módulo dispensado pelo professor → passável para efeito de desbloqueio do próximo
  if(currentUser && isModuleSkipped(currentUser.name, level, modIdx)) return true;
  const mod = CONTENT[level][modIdx];
  if(!mod.exercises || !mod.exercises.length) return false;
  const saved = getModuleAnswers(level, modIdx);
  if(!Object.keys(saved).length) return false;
  return (Object.values(saved).filter(a=>a.correct).length / mod.exercises.length) >= ADAPTIVE_UNLOCK_SCORE;
}

function getNextUnlockedModule(){
  for(const lv of LEVELS)
    for(let i=0; i<CONTENT[lv].length; i++)
      if(!isDone(lv,i) && isModuleUnlocked(lv,i)) return {level:lv, idx:i};
  return null;
}

/* ================================================================
   ADAPTIVE PATH — caminho personalizado baseado em desempenho
================================================================ */
function getAdaptivePath(){
  const stats = getSkillStats(currentUser.name);
  const weak  = getWeakSkills(stats);  // ordenado do mais fraco ao mais forte
  const path  = [];
  const added = new Set();

  // 1. Próximo módulo sequencial
  for(const lv of LEVELS){
    for(let i=0; i<CONTENT[lv].length; i++){
      if(!isDone(lv,i) && isModuleUnlocked(lv,i)){
        path.push({level:lv, idx:i, reason:'next', color:'#C62828'});
        added.add(`${lv}-${i}`);
        break;
      }
    }
    if(added.size) break;
  }

  // 2. Reforço para habilidades fracas (<65%) — módulos desbloqueados com essa skill
  weak.filter(w=>w.pct<65).slice(0,2).forEach(({skill})=>{
    for(const lv of LEVELS){
      for(let i=0; i<CONTENT[lv].length; i++){
        const key=`${lv}-${i}`;
        if(added.has(key)||isDone(lv,i)||!isModuleUnlocked(lv,i)) continue;
        if((SKILL_TAGS[key]||[]).includes(skill)){
          path.push({level:lv, idx:i, reason:'weak', skill, color:SKILL_COLORS[skill]});
          added.add(key);
          break;
        }
      }
    }
  });

  // 3. Módulos em que habilidades fortes permitem avanço rápido
  const strong = Object.entries(stats).filter(([,v])=>v.t>=3&&Math.round(v.c/v.t*100)>=80).map(([k])=>k);
  if(strong.length){
    for(const lv of LEVELS){
      for(let i=0; i<CONTENT[lv].length && path.length<6; i++){
        const key=`${lv}-${i}`;
        if(added.has(key)||isDone(lv,i)||!isModuleUnlocked(lv,i)) continue;
        const modSkills=SKILL_TAGS[key]||[];
        if(modSkills.some(sk=>strong.includes(sk))){
          path.push({level:lv, idx:i, reason:'strong', color:'#10b981'});
          added.add(key);
          break;
        }
      }
    }
  }

  // 4. Completar até 5 com próximos disponíveis
  for(const lv of LEVELS){
    for(let i=0; i<CONTENT[lv].length && path.length<5; i++){
      const key=`${lv}-${i}`;
      if(!added.has(key)&&!isDone(lv,i)&&isModuleUnlocked(lv,i)){
        path.push({level:lv, idx:i, reason:'upcoming', color:'#64748b'});
        added.add(key);
      }
    }
  }
  return path.slice(0,5);
}

function renderAdaptivePath(){
  const path  = getAdaptivePath();
  const stats = getSkillStats(currentUser.name);
  const weak  = getWeakSkills(stats);
  if(!path.length) return '';

  const REASON_META = {
    next:    {label:'Siguiente en la secuencia', cls:'path-step-next'},
    weak:    {label:'Reforço recomendado',  cls:'path-step-weak'},
    strong:  {label:'Avanço rápido',        cls:'path-step-upcoming'},
    upcoming:{label:'Disponível',           cls:'path-step-upcoming'},
  };

  const steps = path.map((p,i)=>{
    const mod  = CONTENT[p.level][p.idx];
    const meta = REASON_META[p.reason] || REASON_META.upcoming;
    const skillChips = (SKILL_TAGS[`${p.level}-${p.idx}`]||[])
      .map(s=>`<span style="font-size:.68rem;background:${SKILL_COLORS[s]}18;color:${SKILL_COLORS[s]};padding:1px 6px;border-radius:8px;font-weight:700">${SKILL_LABELS[s]}</span>`).join(' ');
    const weakNote = p.reason==='weak' && p.skill
      ? ` · ${SKILL_LABELS[p.skill]}: ${stats[p.skill]?Math.round(stats[p.skill].c/stats[p.skill].t*100):0}% acerto`
      : '';
    return `<div class="path-step ${meta.cls}" onclick="currentLevel='${p.level}';showLevel('${p.level}');showModule(${p.idx})">
      <div class="path-num" style="background:${p.color}20;color:${p.color}">${i+1}</div>
      <div class="path-info">
        <div class="path-label" style="color:${p.color}">${meta.label}</div>
        <div class="path-title">${mod.title}</div>
        <div class="path-meta">Nível ${p.level} · Módulo ${p.idx+1}${weakNote} · ${skillChips}</div>
      </div>
      <span class="path-arrow">›</span>
    </div>`;
  }).join('');

  const weakTip = weak[0] && weak[0].pct < 65
    ? `<div style="margin-top:10px;padding:7px 12px;background:#fff7ed;border-radius:8px;font-size:.8rem;color:#92400e">
        Foco desta semana: <strong>${SKILL_ICONS[weak[0].skill]} ${SKILL_LABELS[weak[0].skill]}</strong> — ${weak[0].pct}% de acerto. Os módulos marcados como "Reforço" foram escolhidos automaticamente para você.
      </div>` : '';

  return `<div class="adaptive-path">
    <h3>🗺 Seu Caminho Adaptativo</h3>
    <div class="path-steps">${steps}</div>
    ${weakTip}
  </div>`;
}

/* ================================================================
   TRILHA PERSONALIZADA — dados e gestão
================================================================ */
function getTrailData(studentName){
  const s=getStudents()[studentName]||{};
  return { trail:s.customTrail||[], skipped:s.skippedModules||{}, extras:s.extraActivities||{} };
}
function saveTrailData(studentName,td){
  const s=getStudents();
  if(!s[studentName]) s[studentName]={progress:{},answers:{}};
  s[studentName].customTrail    =td.trail;
  s[studentName].skippedModules =td.skipped;
  s[studentName].extraActivities=td.extras;
  saveStudents(s);
}
function isModuleSkipped(studentName,level,modIdx){
  return !!getTrailData(studentName).skipped[`${level}-${modIdx}`];
}

/* ── Gerenciar itens da trilha ─────────────────────────────── */
function trailCaptureNotes(studentName){
  const td=getTrailData(studentName);
  td.trail.forEach((_,idx)=>{ const el=document.getElementById(`tn-${idx}`); if(el) td.trail[idx].note=el.value; });
  saveTrailData(studentName,td);
}
function trailAddModule(studentName,level,modIdx){
  const td=getTrailData(studentName);
  if(td.trail.some(t=>t.type==='module'&&t.level===level&&t.modIdx===modIdx)){
    alert('Este módulo já está na trilha.'); return;
  }
  td.trail.push({type:'module',level,modIdx,note:'',status:'required'});
  saveTrailData(studentName,td); renderTrailTab(studentName);
}
function trailRemoveItem(studentName,idx){
  trailCaptureNotes(studentName);
  const td=getTrailData(studentName);
  td.trail.splice(idx,1); saveTrailData(studentName,td); renderTrailTab(studentName);
}
function trailMoveUp(studentName,idx){
  trailCaptureNotes(studentName);
  if(idx===0) return;
  const td=getTrailData(studentName);
  [td.trail[idx-1],td.trail[idx]]=[td.trail[idx],td.trail[idx-1]];
  saveTrailData(studentName,td); renderTrailTab(studentName);
}
function trailMoveDown(studentName,idx){
  trailCaptureNotes(studentName);
  const td=getTrailData(studentName);
  if(idx>=td.trail.length-1) return;
  [td.trail[idx],td.trail[idx+1]]=[td.trail[idx+1],td.trail[idx]];
  saveTrailData(studentName,td); renderTrailTab(studentName);
}
function trailSetStatus(studentName,idx,status){
  const td=getTrailData(studentName);
  if(td.trail[idx]) td.trail[idx].status=status;
  saveTrailData(studentName,td);
}
function trailSaveNoteBlur(studentName,idx,val){
  const td=getTrailData(studentName);
  if(td.trail[idx]) td.trail[idx].note=val;
  saveTrailData(studentName,td);
}
function trailSkipModule(studentName,level,modIdx){
  const td=getTrailData(studentName);
  td.skipped[`${level}-${modIdx}`]={at:Date.now()};
  saveTrailData(studentName,td); renderTrailTab(studentName);
}
function trailUnskipModule(studentName,level,modIdx){
  const td=getTrailData(studentName);
  delete td.skipped[`${level}-${modIdx}`];
  saveTrailData(studentName,td); renderTrailTab(studentName);
}

/* ── Builder de atividade extra ────────────────────────────── */
let extraBuilder=null;

function startExtraBuilder(studentName){
  extraBuilder={studentName,title:'',desc:'',exercises:[]};
  renderTrailTab(studentName);
  setTimeout(()=>document.getElementById('extra-title')?.focus(),60);
}
function cancelExtraBuilder(studentName){
  extraBuilder=null; renderTrailTab(studentName);
}
function captureExtraBuilderState(){
  if(!extraBuilder) return;
  extraBuilder.title=document.getElementById('extra-title')?.value||'';
  extraBuilder.desc =document.getElementById('extra-desc')?.value||'';
  extraBuilder.exercises.forEach((ex,qi)=>{
    // Campo principal (pergunta, conteúdo, URL)
    ex.question=document.getElementById(`exq-${qi}`)?.value||'';
    // Campo secundário (legenda de link/imagem)
    const lblEl=document.getElementById(`exlabel-${qi}`);
    if(lblEl) ex.label=lblEl.value||'';
    if(ex.type==='mc'){
      ex.options=[0,1,2,3].map(i=>document.getElementById(`exopt-${qi}-${i}`)?.value||'');
      const chk=document.querySelector(`input[name="exans-${qi}"]:checked`);
      ex.answer=chk?parseInt(chk.value):0;
    } else if(ex.type==='fill'){
      ex.answer=document.getElementById(`exans-${qi}`)?.value||'';
    } else if(ex.type==='tf'){
      const chk=document.querySelector(`input[name="extf-${qi}"]:checked`);
      ex.answer=!chk||chk.value==='true';
    }
  });
}
function addExtraBlock(type){
  captureExtraBuilderState();
  if(!extraBuilder) return;
  const ex={type,question:''};
  if(type==='mc'){ex.options=['','','',''];ex.answer=0;}
  else if(type==='fill'){ex.answer='';}
  else if(type==='tf'){ex.answer=true;}
  else if(type==='link'){ex.label='';}
  extraBuilder.exercises.push(ex);
  renderTrailTab(extraBuilder.studentName);
  setTimeout(()=>document.getElementById(`exq-${extraBuilder.exercises.length-1}`)?.focus(),60);
}
// manter alias para chamadas antigas
function addExtraQuestion(type){ addExtraBlock(type); }
function removeExtraQuestion(qi){
  captureExtraBuilderState();
  if(!extraBuilder) return;
  extraBuilder.exercises.splice(qi,1);
  renderTrailTab(extraBuilder.studentName);
}
function saveExtraActivity(){
  captureExtraBuilderState();
  if(!extraBuilder) return;
  const sn=extraBuilder.studentName;
  if(!extraBuilder.title.trim()){alert('Digite um título para a atividade.');return;}
  const id='extra_'+Date.now();
  const td=getTrailData(sn);
  td.extras[id]={title:extraBuilder.title.trim(),desc:extraBuilder.desc.trim(),
    exercises:extraBuilder.exercises,answers:{},done:false,createdAt:Date.now()};
  td.trail.push({type:'extra',extraId:id,note:'',status:'required'});
  saveTrailData(sn,td);
  extraBuilder=null; renderTrailTab(sn);
}
function deleteExtraActivity(studentName,extraId){
  if(!confirm('Excluir esta atividade? Não pode ser desfeito.')) return;
  const td=getTrailData(studentName);
  delete td.extras[extraId];
  td.trail=td.trail.filter(t=>!(t.type==='extra'&&t.extraId===extraId));
  saveTrailData(studentName,td); renderTrailTab(studentName);
}

function ytEmbed(url){
  const m=(url||'').match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);
  return m?`<iframe width="100%" height="215" src="https://www.youtube.com/embed/${m[1]}" frameborder="0" allowfullscreen style="border-radius:10px;margin-top:8px;display:block"></iframe>`:'';
}

/* ── Render da aba Trilha (professor) ──────────────────────── */
function renderTrailTab(studentName){
  const el=document.getElementById('stab-trail');
  if(!el) return;
  const td=getTrailData(studentName);
  const studData=getStudents()[studentName]||{};
  const STATUS_LABELS={required:'Obrigatório',optional:'Opcional',skip:'Pode pular'};

  // Trail atual
  const trailHtml=td.trail.length
    ? td.trail.map((item,idx)=>{
        let icon='',title='',meta='',rowBg='#faf8ff';
        if(item.type==='module'){
          const mod=CONTENT[item.level]?.[item.modIdx];
          if(!mod) return '';
          const isDone=((studData.progress||{})[item.level]||[]).includes(item.modIdx);
          const isSkip=!!td.skipped[`${item.level}-${item.modIdx}`];
          const skills=(SKILL_TAGS[`${item.level}-${item.modIdx}`]||[]).map(s=>`<span style="color:${SKILL_COLORS[s]};font-size:.64rem">${SKILL_LABELS[s]}</span>`).join(' · ');
          icon=item.level; title=mod.title;
          meta=`Módulo ${item.modIdx+1} · ${skills}${isDone?' · <span style="color:#10b981;font-weight:700">✓ Concluído</span>':isSkip?' · <span style="color:#64748b">dispensado</span>':''}`;
          rowBg=isDone?'#f0fdf4':isSkip?'#FFFFFF':'#faf8ff';
        } else if(item.type==='extra'){
          const ex=td.extras[item.extraId];
          if(!ex) return '';
          const isDone=ex.done;
          icon='⭐'; title=ex.title;
          const nb=ex.exercises.length, ni=ex.exercises.filter(e=>['mc','fill','tf','redacao'].includes(e.type)).length;
          meta=`Atividade Extra · ${nb} bloco${nb!==1?'s':''}${ni>0?` · ${ni} interativo${ni!==1?'s':''}`:''}${isDone?' · <span style="color:#10b981;font-weight:700">✓ Concluída</span>':''}`;
          rowBg='#fff7ed';
        }
        const s=item.status||'required';
        const sBg={required:'#ede9fe',optional:'#f0fdf4',skip:'#F5F5F5'}[s];
        const sCol={required:'#6d28d9',optional:'#166534',skip:'#64748b'}[s];
        return `<div class="trail-item" style="background:${rowBg}">
          <div class="trail-item-icon">${icon}</div>
          <div class="trail-item-info">
            <div class="trail-item-title">${title}</div>
            <div class="trail-item-meta">${meta}</div>
            <div style="margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <select onchange="trailSetStatus('${studentName}',${idx},this.value)"
                style="font-size:.72rem;border:1.5px solid ${sBg};border-radius:6px;padding:2px 8px;background:${sBg};color:${sCol};font-weight:700;outline:none;cursor:pointer">
                <option value="required" ${s==='required'?'selected':''}>Obrigatório</option>
                <option value="optional" ${s==='optional'?'selected':''}>Opcional</option>
                <option value="skip" ${s==='skip'?'selected':''}>Pode pular</option>
              </select>
              <input type="text" id="tn-${idx}" value="${(item.note||'').replace(/"/g,'&quot;')}"
                placeholder="Nota para o aluno…" onblur="trailSaveNoteBlur('${studentName}',${idx},this.value)"
                style="border:1px solid #e2e8f0;border-radius:6px;padding:3px 9px;font-size:.75rem;min-width:160px;outline:none;font-family:inherit">
            </div>
          </div>
          <div class="trail-item-actions">
            <button class="trail-action-btn" onclick="trailMoveUp('${studentName}',${idx})" title="Subir">↑</button>
            <button class="trail-action-btn" onclick="trailMoveDown('${studentName}',${idx})" title="Descer">↓</button>
            <button class="trail-action-btn" style="color:#ef4444;border-color:#fee2e2" onclick="trailRemoveItem('${studentName}',${idx})" title="Remover">✕</button>
          </div>
        </div>`;
      }).join('')
    : `<div style="padding:16px;text-align:center;color:#94a3b8;font-size:.84rem;background:#FFFFFF;border-radius:8px;border:2px dashed #e2e8f0">
        Nenhum item adicionado. Use o seletor abaixo para montar a trilha deste aluno.</div>`;

  // Picker de módulos
  const pickerHtml=LEVELS.map(lv=>{
    const doneCount=((studData.progress||{})[lv]||[]).length;
    const items=CONTENT[lv].map((m,i)=>{
      const inTrail=td.trail.some(t=>t.type==='module'&&t.level===lv&&t.modIdx===i);
      const isSkip=!!td.skipped[`${lv}-${i}`];
      const isDone=((studData.progress||{})[lv]||[]).includes(i);
      return `<div class="mod-picker-item">
        <span style="flex:1;font-size:.79rem">${m.title}${isDone?` <span style="color:#10b981;font-size:.7rem">✓</span>`:''}</span>
        ${isSkip
          ? `<span style="font-size:.69rem;color:#64748b;background:#F5F5F5;padding:2px 7px;border-radius:7px;font-weight:700">Dispensado</span>
             <button class="mod-picker-skip" onclick="trailUnskipModule('${studentName}','${lv}',${i})">Restaurar</button>`
          : `<button class="mod-picker-skip" onclick="trailSkipModule('${studentName}','${lv}',${i})" title="Marcar como dispensável para este aluno">Dispensar</button>`}
        ${inTrail
          ? `<span style="font-size:.69rem;color:#F57F17;font-weight:700;background:#fff8e1;padding:2px 7px;border-radius:7px">✓ Na trilha</span>`
          : `<button class="mod-picker-add" onclick="trailAddModule('${studentName}','${lv}',${i})">+ Trilha</button>`}
      </div>`;
    }).join('');
    return `<details class="mod-picker-level">

    : '<p style="color:#94a3b8;font-size:.82rem;margin-bottom:6px">Nenhuma atividade extra criada ainda.</p>';

  const builderSection=extraBuilder&&extraBuilder.studentName===studentName

        ⭐ Criar Nova Atividade Extra</button>`;

  el.innerHTML=`
    <div style="background:#faf8ff;border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)">
      <div style="font-size:.92rem;font-weight:700;color:#F57F17;margin-bottom:12px;display:flex;align-items:center;gap:8px">
        📍 Trilha Personalizada
        <span style="background:#fff8e1;color:#F57F17;font-size:.71rem;padding:2px 9px;border-radius:10px;font-weight:700">${td.trail.length} itens</span>
      </div>

    <div style="background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)">
