/* ── Trilha do professor — visão do aluno (home page) ──────── */
function renderPersonalizedTrail(){
  const sn=currentUser.name;
  const td=getTrailData(sn);
  if(!td.trail.length) return '';
  const studData=getStudents()[sn]||{};

  const steps=td.trail.map((item,i)=>{
    let title='',meta='',isDone=false,isSkip=false,action='',extraId='';
    if(item.type==='module'){
      const mod=CONTENT[item.level]?.[item.modIdx];
      if(!mod) return '';
      isDone=((studData.progress||{})[item.level]||[]).includes(item.modIdx);
      isSkip=(item.status==='skip')||!!td.skipped[`${item.level}-${item.modIdx}`];
      title=mod.title;
      const skills=(SKILL_TAGS[`${item.level}-${item.modIdx}`]||[]).map(s=>`<span style="color:${SKILL_COLORS[s]};font-size:.63rem">${SKILL_LABELS[s]}</span>`).join(' · ');
      meta=`Nível ${item.level} · Módulo ${item.modIdx+1} · ${skills}`;
      if(!isDone&&!isSkip) action=`onclick="currentLevel='${item.level}';showLevel('${item.level}');showModule(${item.modIdx})"`;
    } else if(item.type==='extra'){
      const ex=td.extras[item.extraId];
      if(!ex) return '';
      isDone=ex.done; extraId=item.extraId;
      title=`⭐ ${ex.title}`;
      const nb2=ex.exercises.length, ni2=ex.exercises.filter(e=>['mc','fill','tf','redacao'].includes(e.type)).length;
      meta=`Atividade Extra · ${nb2} bloco${nb2!==1?'s':''}${ni2>0?` · ${ni2} interativo${ni2!==1?'s':''}`:''}`;
      if(!isDone) action=`onclick="showExtraActivity('${extraId}')"`;
    }
    const isOpt=item.status==='optional';
    const cls=isDone?'trail-step-done':isSkip?'trail-step-skip':item.type==='extra'?'trail-step-extra':'trail-step-active';
    const num=isDone?'✓':(i+1);
    const numBg=isDone?'#dcfce7':isSkip?'#F5F5F5':item.type==='extra'?'#fff7ed':'#ede9fe';
    const numCol=isDone?'#166534':isSkip?'#94a3b8':item.type==='extra'?'#c2410c':'#F57F17';
    return `<div class="trail-step ${cls}" ${action}>
      <div style="width:30px;height:30px;border-radius:50%;background:${numBg};display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:${numCol};flex-shrink:0">${num}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span style="font-size:.87rem;font-weight:600;color:${isDone?'#6b7280':'#C62828'}">${title}</span>
          ${isOpt?`<span style="font-size:.66rem;color:#166534;background:#f0fdf4;padding:1px 7px;border-radius:8px;font-weight:700">Opcional</span>`:''}
          ${isSkip?`<span style="font-size:.66rem;color:#64748b;background:#F5F5F5;padding:1px 7px;border-radius:8px;font-weight:700">Pode pular</span>`:''}
        </div>
        <div style="font-size:.72rem;color:#718096;margin-top:1px">${meta}</div>
        ${item.note?`<div style="font-size:.73rem;color:#F57F17;margin-top:2px;font-style:italic">💬 ${item.note}</div>`:''}
      </div>
      ${!isDone&&!isSkip?'<span style="color:#F57F17;font-size:1.1rem;flex-shrink:0">›</span>':''}
    </div>`;
  }).join('');

  const doneCount=td.trail.filter(item=>{
    if(item.type==='module') return ((studData.progress||{})[item.level]||[]).includes(item.modIdx);
    if(item.type==='extra') return td.extras[item.extraId]?.done;
    return false;
  }).length;

  return `<div class="trail-container" style="background:#fff;border-radius:14px;padding:18px 22px;margin-bottom:22px;box-shadow:0 2px 12px rgba(0,0,0,.08);border-top:4px solid #FBC02D">
    <h3 style="font-size:.95rem;font-weight:700;color:#F57F17;margin-bottom:4px;display:flex;align-items:center;gap:8px">
      📍 Trilha do Professor
    </h3>
    <p style="font-size:.75rem;color:#9ca3af;margin-bottom:12px">${doneCount}/${td.trail.length} concluídos</p>
    <div>${steps}</div>
  </div>`;
}

/* ── Atividade extra — visão do aluno ──────────────────────── */
function showExtraActivity(extraId){
  const sn=currentUser.name;
  const td=getTrailData(sn);
  const ex=td.extras[extraId];
  if(!ex) return;
  hidePanels();
  document.getElementById('module-content').style.display='';

  // Tipos interativos (precisam de resposta)
  const INTERACTIVE=['mc','fill','tf','redacao'];
  const interactiveBlocks=ex.exercises.filter(e=>INTERACTIVE.includes(e.type));
  const answeredInteractive=interactiveBlocks.filter((e,_)=>{
    const gi=ex.exercises.indexOf(e);
    return !!ex.answers[gi];
  });

  let blockNum=0; // contador só para blocos interativos
  const blocksHtml=ex.exercises.map((e,ei)=>{
    const prev=ex.answers[ei];
    const was=!!prev;

    if(e.type==='text'){
      // Renderiza o texto do professor (permite HTML básico)
      return `<div style="background:#FFFFFF;border-left:4px solid #94a3b8;border-radius:0 10px 10px 0;padding:13px 16px;margin-bottom:12px;font-size:.92rem;line-height:1.75;color:#374151">${e.question||''}</div>`;
    }
    if(e.type==='link'){
      const label=e.label||e.question||'Abrir link';
      return `<div style="background:#fff8e1;border-radius:10px;padding:12px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
        <span style="font-size:1.4rem">🔗</span>
        <a href="${e.question||'#'}" target="_blank" rel="noopener" style="color:#1d4ed8;font-weight:700;font-size:.92rem;text-decoration:none;background:#dbeafe;padding:6px 16px;border-radius:8px;display:inline-block">${label} ↗</a>
      </div>`;
    }
    if(e.type==='video'){
      const embed=ytEmbed(e.question||'');
      return `<div style="margin-bottom:14px">
        ${embed||`<a href="${e.question||'#'}" target="_blank" rel="noopener" style="color:#F57F17;font-weight:700">🎬 Assistir vídeo ↗</a>`}
      </div>`;
    }
    if(e.type==='image'){
      return `<div style="margin-bottom:14px;text-align:center">
        <img src="${e.question||''}" alt="${e.label||'imagem'}" style="max-width:100%;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)">
        ${e.label?`<div style="font-size:.78rem;color:#6b7280;margin-top:5px">${e.label}</div>`:''}
      </div>`;
    }
    if(e.type==='redacao'){
      blockNum++;
      const savedText=was?prev.value:'';
      return `<div class="ex-item">
        <p style="font-weight:600;margin-bottom:8px">${blockNum}. ${e.question||'Redação livre'}</p>
        <textarea id="eredacao_${ei}" placeholder="Escreva sua resposta aqui…"
          style="width:100%;border:2px solid ${was?'#10b981':'#e2e8f0'};border-radius:8px;padding:10px;font-size:.88rem;min-height:110px;resize:vertical;outline:none;font-family:inherit;box-sizing:border-box"
          ${was?'disabled':''}>${savedText}</textarea>
        ${was
          ?`<div class="feedback show ok" style="margin-top:6px">✓ Resposta enviada. O professor irá revisar.</div>`
          :`<button class="check-btn" style="margin-top:6px" onclick="saveRedacaoAnswer('${extraId}',${ei})">Enviar respuesta</button>`}
      </div>`;
    }
    // Tipos de exercício interativo
    if(e.type==='mc'){
      blockNum++;
      let opts='';
      e.options.forEach((o,oi)=>{
        let cls='opt-btn',dis='';
        if(was){dis='disabled'; if(oi===e.answer) cls+=' correct'; else if(prev.value===oi) cls+=' wrong';}
        opts+=`<button class="${cls}" id="eopt_${ei}_${oi}" onclick="checkExtraAnswerMC('${extraId}',${ei},${oi},${e.answer})" ${dis}>${o}</button>`;
      });
      const fb=was?`<div class="feedback show ${prev.correct?'ok':'no'}">${prev.correct?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.'}</div>`:`<div class="feedback" id="efb_${ei}"></div>`;
      return `<div class="ex-item"><p>${blockNum}. ${e.question}</p><div class="options">${opts}</div>${fb}</div>`;
    }
    if(e.type==='fill'){
      blockNum++;
      const cls2=was?(prev.correct?'fill-input correct':'fill-input wrong'):'fill-input';
      const esc=(e.answer||'').toLowerCase().replace(/'/g,"\\'");
      const fb=was?`<div class="feedback show ${prev.correct?'ok':'no'}">${prev.correct?'¡Muy bien! &#10003;':'¡Ups! Resposta: '+(e.answer.split('|')[0])}</div>`:`<div class="feedback" id="efb_${ei}"></div>`;
      return `<div class="ex-item"><p>${blockNum}. ${e.question}</p>
        <input class="${cls2}" id="efill_${ei}" value="${was?prev.value:''}" placeholder="Sua resposta…" ${was?'disabled':''}>
        <br>${was?'':`<button class="check-btn" onclick="checkExtraAnswerFill('${extraId}',${ei},'${esc}')">Comprobar</button>`}
        ${fb}</div>`;
    }
    if(e.type==='tf'){
      blockNum++;
      let c0='opt-btn',c1='opt-btn',dis='';
      if(was){dis='disabled'; if(e.answer===true) c0+=' correct'; else c1+=' correct';
        if(prev.value===true&&!prev.correct) c0+=' wrong'; if(prev.value===false&&!prev.correct) c1+=' wrong';}
      const fb=was?`<div class="feedback show ${prev.correct?'ok':'no'}">${prev.correct?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.'}</div>`:`<div class="feedback" id="efb_${ei}"></div>`;
      return `<div class="ex-item"><p>${blockNum}. ${e.question}</p>
        <div class="options">
          <button class="${c0}" id="etf_${ei}_0" onclick="checkExtraAnswerTF('${extraId}',${ei},true,${e.answer})" ${dis}>Verdadeiro</button>
          <button class="${c1}" id="etf_${ei}_1" onclick="checkExtraAnswerTF('${extraId}',${ei},false,${e.answer})" ${dis}>Falso</button>
        </div>${fb}</div>`;
    }
    return '';
  }).join('');

  const doneBtn=ex.done?'':`<div id="extra-manual-done" style="margin-top:16px;text-align:center">
    <button onclick="markExtraDone('${extraId}')" style="background:#FBC02D;color:#fff;border:none;padding:10px 28px;border-radius:9px;cursor:pointer;font-size:.9rem;font-weight:700">
      ✓ Marcar atividade como concluída
    </button>
  </div>`;

  const wrapperLabel=interactiveBlocks.length
    ?`<h3 style="font-size:.93rem;font-weight:700;color:#2d3748;margin-bottom:14px">Conteúdo e exercícios</h3>`
    :'';

  let html=`<div class="module-card">
    <button class="back-btn" onclick="showHome()">&#8592; Voltar ao início</button>
    <span class="module-tag" style="background:#fff7ed;color:#c2410c">⭐ Atividade Extra</span>
    <h2>${ex.title}</h2>
    ${ex.desc?`<p style="color:#718096;margin-top:6px;font-size:.9rem;line-height:1.65">${ex.desc}</p>`:''}
  </div>
  <div class="exercise-section">
    ${wrapperLabel}
    ${blocksHtml}
    <div id="extra-result">${ex.done?`<div style="background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:16px 18px;margin-top:10px">
      <div style="font-size:1rem;font-weight:800;color:#166534">✅ Atividade concluída!</div>
      <p style="font-size:.84rem;color:#166534;margin-top:4px">El profesor puede ver tu progreso. ¡Sigue así!</p>
    </div>`:''}
    </div>
    ${doneBtn}
  </div>
  <div class="nav-btns"><button class="nav-btn home-btn" onclick="showHome()">&#127968; Início</button></div>`;

  document.getElementById('module-content').innerHTML=html;
  window.scrollTo(0,0);
}

function markExtraDone(extraId){
  const sn=currentUser.name; const td=getTrailData(sn);
  const ex=td.extras[extraId]; if(!ex) return;
  ex.done=true; saveTrailData(sn,td);
  const doneDiv=document.getElementById('extra-manual-done');
  if(doneDiv) doneDiv.remove();
  const res=document.getElementById('extra-result');
  if(res) res.innerHTML=`<div style="background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:16px 18px;margin-top:10px">
    <div style="font-size:1rem;font-weight:800;color:#166534">✅ Atividade concluída!</div>
    <p style="font-size:.84rem;color:#166534;margin-top:4px">Registrado. El profesor puede ver tu progreso. ¡Sigue así!</p>
    <button class="nav-btn" onclick="showHome()" style="margin-top:10px">🏠 Voltar ao início</button>
  </div>`;
}

function saveRedacaoAnswer(extraId,ei){
  const sn=currentUser.name; const td=getTrailData(sn);
  const ex=td.extras[extraId]; if(!ex) return;
  const ta=document.getElementById(`eredacao_${ei}`);
  if(!ta) return;
  const val=ta.value.trim();
  if(!val){alert('Escreva sua resposta antes de enviar.');return;}
  ta.disabled=true;
  ex.answers[ei]={value:val,correct:true,ts:Date.now(),type:'redacao'};
  // Verificar se todos os interativos foram respondidos
  const INTERACTIVE=['mc','fill','tf','redacao'];
  const allDone=ex.exercises.every((e,idx)=>!INTERACTIVE.includes(e.type)||!!ex.answers[idx]);
  if(allDone) ex.done=true;
  saveTrailData(sn,td);
  // Feedback inline
  const btn=ta.nextElementSibling;
  if(btn&&btn.tagName==='BUTTON') btn.style.display='none';
  const fb=document.createElement('div');
  fb.className='feedback show ok'; fb.style.marginTop='6px';
  fb.textContent='✓ Resposta enviada. O professor irá revisar.';
  ta.insertAdjacentElement('afterend',fb);
  if(allDone){
    const res=document.getElementById('extra-result');
    if(res) res.innerHTML=`<div style="background:#f0fdf4;border:2px solid #86efac;border-radius:12px;padding:14px 16px;margin-top:12px">
      <div style="font-weight:800;color:#166534">✅ Atividade concluída!</div>
      <p style="font-size:.84rem;color:#166534">O professor verá suas respostas.</p></div>`;
    const md=document.getElementById('extra-manual-done'); if(md) md.remove();
  }
}

function saveExtraAnswer(extraId,ei,value,correct){
  const sn=currentUser.name; const td=getTrailData(sn);
  const ex=td.extras[extraId]; if(!ex) return;
  ex.answers[ei]={value,correct,ts:Date.now()};
  const INTERACTIVE=['mc','fill','tf','redacao'];
  const allDone=ex.exercises.every((e,idx)=>!INTERACTIVE.includes(e.type)||!!ex.answers[idx]);
  if(allDone) ex.done=true;
  saveTrailData(sn,td);
  if(allDone){
    const c=Object.values(ex.answers).filter(a=>a.correct&&a.type!=='redacao').length;
    const t=ex.exercises.filter(e=>['mc','fill','tf'].includes(e.type)).length;
    const el=document.getElementById('extra-result'); if(!el) return;
    const ok=t>0&&c===t;
    const bg=ok?'#f0fdf4':'#fff7ed', bd=ok?'#86efac':'#fcd34d', col=ok?'#166534':'#92400e';
    const scoreStr=t>0?` — ${c}/${t} corretas`:'';
    el.innerHTML=`<div style="background:${bg};border:2px solid ${bd};border-radius:12px;padding:16px 18px;margin-top:14px">
      <div style="font-size:1rem;font-weight:800;color:${col};margin-bottom:4px">${ok?'🎉 ¡Perfecto!':'📝 Atividade concluída!'}${scoreStr}</div>
      <p style="font-size:.84rem;color:${col}">Resultado registrado. O professor pode ver suas respostas.</p>
      <button class="nav-btn" onclick="showHome()" style="margin-top:10px">&#127968; Voltar ao início</button>
    </div>`;
    const md=document.getElementById('extra-manual-done'); if(md) md.remove();
    el.scrollIntoView({behavior:'smooth',block:'center'});
  }
}
function checkExtraAnswerMC(extraId,ei,chosen,correct){
  document.querySelectorAll(`[id^="eopt_${ei}_"]`).forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  document.getElementById(`eopt_${ei}_${chosen}`)?.classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById(`eopt_${ei}_${correct}`)?.classList.add('correct');
  const fb=document.getElementById(`efb_${ei}`);
  if(fb){fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.';fb.className='feedback show '+(ok?'ok':'no');}
  saveExtraAnswer(extraId,ei,chosen,ok);
}
function checkExtraAnswerFill(extraId,ei,correct){
  const inp=document.getElementById(`efill_${ei}`);
  const val=inp.value.trim().toLowerCase();
  const ok=correct.split('|').includes(val);
  inp.classList.add(ok?'correct':'wrong'); inp.disabled=true;
  const btn=inp.nextElementSibling; if(btn&&btn.tagName==='BUTTON') btn.style.display='none';
  const fb=document.getElementById(`efb_${ei}`);
  if(fb){fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Resposta: <strong>'+correct.split('|')[0]+'</strong>';fb.className='feedback show '+(ok?'ok':'no');}
  saveExtraAnswer(extraId,ei,val,ok);
}
function checkExtraAnswerTF(extraId,ei,chosen,correct){
  document.querySelectorAll(`[id^="etf_${ei}_"]`).forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  document.getElementById(`etf_${ei}_${chosen?0:1}`)?.classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById(`etf_${ei}_${correct?0:1}`)?.classList.add('correct');
  const fb=document.getElementById(`efb_${ei}`);
  if(fb){fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.';fb.className='feedback show '+(ok?'ok':'no');}
  saveExtraAnswer(extraId,ei,chosen,ok);
}

/* ── Visualizar atividade extra — professor ─────────────────── */
function showTeacherExtraActivity(studentName,extraId){

  const INTERACTIVE=['mc','fill','tf','redacao'];

  const answered=interactive.filter((e,_)=>{const gi=ex.exercises.indexOf(e);return !!ex.answers[gi];}).length;
  const correct=Object.values(ex.answers).filter(a=>a.correct&&a.type!=='redacao').length;
  const scored=ex.exercises.filter(e=>['mc','fill','tf'].includes(e.type)).length;

  const BLOCK_LABELS={text:'📝 Texto',link:'🔗 Link',video:'🎬 Vídeo',image:'🖼 Imagem',redacao:'✍️ Redação',mc:'🔘 Múltipla Escolha',fill:'🔤 Completar',tf:'✅ V ou F'};

  let html=`<button class="t-back-btn" onclick="showStudentDetail('${studentName}');setTimeout(()=>showStudentTab('trail'),50)">&#8592; Voltar para trilha</button>
    <div style="background:#fff;border-radius:14px;padding:20px 26px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <span style="background:#fff7ed;color:#c2410c;font-size:.72rem;font-weight:700;padding:3px 12px;border-radius:12px">⭐ Atividade Extra</span>
        <span style="background:${ex.done?'#dcfce7':'#fef3c7'};color:${ex.done?'#166534':'#92400e'};font-size:.72rem;font-weight:700;padding:3px 12px;border-radius:12px">${ex.done?'✓ Concluída pelo aluno':'Não concluída'}</span>
        ${scored>0?`<span style="font-size:.72rem;color:#374151;font-weight:600">${correct}/${scored} corretas</span>`:''}
      </div>
      <h2 style="font-size:1.2rem;color:#C62828;margin-bottom:6px">${ex.title}</h2>
      ${ex.desc?`<p style="color:#718096;font-size:.88rem;line-height:1.6">${ex.desc}</p>`:''}
      <div style="margin-top:10px;font-size:.79rem;color:#6b7280">${ex.exercises.length} bloco${ex.exercises.length!==1?'s':''} · ${interactive.length} interativo${interactive.length!==1?'s':''} · ${answered}/${interactive.length} respondido${answered!==1?'s':''}</div>
    </div>
    <div style="background:#FFFFFF;border-radius:12px;padding:20px 24px;margin-bottom:16px">
      <h3 style="font-size:.95rem;font-weight:700;color:#2d3748;margin-bottom:14px">Conteúdo da atividade</h3>`;

  let bnum=0;
  ex.exercises.forEach((e,ei)=>{
    const ans=ex.answers[ei];
    const label=BLOCK_LABELS[e.type]||e.type;

    if(e.type==='text'){
      html+=`<div style="background:#FFFFFF;border-left:4px solid #94a3b8;border-radius:0 10px 10px 0;padding:12px 15px;margin-bottom:10px">
        <div style="font-size:.68rem;font-weight:700;color:#9ca3af;margin-bottom:5px">${label}</div>
        <div style="font-size:.87rem;color:#374151;line-height:1.7">${e.question||''}</div>
      </div>`;
      return;
    }
    if(e.type==='link'){
      html+=`<div style="background:#fff8e1;border-radius:10px;padding:11px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
        <span style="font-size:.68rem;font-weight:700;color:#1d4ed8;background:#dbeafe;padding:2px 8px;border-radius:7px">${label}</span>
        <a href="${e.question||'#'}" target="_blank" style="font-size:.86rem;color:#1d4ed8;font-weight:600">${e.label||e.question} ↗</a>
      </div>`;
      return;
    }
    if(e.type==='video'){
      const embed=ytEmbed(e.question||'');
      html+=`<div style="margin-bottom:12px">
        <span style="font-size:.68rem;font-weight:700;color:#F57F17;background:#fff8e1;padding:2px 8px;border-radius:7px">${label}</span>
        ${embed||`<a href="${e.question||'#'}" target="_blank" style="color:#F57F17;font-size:.86rem;display:block;margin-top:6px">${e.question}</a>`}
      </div>`;
      return;
    }
    if(e.type==='image'){
      html+=`<div style="margin-bottom:12px;text-align:center">
        <span style="font-size:.68rem;font-weight:700;color:#0369a1;background:#e0f2fe;padding:2px 8px;border-radius:7px">${label}</span>
        <img src="${e.question||''}" alt="${e.label||''}" style="max-width:100%;border-radius:9px;margin-top:7px;box-shadow:0 2px 8px rgba(0,0,0,.1)">
        ${e.label?`<div style="font-size:.77rem;color:#6b7280;margin-top:4px">${e.label}</div>`:''}
      </div>`;
      return;
    }
    if(e.type==='redacao'){
      bnum++;
      html+=`<div style="background:${ans?'#f0fdf4':'#fff7ed'};border:1.5px solid ${ans?'#bbf7d0':'#fed7aa'};border-radius:10px;padding:13px 16px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">
          <span style="font-size:.68rem;font-weight:700;color:#c2410c;background:#fed7aa;padding:2px 8px;border-radius:7px">${label}</span>
          ${ans?`<span style="font-size:.74rem;font-weight:700;color:#059669">✓ Respondida — aguarda revisão</span>`:`<span style="font-size:.74rem;color:#94a3b8">Não respondida</span>`}
        </div>
        <p style="font-weight:600;color:#333333;font-size:.88rem;margin-bottom:8px">${bnum}. ${e.question}</p>
        ${ans?`<div style="background:#fff;border:1px solid #d1fae5;border-radius:8px;padding:10px 13px;font-size:.87rem;color:#333333;line-height:1.65;white-space:pre-wrap">${ans.value||''}</div>`
             :`<div style="font-size:.82rem;color:#94a3b8;font-style:italic">O aluno ainda não respondeu.</div>`}
      </div>`;
      return;
    }
    // mc / fill / tf
    const bg=ans?(ans.correct?'#f0fdf4':'#fff1f2'):'#fff';
    const bd=ans?(ans.correct?'#bbf7d0':'#fecdd3'):'#e2e8f0';
    bnum++;
    html+=`<div style="background:${bg};border:1.5px solid ${bd};border-radius:10px;padding:13px 16px;margin-bottom:9px">
      <div style="display:flex;align-items:center;gap:7px;margin-bottom:7px">
        <span style="font-size:.68rem;font-weight:700;background:#ffebee;color:#C62828;padding:2px 8px;border-radius:8px">${label}</span>
        ${ans?`<span style="font-size:.74rem;font-weight:700;color:${ans.correct?'#059669':'#dc2626'}">${ans.correct?'✓ Correta':'✗ Incorreta'}</span>`:`<span style="font-size:.74rem;color:#94a3b8">Não respondida</span>`}
      </div>
      <p style="font-weight:600;color:#333333;font-size:.88rem;margin-bottom:8px">${bnum}. ${e.question}</p>`;

    if(e.type==='mc'){
      html+=`<div style="display:flex;flex-direction:column;gap:4px">`;
      e.options.forEach((opt,oi)=>{
        const isC=oi===e.answer,isCh=ans&&ans.value===oi;
        let bg2='#F5F5F5',bd2='#e2e8f0',col='#374151',pf='';
        if(isC){bg2='#dcfce7';bd2='#10b981';col='#065f46';pf='✓ ';}
        if(isCh&&!isC){bg2='#fee2e2';bd2='#ef4444';col='#7f1d1d';pf='✗ ';}
        html+=`<div style="background:${bg2};border:1.5px solid ${bd2};border-radius:7px;padding:5px 10px;font-size:.83rem;color:${col};font-weight:${isC||isCh?600:400}">${pf}${opt}</div>`;
      });
      html+=`</div>`;
    } else if(e.type==='tf'){
      [true,false].forEach(val=>{
        const isC=val===e.answer,isCh=ans&&ans.value===val;
        let bg2='#F5F5F5',bd2='#e2e8f0',col='#374151',pf='';
        if(isC){bg2='#dcfce7';bd2='#10b981';col='#065f46';pf='✓ ';}
        if(isCh&&!isC){bg2='#fee2e2';bd2='#ef4444';col='#7f1d1d';pf='✗ ';}
        html+=`<div style="background:${bg2};border:1.5px solid ${bd2};border-radius:7px;padding:5px 10px;font-size:.83rem;color:${col};font-weight:${isC||isCh?600:400};margin-bottom:3px">${pf}${val?'Verdadeiro':'Falso'}</div>`;
      });
    } else if(e.type==='fill'&&ans){
      const studentTxt=ans.value,correctTxt=(e.answer||'').split('|')[0];
      html+=`<div style="display:flex;gap:12px;flex-wrap:wrap">
        <div><div style="font-size:.67rem;color:#94a3b8;font-weight:600;margin-bottom:2px">ALUNO</div>
        <span style="background:${ans.correct?'#dcfce7':'#fee2e2'};color:${ans.correct?'#065f46':'#7f1d1d'};padding:4px 11px;border-radius:7px;font-size:.86rem;font-weight:600">${studentTxt||'(vazio)'}</span></div>
        ${!ans.correct?`<div><div style="font-size:.67rem;color:#94a3b8;font-weight:600;margin-bottom:2px">CORRETO</div>
        <span style="background:#dbeafe;color:#1e40af;padding:4px 11px;border-radius:7px;font-size:.86rem;font-weight:600">${correctTxt}</span></div>`:''}
      </div>`;
    } else if(e.type==='fill'&&!ans){
      html+=`<span style="font-size:.83rem;color:#94a3b8">Resposta correta: <strong>${(e.answer||'').split('|')[0]}</strong></span>`;
    }
    html+=`</div>`;
  });

  html+=`</div>`;
  document.getElementById('teacher-content').innerHTML=teacherNav('students')+html;
  window.scrollTo(0,0);
}

   PROVA DIAGNÓSTICA — funções do aluno

let diagnosticState = null; // { level, answers:{}, started }

function hidePanels(){
  document.getElementById('home').style.display='none';
  document.getElementById('module-list').style.display='none';
  document.getElementById('module-content').style.display='none';
  document.getElementById('diagnostic-content').style.display='none';
}

function showDiagnosticTest(level){
  if(!DIAGNOSTIC_TESTS[level]) return;
  diagnosticState = { level, answers:{}, started: Date.now() };
  hidePanels();
  document.getElementById('diagnostic-content').style.display='';
  renderDiagnosticPage(level);
  window.scrollTo(0,0);
}

function renderDiagnosticPage(level){
  const test = DIAGNOSTIC_TESTS[level];
  const levelColors={A1:'#10b981',A2:'#3b82f6',B1:'#8b5cf6',B2:'#f59e0b',C1:'#ef4444',C2:'#ec4899'};
  const col = levelColors[level]||'#C62828';

  // Resultado anterior (se já fez)
  const s = getStudents()[currentUser.name]||{};
  const prev = (s.diagnosticResults||{})[level];
  let prevBanner='';
  if(prev){
    const badge = prev.passed
      ? `<span class="diag-result-badge diag-pass">✓ Aprovado (${prev.pct}%)</span>`
      : `<span class="diag-result-badge diag-fail">✗ Necessita revisão (${prev.pct}%)</span>`;
    prevBanner = `<div style="background:#FFFFFF;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.83rem;color:#374151">
      <strong>Último resultado:</strong> ${prev.correct}/${prev.total} corretas — ${badge}
      <span style="color:#9ca3af;margin-left:6px">em ${new Date(prev.ts).toLocaleDateString('pt-BR')}</span>
      <span style="color:#6b7280"> &nbsp;·&nbsp; Você pode refazer para atualizar.</span>
    </div>`;
  }

  const exHtml = test.exercises.map((ex,ei)=>renderDiagExercise(ex,ei)).join('');

  document.getElementById('diagnostic-content').innerHTML=`
    <div style="max-width:820px;margin:22px auto;padding:0 16px">
      <button class="back-btn" onclick="showLevel('${level}')">&#8592; Voltar para módulos</button>
      <div class="module-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <span style="background:${col};color:#fff;font-size:.72rem;font-weight:700;padding:3px 12px;border-radius:12px">NÍVEL ${level}</span>
          <span style="background:#fef3c7;color:#92400e;font-size:.72rem;font-weight:700;padding:3px 12px;border-radius:12px">📋 PROVA DIAGNÓSTICA</span>
        </div>
        <h2>${test.title}</h2>
        <p style="color:#718096;font-size:.88rem;margin-top:4px;margin-bottom:12px">${test.desc}</p>
        ${prevBanner}
        <div style="background:#fffbeb;border-left:4px solid #f59e0b;border-radius:0 8px 8px 0;padding:10px 14px;font-size:.84rem;color:#92400e">
          📝 <strong>${test.exercises.length} questões</strong> cobrindo todas as habilidades do nível ${level}. Suas respostas ajudam o professor a personalizar suas aulas.
        </div>
      </div>
      <div class="exercise-section">
        <h3>Questões da Prova</h3>
        <div id="diag-exercises">${exHtml}</div>
        <div id="diag-result"></div>
      </div>
    </div>`;
}

function renderDiagExercise(ex,ei){
  if(ex.type==='mc'){
    const opts=ex.options.map((o,oi)=>
      `<button class="opt-btn" id="dopt_${ei}_${oi}" onclick="checkDiagMC(${ei},${oi},${ex.answer})">${o}</button>`
    ).join('');
    return `<div class="ex-item" id="dex_${ei}"><p>${ei+1}. ${ex.question}</p>
      <div class="options">${opts}</div>
      <div class="feedback" id="dfb_${ei}"></div></div>`;
  }
  if(ex.type==='fill'){
    const esc=ex.answer.toLowerCase().replace(/'/g,"\\'");
    return `<div class="ex-item" id="dex_${ei}"><p>${ei+1}. ${ex.question}</p>
      <input class="fill-input" id="dfill_${ei}" placeholder="Sua resposta...">
      <br><button class="check-btn" onclick="checkDiagFill(${ei},'${esc}')">Comprobar</button>
      <div class="feedback" id="dfb_${ei}"></div></div>`;
  }
  if(ex.type==='tf'){
    return `<div class="ex-item" id="dex_${ei}"><p>${ei+1}. ${ex.question}</p>
      <div class="options">
        <button class="opt-btn" id="dopt_${ei}_0" onclick="checkDiagTF(${ei},true,${ex.answer})">Verdadeiro</button>
        <button class="opt-btn" id="dopt_${ei}_1" onclick="checkDiagTF(${ei},false,${ex.answer})">Falso</button>
      </div><div class="feedback" id="dfb_${ei}"></div></div>`;
  }
  return '';
}

function checkDiagMC(ei,chosen,correct){
  if(!diagnosticState||diagnosticState.answers[ei]!==undefined) return;
  document.querySelectorAll(`[id^="dopt_${ei}_"]`).forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  document.getElementById(`dopt_${ei}_${chosen}`).classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById(`dopt_${ei}_${correct}`).classList.add('correct');
  const fb=document.getElementById(`dfb_${ei}`);
  fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.';
  fb.className='feedback show '+(ok?'ok':'no');
  diagnosticState.answers[ei]=ok;
  checkDiagComplete();
}
function checkDiagFill(ei,correct){
  if(!diagnosticState||diagnosticState.answers[ei]!==undefined) return;
  const inp=document.getElementById(`dfill_${ei}`);
  const val=inp.value.trim().toLowerCase();
  const ok=correct.split('|').includes(val);
  inp.classList.add(ok?'correct':'wrong'); inp.disabled=true;
  const btn=inp.nextElementSibling; if(btn&&btn.tagName==='BUTTON') btn.style.display='none';
  const fb=document.getElementById(`dfb_${ei}`);
  fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Resposta: <strong>'+correct.split('|')[0]+'</strong>';
  fb.className='feedback show '+(ok?'ok':'no');
  diagnosticState.answers[ei]=ok;
  checkDiagComplete();
}
function checkDiagTF(ei,chosen,correct){
  if(!diagnosticState||diagnosticState.answers[ei]!==undefined) return;
  document.querySelectorAll(`[id^="dopt_${ei}_"]`).forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  document.getElementById(`dopt_${ei}_${chosen?0:1}`).classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById(`dopt_${ei}_${correct?0:1}`).classList.add('correct');
  const fb=document.getElementById(`dfb_${ei}`);
  fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.';
  fb.className='feedback show '+(ok?'ok':'no');
  diagnosticState.answers[ei]=ok;
  checkDiagComplete();
}

function checkDiagComplete(){
  if(!diagnosticState) return;
  const test=DIAGNOSTIC_TESTS[diagnosticState.level];
  if(Object.keys(diagnosticState.answers).length < test.exercises.length) return;

  const correct=Object.values(diagnosticState.answers).filter(Boolean).length;
  const total=test.exercises.length;
  const pct=Math.round(correct/total*100);
  const passed=pct>=60;

  // Breakdown por habilidade
  const sb={};
  Object.keys(SKILL_LABELS).forEach(sk=>sb[sk]={c:0,t:0});
  test.exercises.forEach((ex,ei)=>{
    const ok=diagnosticState.answers[ei];
    (ex.skills||['grammar']).forEach(sk=>{if(sb[sk]){sb[sk].t++;if(ok)sb[sk].c++;}});
  });

  // Salvar resultado
  const sData=getStudents();
  if(sData[currentUser.name]){
    if(!sData[currentUser.name].diagnosticResults) sData[currentUser.name].diagnosticResults={};
    sData[currentUser.name].diagnosticResults[diagnosticState.level]={
      correct,total,pct,passed,skillBreakdown:sb,ts:Date.now()
    };
    saveStudents(sData);
  }

  const skillRows=Object.entries(sb).filter(([,v])=>v.t>0).map(([sk,v])=>{
    const p=Math.round(v.c/v.t*100);
    const col=p<60?'#ef4444':p<80?'#f59e0b':'#10b981';
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <span style="width:85px;font-size:.78rem;color:#374151">${SKILL_ICONS[sk]} ${SKILL_LABELS[sk]}</span>
      <div style="flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden">
        <div style="width:${p}%;height:100%;background:${col};border-radius:4px;transition:.5s"></div>
      </div>
      <span style="font-size:.78rem;font-weight:700;color:${col};width:36px;text-align:right">${p}%</span>
    </div>`;
  }).join('');

  const lv=diagnosticState.level;
  const bg=passed?'#f0fdf4':'#fff7ed';
  const border=passed?'#86efac':'#fcd34d';
  const msgCol=passed?'#166534':'#92400e';
  const icon=passed?'🎉':'📚';
  const res=document.getElementById('diag-result');
  res.innerHTML=`<div style="background:${bg};border:2px solid ${border};border-radius:12px;padding:20px;margin-top:18px">
    <div style="font-size:1.4rem;font-weight:800;color:${msgCol};margin-bottom:6px">${icon} ${correct}/${total} corretas — ${pct}%</div>
    <p style="font-size:.85rem;color:${msgCol};margin-bottom:14px">
      ${passed?'Parabéns! Você demonstrou bom domínio do Nível '+lv+'.':'Continue praticando — o professor verá este resultado e poderá te ajudar nos pontos fracos.'}
    </p>
    ${skillRows?`<div style="margin-bottom:14px"><div style="font-size:.78rem;font-weight:700;color:#374151;margin-bottom:8px">Resultado por habilidade:</div>${skillRows}</div>`:''}
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="nav-btn" onclick="showLevel('${lv}')">&#8592; Voltar aos módulos</button>
      <button class="nav-btn home-btn" onclick="showHome()">&#127968; Início</button>
    </div>
  </div>`;
  res.scrollIntoView({behavior:'smooth',block:'center'});
  diagnosticState=null;
}

/* ── Verifica se o aluno está apto para fazer a diagnóstica ─── */
function canTakeDiagnostic(level){
  const progress=getProgress();
  const done=(progress[level]||[]).length;
  const total=CONTENT[level].length;
  return done >= Math.ceil(total * 0.7); // ≥70% concluído
}
function hasDiagnosticResult(level){
  const s=getStudents()[currentUser&&currentUser.name]||{};
  return !!(s.diagnosticResults&&s.diagnosticResults[level]);
}

function selectRole(role){
  document.getElementById('btn-student').classList.toggle('active', role==='student');
  document.getElementById('btn-teacher').classList.toggle('active', role==='teacher');
  document.getElementById('form-student').classList.toggle('show', role==='student');

  document.getElementById('err-student').classList.remove('show');

function loginStudent(){
  const name = document.getElementById('input-name').value.trim();
  if(!name){ document.getElementById('err-student').classList.add('show'); return; }
  currentUser = { type:'student', name };
  // Ensure student exists in storage
  const s = getStudents();
  if(!s[name]) s[name]={progress:{},answers:{}};
  saveStudents(s);
  localStorage.setItem('esp_session', JSON.stringify(currentUser));
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('user-badge').textContent = name;
  showHome();
}

function loginTeacher(){
  const pwd = document.getElementById('input-password').value;
  if(pwd !== TEACHER_PASSWORD){ document.getElementById('err-teacher').classList.add('show'); return; }
  currentUser = { type:'teacher' };
  localStorage.setItem('esp_session', JSON.stringify(currentUser));
  document.getElementById('login-screen').style.display='none';
  document.getElementById('teacher-area').style.display='block';
  renderTeacherPanel();
}

function logout(){
  localStorage.removeItem('esp_session');
  currentUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('teacher-area').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('input-name').value='';
  document.getElementById('input-password').value='';
  document.getElementById('form-student').classList.remove('show');
  document.getElementById('form-teacher').classList.remove('show');
  document.getElementById('btn-student').classList.remove('active');
  document.getElementById('btn-teacher').classList.remove('active');
}

function renderHome(){
  const levelMeta = {
    A1:{label:'Iniciante',    desc:'Primeiros passos',         cls:'lc-a1', color:'#10b981'},
    A2:{label:'Básico',       desc:'Comunicação do cotidiano', cls:'lc-a2', color:'#3b82f6'},
    B1:{label:'Pré-Interm.',  desc:'Situações mais complexas', cls:'lc-b1', color:'#8b5cf6'},
    B2:{label:'Intermediário',desc:'Fluência em expansão',     cls:'lc-b2', color:'#f59e0b'},
    C1:{label:'Avançado',     desc:'Domínio aprofundado',      cls:'lc-c1', color:'#ef4444'},
    C2:{label:'Proficiente',  desc:'Domínio completo',         cls:'lc-c2', color:'#ec4899'},
  };
  const progress = getProgress();
  const name = currentUser.name;

  // ── Saudação personalizada ────────────────────────────────────
  const hour = new Date().getHours();
  const period = hour < 12 ? '☀️ Bom dia' : hour < 18 ? '🌤️ Boa tarde' : '🌙 Boa noite';
  const initials = name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();

  // ── Dados para os cards ───────────────────────────────────────

    lastTitle = CONTENT[next.level][next.idx].title;

    lastAction = `currentLevel='${next.level}';showLevel('${next.level}');showModule(${next.idx})`;

    lastSub   = anyDone ? 'Você completou todos os níveis disponíveis.' : 'Seu primeiro módulo está esperando.';

  // Card 2: Atividades pendentes
  const td = getTrailData(name);
  const studData = getStudents()[name] || {};
  const pendentes = td.trail.filter(item => {
    if(item.type==='module'){
      const done = ((studData.progress||{})[item.level]||[]).includes(item.modIdx);
      return !done && item.status!=='skip';
    }
    if(item.type==='extra') return !td.extras[item.extraId]?.done;
    return false;
  });
  const pendCount = pendentes.length;
  const hasPend   = pendCount > 0;
  const hasTrail  = td.trail.length > 0;

  // Card 3: Progresso geral
  let totalDone = 0, totalMods = 0;
  LEVELS.forEach(lv => {
    totalMods += CONTENT[lv].length;
    totalDone += (progress[lv]||[]).length;
  });
  const overallPct = totalMods ? Math.round(totalDone/totalMods*100) : 0;
  const currentLvEntry = LEVELS.find(lv=>(progress[lv]||[]).length < CONTENT[lv].length) || LEVELS[LEVELS.length-1];
  const lvMeta = levelMeta[currentLvEntry];

  // ── Card 1 HTML ───────────────────────────────────────────────
  const card1 = `
    <div class="home-card clickable" style="border-color:#C62828" onclick="${lastAction}">
      <div class="home-card-label">📖 Continuar estudando</div>
      <div class="home-card-title">${lastTitle}</div>
      <div class="home-card-sub">${lastSub}</div>
      ${lastAction ? `<button class="home-card-action" style="background:#C62828;color:#fff" onclick="${lastAction}">¡Continuar! →</button>` :
        `<span style="font-size:.8rem;color:#10b981;font-weight:700">¡Todo completado! 🎉</span>`}
    </div>`;

  // ── Card 2 HTML ───────────────────────────────────────────────
  const card2 = `
    <div class="home-card${hasTrail?' clickable':''}" style="border-color:#FBC02D" ${hasTrail?'onclick="showTrailView()"':''}>
      <div class="home-card-label">📌 Atividades pendentes</div>
      ${hasPend
        ? `<div class="home-card-pct" style="color:#FBC02D">${pendCount}</div>
           <div class="home-card-title">${pendCount===1?'atividade':'atividades'} da trilha do professor</div>
           <div class="home-card-sub">${pendentes[0]?.type==='extra'?`"${td.extras[pendentes[0].extraId]?.title||'Atividade extra'}"`:
             `${CONTENT[pendentes[0].level]?.[pendentes[0].modIdx]?.title||''}`}</div>
           <button class="home-card-action" style="background:#FBC02D;color:#fff" onclick="showTrailView()">Ver trilha →</button>`
        : hasTrail
          ? `<div class="home-card-title" style="color:#10b981">¡Muy bien! Tudo em dia ✓</div>
             <div class="home-card-sub">Nenhuma atividade pendente na sua trilha.</div>`
          : `<div class="home-card-title" style="color:#9ca3af">Sem trilha ativa</div>
             <div class="home-card-sub">Seu professor ainda não montou uma trilha personalizada.</div>`}
    </div>`;

  // ── Card 3 HTML ───────────────────────────────────────────────
  const progColor = overallPct < 30 ? '#FBC02D' : overallPct < 70 ? '#3b82f6' : '#10b981';
  const card3 = `
    <div class="home-card" style="border-color:${progColor}">
      <div class="home-card-label">📊 Meu progresso</div>
      <div class="home-card-pct" style="color:${progColor}">${overallPct}%</div>
      <div class="home-card-progress"><div class="home-card-progress-fill" style="width:${overallPct}%;background:${progColor}"></div></div>
      <div class="home-card-title">${totalDone} de ${totalMods} módulos completados</div>
      <div class="home-card-sub">Nível atual: <strong>${currentLvEntry}</strong> — ${lvMeta.label}</div>
    </div>`;

  // ── Cartões de nível (compactos) ──────────────────────────────
  let cards = '';
  for(const [lv, m] of Object.entries(levelMeta)){
    const total     = CONTENT[lv].length;
    const done      = (progress[lv]||[]).length;
    const pct       = Math.round(done/total*100)||0;
    const unlocked  = isModuleUnlocked(lv, 0);
    const pctLabel  = pct===100
      ? `<span style="color:#10b981;font-weight:700;font-size:.82rem">¡Completado! ✓</span>`
      : `<span style="color:#C62828;font-weight:700;font-size:.95rem">${pct}%</span><span style="color:#718096;font-size:.76rem"> completado</span>`;
    const lockMsg = !unlocked
      ? `<div style="font-size:.68rem;color:#ef4444;margin-top:4px;font-weight:600">🔒 Complete ${LEVELS[LEVELS.indexOf(lv)-1]} primeiro</div>` : '';
    cards += `<div class="level-card ${m.cls}${!unlocked?' mod-locked':''}"
        onclick="${unlocked ? `showLevel('${lv}')` : `alert('¡Completa el nivel anterior para continuar! Você consegue.')`}">
      <div class="badge">${lv}</div>
      <h3>${m.label}</h3><p>${m.desc}</p>
      <div style="margin-top:8px">${pctLabel}</div>
      <p style="margin-top:3px;font-size:.73rem;color:#718096">${done}/${total} módulos</p>
      <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${lockMsg}
    </div>`;
  }

  // ── Conteúdo extra (trilha / caminho adaptativo) ──────────────
  const adaptivePath      = renderAdaptivePath();
  const personalizedTrail = renderPersonalizedTrail();
  const stats = getSkillStats(name);
  const bars  = renderSkillBars(stats);
  const weak  = getWeakSkills(stats);
  const skillPanel = bars ? `
    <div style="background:#fff;border-radius:12px;padding:18px 22px;margin-bottom:22px;box-shadow:0 2px 8px rgba(0,0,0,.07)">
      <h3 style="font-size:.9rem;font-weight:700;color:#C62828;margin-bottom:12px">Seu desempenho por habilidade</h3>
      <div class="sp-profile">${bars}</div>
      ${weak[0] ? `<div style="margin-top:10px;padding:8px 12px;background:#fff8e1;border-radius:8px;font-size:.82rem;color:#92400e">
        Foco recomendado: <strong>${SKILL_LABELS[weak[0].skill]}</strong> — ${weak[0].pct}% de acerto.
      </div>` : ''}
    </div>` : '';

  document.getElementById('home').innerHTML = `
    <div class="home-greeting">
      <div class="home-greeting-avatar">${initials||'😊'}</div>
      <div class="home-greeting-text">
        <h2>${period}, ${name.split(' ')[0]}!</h2>
        <p>Vamos continuar seus estudos de espanhol? ¡Tú puedes!</p>
      </div>
    </div>

    <div class="home-summary">
      ${card1}
      ${card2}
      ${card3}
    </div>

    ${personalizedTrail}
    ${adaptivePath}
    ${skillPanel}

    <div style="font-size:.82rem;font-weight:700;color:#374151;margin-bottom:12px;padding-left:2px;display:flex;align-items:center;gap:8px">
      <span>Todos os níveis</span>
      <span style="font-size:.72rem;font-weight:400;color:#9ca3af">${totalDone}/${totalMods} módulos completados</span>
    </div>
    <div class="level-grid">${cards}</div>`;
}

function showTrailView(){
  // Rolar até a trilha personalizada se existir, senão ir ao home
  const trail = document.querySelector('.trail-container');
  if(trail) trail.scrollIntoView({behavior:'smooth', block:'start'});
}

/* ================================================================
   LEVEL
================================================================ */
function showLevel(level){
  currentLevel=level;
  document.querySelectorAll('.level-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.level-tab').forEach(t=>{ if(t.textContent===level) t.classList.add('active'); });
  document.getElementById('home').style.display='none';
  document.getElementById('module-list').style.display='';
  document.getElementById('module-content').style.display='none';
  document.getElementById('diagnostic-content').style.display='none';
  renderModuleList();
}

function renderModuleList(){
  const mods    = CONTENT[currentLevel];
  const progress= getProgress();
  const done    = (progress[currentLevel]||[]).length;
  const pct     = Math.round(done/mods.length*100)||0;
  const stats     = getSkillStats(currentUser.name);
  const adaptPath = getAdaptivePath().map(p=>`${p.level}-${p.idx}`);

  let items = '';
  mods.forEach((m,i) => {
    const skipped    = currentUser ? isModuleSkipped(currentUser.name, currentLevel, i) : false;
    const locked     = !isModuleUnlocked(currentLevel, i);
    const done       = isDone(currentLevel, i);
    const modSkills  = SKILL_TAGS[`${currentLevel}-${i}`] || [];
    const isWeak     = modSkills.some(sk => {
      const s = stats[sk]; return s && s.t >= 2 && Math.round(s.c/s.t*100) < 65;
    });
    const isMastery  = modSkills.length && modSkills.every(sk=>getStudentSkillPct(sk)>=80);
    const isInPath   = adaptPath.includes(`${currentLevel}-${i}`);
    const isReinDone = isReinforcementDone(currentLevel, i);

    // Badge decorativo
    let badge = '';
    if(skipped && !done) badge = `<span style="font-size:.68rem;background:#f0f9ff;color:#0369a1;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:4px">Dispensado</span>`;
    else if(done)          badge = `<span style="font-size:.68rem;background:#dcfce7;color:#166534;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:4px">Concluído</span>`;
    else if(locked && isMastery) badge = `<span style="font-size:.68rem;background:#fff8e1;color:#F57F17;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:4px">Desbloqueável</span>`;
    else if(!locked && isWeak)   badge = `<span style="font-size:.68rem;background:#fff7ed;color:#c2410c;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:4px">Reforço</span>`;
    else if(!locked && isInPath) badge = `<span style="font-size:.68rem;background:#fff8e1;color:#1d4ed8;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:4px">Recomendado</span>`;
    else if(isReinDone && !done) badge = `<span style="font-size:.68rem;background:#f0fdf4;color:#166534;padding:2px 8px;border-radius:10px;font-weight:700;margin-left:4px">Desbloqueado por reforço</span>`;

    const tick     = done ? '<span class="module-done">&#10003;</span>' : '';
    const lockIcon = locked ? '<span class="lock-icon">&#128274;</span>' : '';
    let hint = '';
    if(locked && !isMastery){
      if(i===0) hint=`<div class="unlock-hint">Complete o nível anterior (${Math.round(LEVEL_UNLOCK_PCT*100)}%+)</div>`;
      else      hint=`<div class="unlock-hint">Conclua o módulo anterior (60%+) ou faça o mini-quiz de reforço</div>`;
    } else if(locked && isMastery){
      hint=`<div class="unlock-hint" style="color:#F57F17">Você tem domínio desta habilidade — este módulo será desbloqueado</div>`;
    }
    const skillChips = modSkills.map(s=>
      `<span style="font-size:.66rem;background:${SKILL_COLORS[s]}15;color:${SKILL_COLORS[s]};padding:1px 6px;border-radius:7px;margin-right:3px;font-weight:600">${SKILL_LABELS[s]}</span>`
    ).join('');

    items += `<div class="module-item${locked?' mod-locked':''}"
        onclick="${locked && !isMastery ? "alert('Complete o módulo anterior ou o mini-quiz de reforço para desbloquear.')" : 'showModule('+i+')'}">
      <span class="module-num">Módulo ${i+1}</span>
      <div style="flex:1">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px"><h3 style="display:inline">${m.title}</h3>${badge}</div>
        <div style="margin-top:3px">${skillChips}</div>
        ${hint}
      </div>
      ${locked && !isMastery ? lockIcon : tick}
    </div>`;
  });
  // Banner da prova diagnóstica
  const canDiag = canTakeDiagnostic(currentLevel);
  const hasDiag = hasDiagnosticResult(currentLevel);
  let diagBanner = '';
  if(canDiag){
    const diagResult = hasDiag ? (getStudents()[currentUser.name]?.diagnosticResults||{})[currentLevel] : null;
    if(diagResult){
      const col = diagResult.passed ? '#10b981' : '#f59e0b';
      const badge = diagResult.passed
        ? `<span class="diag-result-badge diag-pass">&#10003; Aprovado ${diagResult.pct}%</span>`
        : `<span class="diag-result-badge diag-fail">&#10007; ${diagResult.pct}% — pode refazer</span>`;
      diagBanner = `<div class="diag-banner" style="border-top-color:${col}">
        <h3>📋 Prova Diagnóstica do Nível ${currentLevel}</h3>
        <p style="font-size:.82rem;color:#374151;margin-bottom:4px">Você já realizou a prova diagnóstica. ${badge}</p>
        <button class="diag-start-btn" style="background:${col}" onclick="showDiagnosticTest('${currentLevel}')">Refazer Prova Diagnóstica</button>
      </div>`;
    } else {
      diagBanner = `<div class="diag-banner">
        <h3>📋 Prova Diagnóstica disponível!</h3>
        <p style="font-size:.82rem;color:#78350f;margin-bottom:2px">Você completou ${pct}% do Nível ${currentLevel}. Faça a prova diagnóstica para que o professor possa personalizar suas próximas aulas.</p>
        <button class="diag-start-btn" onclick="showDiagnosticTest('${currentLevel}')">Iniciar Prova Diagnóstica &#8594;</button>
      </div>`;
    }
  }

  document.getElementById('module-list').innerHTML=`
    <button class="back-btn" onclick="showHome()">&#8592; Volver al inicio</button>
    <div class="level-header">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <h2>Nivel ${currentLevel}</h2>
        <span style="font-size:1.5rem;font-weight:800;color:${pct===100?'#10b981':'#C62828'}">${pct}%</span>
      </div>
      <p>${done} de ${mods.length} modulos completados${pct<100?' · faltam '+(mods.length-done):' · ¡Nivel completo! ¡Excelente!'}</p>
      <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    ${diagBanner}
    <div class="module-grid">${items}</div>`;
}

/* ================================================================
   MODULE
================================================================ */
function showModule(idx){
  currentModuleIdx = idx;
  document.getElementById('module-list').style.display='none';
  document.getElementById('module-content').style.display='';
  trackModuleOpen(currentLevel, idx);
  renderModule();
}

function renderModule(){
  const mod=CONTENT[currentLevel][currentModuleIdx];
  const mods=CONTENT[currentLevel];
  const done=isDone(currentLevel,currentModuleIdx);

  // Limpa respostas erradas se nao concluido
  if(!done){
    const a=getAnswers();
    if(a[currentLevel] && a[currentLevel][currentModuleIdx]){
      const saved=a[currentLevel][currentModuleIdx];
      let changed=false;
      for(const key of Object.keys(saved)){
        if(!saved[key].correct){ delete saved[key]; changed=true; }
      }
      if(changed) persistAnswers(a);
    }
  }

  const mySkills = (SKILL_TAGS[`${currentLevel}-${currentModuleIdx}`]||[])
    .map(s=>`<span class="skill-chip" style="background:${SKILL_COLORS[s]}18;color:${SKILL_COLORS[s]}">${SKILL_LABELS[s]}</span>`)
    .join('');

  let html=`<div class="module-card">
    <button class="back-btn" onclick="showLevel('${currentLevel}')">&#8592; Volver</button>
    <span class="module-tag">Nivel ${currentLevel} &middot; Modulo ${currentModuleIdx+1}/${mods.length}</span>
    <h2>${mod.title}</h2>
    <div style="margin-bottom:10px">${mySkills}</div>
    ${mod.content}
  </div>`;

  // Nota do professor (se existir)
  const noteKey = `${currentLevel}-${currentModuleIdx}`;
  const notes = getTeacherNotes();
  if(notes[currentUser.name] && notes[currentUser.name][noteKey] && notes[currentUser.name][noteKey].note){
    const n = notes[currentUser.name][noteKey];
    html+=`<div class="teacher-note-box">
      <h4>Observacao do Professor</h4>
      <p>${n.note}</p>
      <div class="note-meta">${n.date}</div>
    </div>`;
  }

  // Exercicios
  if(mod.exercises && mod.exercises.length){
    html+=`<div class="exercise-section"><h3>Exercicios</h3>`;
    mod.exercises.forEach((ex,ei)=>{ html+=renderExercise(ex,ei,currentLevel,currentModuleIdx); });
    html+=`<div class="results-summary" id="results-summary"></div></div>`;
  }

  html += `<div id="reinforcement-section"></div>`;

  const doneBtn=done
    ? `<button class="complete-btn done" disabled>¡Completado! &#10003;</button>`
    : `<button class="complete-btn" onclick="markDone()">¡Listo! Marcar como concluído</button>`;

  html+=`<div class="nav-btns">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="nav-btn home-btn" onclick="showLevel('${currentLevel}')">&#8592; Volver</button>
      ${currentModuleIdx>0?`<button class="nav-btn secondary" onclick="showModule(${currentModuleIdx-1})">Anterior</button>`:''}
    </div>
    ${doneBtn}
    ${currentModuleIdx<mods.length-1
      ?`<button class="nav-btn" onclick="showModule(${currentModuleIdx+1})">Siguiente &#8594;</button>`
      :`<button class="nav-btn" onclick="showLevel('${currentLevel}')">Ver nivel &#8594;</button>`}
  </div>`;

  document.getElementById('module-content').innerHTML=html;
  window.scrollTo(0,0);
}

function markDone(){
  saveProgress(currentLevel,currentModuleIdx);
  renderModule();
}

/* ================================================================
   EXERCISES
================================================================ */
function renderExercise(ex,ei,level,modIdx){
  const prev=getModuleAnswers(level,modIdx)[ei];
  const was=!!prev;
  if(ex.type==='mc'){
    let opts='';
    ex.options.forEach((o,oi)=>{
      let cls='opt-btn', dis='';
      if(was){ dis='disabled'; if(oi===ex.answer) cls+=' correct'; else if(prev.value===oi) cls+=' wrong'; }
      opts+=`<button class="${cls}" id="opt_${ei}_${oi}" onclick="checkMC(${ei},${oi},${ex.answer})" ${dis}>${o}</button>`;
    });
    const fb=was?`<div class="feedback show ${prev.correct?'ok':'no'}">${prev.correct?'¡Muy bien! &#10003;':'¡Ups! Revisa la respuesta.'}</div>`:`<div class="feedback" id="fb_${ei}"></div>`;
    return `<div class="ex-item"><p>${ei+1}. ${ex.question}</p><div class="options">${opts}</div>${fb}</div>`;
  }
  if(ex.type==='fill'){
    const cls=was?(prev.correct?'fill-input correct':'fill-input wrong'):'fill-input';
    const dis=was?'disabled':'';
    const fb=was?`<div class="feedback show ${prev.correct?'ok':'no'}">${prev.correct?'¡Muy bien! &#10003;':'¡Ups! Resposta: '+ex.answer.split('|')[0]}</div>`:`<div class="feedback" id="fb_${ei}"></div>`;
    return `<div class="ex-item"><p>${ei+1}. ${ex.question}</p>
      <input class="${cls}" id="fill_${ei}" placeholder="Sua resposta..." value="${was?prev.value:''}" ${dis}>
      <br>${was?'':`<button class="check-btn" onclick="checkFill(${ei},'${ex.answer.toLowerCase()}')">Comprobar</button>`}
      ${fb}</div>`;
  }
  if(ex.type==='tf'){
    let c0='opt-btn',c1='opt-btn',dis='';
    if(was){
      dis='disabled';
      if(ex.answer===true) c0+=' correct'; else c1+=' correct';
      if(prev.value===true&&!prev.correct) c0+=' wrong';
      if(prev.value===false&&!prev.correct) c1+=' wrong';
    }
    const fb=was?`<div class="feedback show ${prev.correct?'ok':'no'}">${prev.correct?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.'}</div>`:`<div class="feedback" id="fb_${ei}"></div>`;
    return `<div class="ex-item"><p>${ei+1}. ${ex.question}</p>
      <div class="options">
        <button class="${c0}" id="opt_${ei}_0" onclick="checkTF(${ei},true,${ex.answer})" ${dis}>Verdadeiro</button>
        <button class="${c1}" id="opt_${ei}_1" onclick="checkTF(${ei},false,${ex.answer})" ${dis}>Falso</button>
      </div>${fb}</div>`;
  }
  return '';
}

function checkMC(ei,chosen,correct){
  document.querySelectorAll(`[id^="opt_${ei}_"]`).forEach(b=>b.disabled=true);
  const isOk=chosen===correct;
  document.getElementById(`opt_${ei}_${chosen}`).classList.add(isOk?'correct':'wrong');
  if(!isOk) document.getElementById(`opt_${ei}_${correct}`).classList.add('correct');
  const fb=document.getElementById(`fb_${ei}`);
  fb.innerHTML=isOk?'¡Muy bien! &#10003;':'¡Ups! Revisa la respuesta.';
  fb.className='feedback show '+(isOk?'ok':'no');
  saveAnswer(currentLevel,currentModuleIdx,ei,chosen,isOk);
}

function checkFill(ei,correct){
  const inp=document.getElementById(`fill_${ei}`);
  const val=inp.value.trim().toLowerCase();
  const isOk=correct.split('|').includes(val);
  inp.classList.add(isOk?'correct':'wrong');
  inp.disabled=true;
  const btn=document.querySelector(`button[onclick="checkFill(${ei},'${correct}')"]`);
  if(btn) btn.style.display='none';
  const fb=document.getElementById(`fb_${ei}`);
  fb.innerHTML=isOk?'¡Muy bien! &#10003;':'¡Ups! Resposta: <strong>'+correct.split('|')[0]+'</strong>';
  fb.className='feedback show '+(isOk?'ok':'no');
  saveAnswer(currentLevel,currentModuleIdx,ei,val,isOk);
}

function checkTF(ei,chosen,correct){
  document.querySelectorAll(`[id^="opt_${ei}_"]`).forEach(b=>b.disabled=true);
  const isOk=chosen===correct;
  document.getElementById(`opt_${ei}_${chosen?0:1}`).classList.add(isOk?'correct':'wrong');
  if(!isOk) document.getElementById(`opt_${ei}_${correct?0:1}`).classList.add('correct');
  const fb=document.getElementById(`fb_${ei}`);
  fb.innerHTML=isOk?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.';
  fb.className='feedback show '+(isOk?'ok':'no');
  saveAnswer(currentLevel,currentModuleIdx,ei,chosen,isOk);
}

function checkAutoComplete(level, modIdx){
  const mod = CONTENT[level][modIdx];
  if(!mod.exercises || !mod.exercises.length) return;
  const saved = getModuleAnswers(level, modIdx);
  const total = mod.exercises.length;
  if(Object.keys(saved).length < total) return;
  const allOk = Object.values(saved).every(a=>a.correct);
  showResultsSummary(level, modIdx, allOk);
  trackModuleComplete(level, modIdx);
  if(allOk && !isDone(level, modIdx)){
    saveProgress(level, modIdx);
    const btn = document.querySelector('.complete-btn');
    if(btn){ btn.innerHTML='¡Completado! &#10003;'; btn.classList.add('done'); btn.disabled=true; }
    showPostCompleteNext();
  } else if(!allOk){
    showReinforcement(level, modIdx);
  }
}

/* ================================================================
   REINFORCEMENT & ADAPTIVE SUGGESTIONS (student-side)
================================================================ */
function showReinforcement(level, modIdx){
  const sec = document.getElementById('reinforcement-section');
  if(!sec) return;
  const mod      = CONTENT[level][modIdx];
  const saved    = getModuleAnswers(level, modIdx);
  const mySkills = SKILL_TAGS[`${level}-${modIdx}`] || [];
  const skillTags= mySkills.map(s=>`<span class="reinforcement-tag">${SKILL_ICONS[s]} ${SKILL_LABELS[s]}</span>`).join('');

  // Coleta exercícios errados (ainda na memória antes de navegar)
  const wrongExs = (mod.exercises||[])
    .map((ex,ei) => ({...ex, origIdx:ei}))
    .filter(ex => saved[ex.origIdx] && !saved[ex.origIdx].correct);

  if(!wrongExs.length){ sec.innerHTML=''; return; }

  // Até 3 questões para o mini-quiz
  const quizExs = wrongExs.slice(0, 3);
  reinforcementState = { level, modIdx, exercises:quizExs, answers:{}, total:quizExs.length };

  const wrongNums = wrongExs.map(e=>e.origIdx+1).join(', ');
  let quizHtml = quizExs.map((ex,qi) => renderReinQuestion(ex,qi)).join('');

  sec.innerHTML = `<div class="reinforcement-box">
    <h4>🎯 Mini-Quiz de Reforço</h4>
    <p style="font-size:.82rem;color:#78350f;margin-bottom:10px">
      Questão(ões) errada(s): <strong>${wrongNums}</strong> · Habilidades: ${skillTags}<br>
      Complete o mini-quiz para <strong>desbloquear o próximo módulo</strong> mesmo sem 100% no módulo atual.
    </p>
    <div id="rein-quiz">${quizHtml}</div>
    <div id="rein-result"></div>
  </div>`;
  sec.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* ── Renderiza uma questão do mini-quiz ── */
function renderReinQuestion(ex, qi){
  if(ex.type==='mc'){
    const opts = ex.options.map((o,oi)=>
      `<button class="opt-btn" id="rq_${qi}_${oi}" onclick="checkReinMC(${qi},${oi},${ex.answer})">${o}</button>`
    ).join('');
    return `<div class="ex-item" id="rqitem_${qi}"><p>${qi+1}. ${ex.question}</p>
      <div class="options">${opts}</div><div class="feedback" id="rqfb_${qi}"></div></div>`;
  }
  if(ex.type==='fill'){
    const esc = ex.answer.toLowerCase().replace(/'/g,"\\'");
    return `<div class="ex-item" id="rqitem_${qi}"><p>${qi+1}. ${ex.question}</p>
      <input class="fill-input" id="rqfill_${qi}" placeholder="Sua resposta...">
      <br><button class="check-btn" onclick="checkReinFill(${qi},'${esc}')">Comprobar</button>
      <div class="feedback" id="rqfb_${qi}"></div></div>`;
  }
  if(ex.type==='tf'){
    return `<div class="ex-item" id="rqitem_${qi}"><p>${qi+1}. ${ex.question}</p>
      <div class="options">
        <button class="opt-btn" id="rq_${qi}_0" onclick="checkReinTF(${qi},true,${ex.answer})">Verdadeiro</button>
        <button class="opt-btn" id="rq_${qi}_1" onclick="checkReinTF(${qi},false,${ex.answer})">Falso</button>
      </div><div class="feedback" id="rqfb_${qi}"></div></div>`;
  }
  return '';
}

function checkReinMC(qi, chosen, correct){
  document.querySelectorAll(`[id^="rq_${qi}_"]`).forEach(b=>b.disabled=true);
  const ok = chosen===correct;
  document.getElementById(`rq_${qi}_${chosen}`).classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById(`rq_${qi}_${correct}`).classList.add('correct');
  const fb=document.getElementById(`rqfb_${qi}`);
  fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Revisa la respuesta.';
  fb.className='feedback show '+(ok?'ok':'no');
  if(reinforcementState) reinforcementState.answers[qi]=ok;
  checkReinComplete();
}
function checkReinFill(qi, correct){
  const inp=document.getElementById(`rqfill_${qi}`);
  const val=inp.value.trim().toLowerCase();
  const ok=correct.split('|').includes(val);
  inp.classList.add(ok?'correct':'wrong'); inp.disabled=true;
  const btn=inp.nextElementSibling; if(btn&&btn.tagName==='BUTTON') btn.style.display='none';
  const fb=document.getElementById(`rqfb_${qi}`);
  fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Resposta: <strong>'+correct.split('|')[0]+'</strong>';
  fb.className='feedback show '+(ok?'ok':'no');
  if(reinforcementState) reinforcementState.answers[qi]=ok;
  checkReinComplete();
}
function checkReinTF(qi, chosen, correct){
  document.querySelectorAll(`[id^="rq_${qi}_"]`).forEach(b=>b.disabled=true);
  const ok=chosen===correct;
  document.getElementById(`rq_${qi}_${chosen?0:1}`).classList.add(ok?'correct':'wrong');
  if(!ok) document.getElementById(`rq_${qi}_${correct?0:1}`).classList.add('correct');
  const fb=document.getElementById(`rqfb_${qi}`);
  fb.innerHTML=ok?'¡Muy bien! &#10003;':'¡Ups! Inténtalo de nuevo.';
  fb.className='feedback show '+(ok?'ok':'no');
  if(reinforcementState) reinforcementState.answers[qi]=ok;
  checkReinComplete();
}

function checkReinComplete(){
  if(!reinforcementState) return;
  if(Object.keys(reinforcementState.answers).length < reinforcementState.total) return;
  const correct = Object.values(reinforcementState.answers).filter(Boolean).length;
  const needed  = Math.ceil(reinforcementState.total * 0.67); // ≥67% (2 de 3)
  const passed  = correct >= needed;
  const res     = document.getElementById('rein-result');
  if(!res) return;

  if(passed){
    // Salva desbloqueio do próximo módulo via reforço
    const s = getStudents();
    const stu = s[currentUser.name];
    if(stu){
      if(!stu.reinforcementDone) stu.reinforcementDone={};
      const {level, modIdx} = reinforcementState;
      stu.reinforcementDone[getReinDoneKey(level, modIdx+1)] = true;
      saveStudents(s);
    }
    const {level, modIdx} = reinforcementState;
    const nextBtn = (modIdx+1 < CONTENT[level].length)
      ? `<button class="nav-btn" style="background:#10b981;margin-top:8px"
           onclick="currentLevel='${level}';showLevel('${level}');showModule(${modIdx+1})">
           Próximo Módulo →</button>`
      : `<button class="nav-btn" style="background:#10b981;margin-top:8px"
           onclick="showLevel('${LEVELS[LEVELS.indexOf(level)+1]||level}')">Ver próximo nível →</button>`;
    res.innerHTML=`<div style="background:#f0fdf4;border:2px solid #86efac;border-radius:10px;padding:12px 16px;margin-top:10px">
      <div style="font-weight:700;color:#166534;margin-bottom:4px">&#10003; Mini-quiz concluído! ${correct}/${reinforcementState.total} corretas.</div>
      <div style="font-size:.83rem;color:#166534;margin-bottom:6px">Ótimo! O próximo módulo foi desbloqueado automaticamente.</div>
      ${nextBtn}
    </div>`;
    reinforcementState = null;
  } else {
    res.innerHTML=`<div style="background:#fff7ed;border:2px solid #fcd34d;border-radius:10px;padding:12px 16px;margin-top:10px">
      <div style="font-weight:700;color:#92400e;margin-bottom:3px">Quase lá! ${correct}/${reinforcementState.total} corretas.</div>
      <div style="font-size:.83rem;color:#92400e">Releia o conteúdo acima e tente o módulo novamente para liberar o próximo.</div>
    </div>`;
    reinforcementState = null;
  }
}

function getSchedule(){ return JSON.parse(localStorage.getItem('esp_schedule')||'{}'); }
function saveSchedule(d){ localStorage.setItem('esp_schedule', JSON.stringify(d)); }
function getStudentSchedule(name){ return getSchedule()[name]||{days:[],time:''}; }

const DAY_NAMES=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DAY_FULL =['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const MONTH_NAMES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function fmtShortDate(dateObj){
  return `${String(dateObj.getDate()).padStart(2,'0')} ${MONTH_NAMES[dateObj.getMonth()]}`;
}

function getTodayStudents(){
  const dow = new Date().getDay();
  const sched = getSchedule();
  const students = getStudents();
  return Object.keys(students)
    .filter(n=>(sched[n]?.days||[]).includes(dow))
    .map(n=>({name:n, sched:sched[n]||{}, data:students[n]}));
}

function getUpcomingClasses(days=8){
  const sched=getSchedule(), students=getStudents(), results=[];
  for(let d=0;d<days;d++){
    const dt=new Date(); dt.setDate(dt.getDate()+d);
    const dow=dt.getDay(), iso=dt.toISOString().split('T')[0];
    Object.keys(students).forEach(name=>{
      const s=sched[name];
      if(s&&(s.days||[]).includes(dow))
        results.push({name,date:iso,time:s.time||'',dow,dateObj:new Date(dt)});
    });
  }
  return results;
}

function saveScheduleRow(name){
  const days=[];
  [0,1,2,3,4,5,6].forEach(d=>{
    const cb=document.getElementById(`schday-${name}-${d}`);
    if(cb&&cb.checked) days.push(d);
  });
  const time=(document.getElementById(`schtime-${name}`)?.value||'').trim();
  const all=getSchedule(); all[name]={days,time}; saveSchedule(all);
  // Feedback visual
  const btn=document.getElementById(`schsave-${name}`);
  if(btn){btn.textContent='✓ Salvo';btn.style.background='#10b981';
    setTimeout(()=>{btn.textContent='Salvar';btn.style.background='#F57F17';},1500);}
}

================================================================ */
function getPanelAlerts(){
  const students=getStudents(), now=Date.now(), alerts=[];
  Object.entries(students).forEach(([name,data])=>{
    // Sem acesso
    const last=data.lastAccess||data.firstAccess;
    if(last){
      const days=Math.floor((now-last)/(864e5));
      if(days>=7)      alerts.push({type:'inactive',  level:'red',   name, days, msg:`Sem acesso há ${days} dias`});
      else if(days>=3) alerts.push({type:'idle',       level:'orange',name, days, msg:`Sem acesso há ${days} dias`});
    } else {
      alerts.push({type:'never', level:'orange', name, days:null, msg:'Ainda não acessou a plataforma'});
    }
    // Dificuldade
    const stats=getSkillStats(name);
    const skweak=Object.entries(stats).filter(([,v])=>v.t>=4&&Math.round(v.c/v.t*100)<50).map(([k])=>k);
    const skmod =Object.entries(stats).filter(([,v])=>v.t>=4&&Math.round(v.c/v.t*100)<65).map(([k])=>k);
    if(skweak.length)       alerts.push({type:'critical',level:'red',   name, skills:skweak, msg:`Dificuldade crítica: ${skweak.map(s=>SKILL_LABELS[s]).join(', ')}`});
    else if(skmod.length>=2) alerts.push({type:'weak',   level:'orange',name, skills:skmod,  msg:`Dificuldade em: ${skmod.map(s=>SKILL_LABELS[s]).join(', ')}`});
    // Trilha com pendências
    const td=getTrailData(name);
    const pendentes=td.trail.filter(t=>{
      if(t.status==='skip') return false;
      if(t.type==='module') return !((data.progress||{})[t.level]||[]).includes(t.modIdx);
      if(t.type==='extra')  return !td.extras[t.extraId]?.done;
      return false;
    });
    if(pendentes.length) alerts.push({type:'trail',level:'yellow',name,count:pendentes.length,
      msg:`${pendentes.length} item${pendentes.length!==1?'s':''} pendente${pendentes.length!==1?'s':''} na trilha personalizada`});
    // Prova diagnóstica disponível e não feita
    LEVELS.forEach(lv=>{
      if(canTakeDiagnosticFor(name,lv)&&!hasDiagnosticResultFor(name,lv))
        alerts.push({type:'diag',level:'blue',name,level_:lv,msg:`Prova diagnóstica disponível — Nível ${lv}`});
    });
    // Prova diagnóstica reprovada
    const diag=data.diagnosticResults||{};
    LEVELS.forEach(lv=>{
      if(diag[lv]&&!diag[lv].passed)
        alerts.push({type:'diagfail',level:'purple',name,level_:lv,pct:diag[lv].pct,
          msg:`Reprovado na prova do Nível ${lv} (${diag[lv].pct}%)`});
    });
  });
  const ORDER={red:1,orange:2,yellow:3,blue:4,purple:5};
  return alerts.sort((a,b)=>(ORDER[a.level]||9)-(ORDER[b.level]||9));
}

// Versões sem currentUser para uso no painel do professor
function canTakeDiagnosticFor(studentName,level){
  const students=getStudents(), data=students[studentName]||{};
  const done=((data.progress||{})[level]||[]).length;
  const total=CONTENT[level].length;
  return done>=Math.ceil(total*0.7);
}
function hasDiagnosticResultFor(studentName,level){
  const students=getStudents(), data=students[studentName]||{};
  return !!(data.diagnosticResults&&data.diagnosticResults[level]);
}

/* ================================================================
   AULAS — armazenamento e estado
================================================================ */
function getLessons(){ return JSON.parse(localStorage.getItem('esp_lessons')||'[]'); }
function saveLessons(d){ localStorage.setItem('esp_lessons', JSON.stringify(d)); }

let lessonFormState = null;
// { editId|null, type:'apostila'|'personalizada' }

function openLessonForm(editId){
  const lessons = getLessons();
  const existing = editId ? lessons.find(l=>l.id===editId) : null;
  lessonFormState = {
    editId: editId||null,
    type: existing?.type||'apostila'
  };
  renderLessonsTab();
  setTimeout(()=>document.getElementById('lf-title')?.focus(), 60);
}
function closeLessonForm(){
  lessonFormState = null;
  renderLessonsTab();
}
function setLessonType(type){
  if(!lessonFormState) return;
  // captura campos antes de trocar
  captureLessonForm();
  lessonFormState.type = type;
  renderLessonsTab();
}
function captureLessonForm(){
  if(!lessonFormState) return;
  const g = id => document.getElementById(id)?.value||'';
  lessonFormState._title       = g('lf-title');
  lessonFormState._date        = g('lf-date');
  lessonFormState._student     = g('lf-student');
  lessonFormState._tema        = g('lf-tema');
  lessonFormState._vocabulario = g('lf-vocabulario');
  lessonFormState._erros       = g('lf-erros');
  lessonFormState._observacoes = g('lf-observacoes');
  lessonFormState._conteudo    = g('lf-conteudo');
  lessonFormState._modnote     = g('lf-modnote');
  // módulos selecionados (apostila)
  const checked = document.querySelectorAll('.lpick-mod:checked');
  lessonFormState._modules = [...checked].map(cb=>({level:cb.dataset.level, modIdx:parseInt(cb.dataset.idx)}));
}
function saveLessonForm(){
  captureLessonForm();
  const s = lessonFormState;
  if(!s) return;
  if(!(s._title||'').trim()){ alert('Digite um título para a aula.'); return; }
  const lessons = getLessons();
  const lesson = {
    id:         s.editId || ('lesson_'+Date.now()),
    type:       s.type,
    title:      (s._title||'').trim(),
    date:       s._date||'',
    studentName:s._student||'',
    tema:       (s._tema||'').trim(),
    vocabulario:(s._vocabulario||'').trim(),
    erros:      (s._erros||'').trim(),
    observacoes:(s._observacoes||'').trim(),
    conteudo:   (s._conteudo||'').trim(),
    modnote:    (s._modnote||'').trim(),
    modules:    s._modules||[],
    updatedAt:  Date.now(),
    createdAt:  s.editId ? (lessons.find(l=>l.id===s.editId)?.createdAt||Date.now()) : Date.now()
  };
  if(s.editId){
    const idx = lessons.findIndex(l=>l.id===s.editId);
    if(idx>=0) lessons[idx]=lesson; else lessons.unshift(lesson);
  } else {
    lessons.unshift(lesson);
  }
  saveLessons(lessons);
  lessonFormState = null;
  renderLessonsTab();
}
function deleteLessonEntry(id){
  if(!confirm('Excluir esta aula?')) return;
  saveLessons(getLessons().filter(l=>l.id!==id));
  renderLessonsTab();
}

/* ── Vista detalhada de uma aula ──────────────────────────── */
let lessonViewId = null;
function viewLesson(id){
  lessonViewId = id;

}
function closeLessonView(){

/* ── Render principal da aba ──────────────────────────────── */

function getBankItems(){ return JSON.parse(localStorage.getItem('esp_bank')||'[]'); }
function saveBankItems(d){ localStorage.setItem('esp_bank', JSON.stringify(d)); }

let bankBuilder  = null; // { editId|null, title, desc, tags, exercises[] }
let sendPanelId  = null; // bankId being sent
let bankViewId   = null; // bankId in detail view

const BANK_BLOCK_META={
  text:    {icon:'📝',label:'Texto',        bg:'#FFFFFF', col:'#64748b'},
  link:    {icon:'🔗',label:'Link',         bg:'#fff8e1', col:'#b71c1c'},
  video:   {icon:'🎬',label:'Vídeo',        bg:'#fff8e1', col:'#F57F17'},
  image:   {icon:'🖼',label:'Imagem',       bg:'#f0f9ff', col:'#0369a1'},
  redacao: {icon:'✍️',label:'Redação',      bg:'#fff7ed', col:'#c2410c'},
  mc:      {icon:'🔘',label:'M. Escolha',   bg:'#eef2ff', col:'#b71c1c'},
  fill:    {icon:'🔤',label:'Completar',    bg:'#fffbeb', col:'#b45309'},
  tf:      {icon:'✅',label:'V ou F',       bg:'#f0fdf4', col:'#059669'},
};

/* ── estado do builder do banco ──────────────────────────── */
function startBankBuilder(){
  bankBuilder={editId:null,title:'',desc:'',tags:'',exercises:[]};
  bankViewId=null; sendPanelId=null;
  renderActivityBankTab();
  setTimeout(()=>document.getElementById('bb-title')?.focus(),60);
}
function cancelBankBuilder(){ bankBuilder=null; renderActivityBankTab(); }

function editBankItem(id){
  const item=getBankItems().find(b=>b.id===id);
  if(!item) return;
  bankBuilder={editId:id, title:item.title, desc:item.desc||'',
    tags:(item.tags||[]).join(', '), exercises:JSON.parse(JSON.stringify(item.exercises||[]))};
  bankViewId=null; sendPanelId=null;
  renderActivityBankTab();
  setTimeout(()=>document.getElementById('bb-title')?.focus(),60);
}

function captureBankBuilderState(){
  if(!bankBuilder) return;
  bankBuilder.title = document.getElementById('bb-title')?.value||'';
  bankBuilder.desc  = document.getElementById('bb-desc')?.value||'';
  bankBuilder.tags  = document.getElementById('bb-tags')?.value||'';
  bankBuilder.exercises.forEach((ex,qi)=>{
    ex.question = document.getElementById(`bq-${qi}`)?.value||'';
    const lblEl = document.getElementById(`blabel-${qi}`);
    if(lblEl) ex.label = lblEl.value||'';
    if(ex.type==='mc'){
      ex.options=[0,1,2,3].map(i=>document.getElementById(`bopt-${qi}-${i}`)?.value||'');
      const chk=document.querySelector(`input[name="bans-${qi}"]:checked`);
      ex.answer=chk?parseInt(chk.value):0;
    } else if(ex.type==='fill'){
      ex.answer=document.getElementById(`bans-${qi}`)?.value||'';
    } else if(ex.type==='tf'){
      const chk=document.querySelector(`input[name="btf-${qi}"]:checked`);
      ex.answer=!chk||chk.value==='true';
    }
  });
}

function addBankBlock(type){
  captureBankBuilderState();
  if(!bankBuilder) return;
  const ex={type,question:''};
  if(type==='mc'){ex.options=['','','',''];ex.answer=0;}
  else if(type==='fill'){ex.answer='';}
  else if(type==='tf'){ex.answer=true;}
  else if(type==='link'){ex.label='';}
  bankBuilder.exercises.push(ex);
  renderActivityBankTab();
  setTimeout(()=>document.getElementById(`bq-${bankBuilder.exercises.length-1}`)?.focus(),60);
}

function removeBankBlock(qi){
  captureBankBuilderState();
  if(!bankBuilder) return;
  bankBuilder.exercises.splice(qi,1);
  renderActivityBankTab();
}

function saveBankActivity(){
  captureBankBuilderState();
  if(!bankBuilder) return;
  if(!(bankBuilder.title||'').trim()){alert('Digite um título para a atividade.');return;}
  const tags=(bankBuilder.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const items=getBankItems();
  const item={
    id:         bankBuilder.editId||('bank_'+Date.now()),
    title:      bankBuilder.title.trim(),
    desc:       bankBuilder.desc.trim(),
    tags,
    exercises:  bankBuilder.exercises,
    timesUsed:  bankBuilder.editId ? (items.find(b=>b.id===bankBuilder.editId)?.timesUsed||0) : 0,
    updatedAt:  Date.now(),
    createdAt:  bankBuilder.editId ? (items.find(b=>b.id===bankBuilder.editId)?.createdAt||Date.now()) : Date.now()
  };
  if(bankBuilder.editId){
    const idx=items.findIndex(b=>b.id===bankBuilder.editId);
    if(idx>=0) items[idx]=item; else items.unshift(item);
  } else { items.unshift(item); }
  saveBankItems(items);
  bankBuilder=null; renderActivityBankTab();
}

function deleteBankItem(id){
  if(!confirm('Excluir esta atividade do banco? Atividades já enviadas aos alunos não serão afetadas.')) return;
  saveBankItems(getBankItems().filter(b=>b.id!==id));
  if(bankViewId===id) bankViewId=null;
  renderActivityBankTab();
}
