function selectAllSendStudents(val){
  document.querySelectorAll('.send-student-cb').forEach(cb=>cb.checked=val);
}

function confirmSendActivity(){
  const selected=[...document.querySelectorAll('.send-student-cb:checked')].map(cb=>cb.value);
  if(!selected.length){alert('Selecione pelo menos um aluno.');return;}
  const note=document.getElementById('send-note')?.value.trim()||'';
  const item=getBankItems().find(b=>b.id===sendPanelId);
  if(!item) return;

  const students=getStudents();
  selected.forEach(studentName=>{
    if(!students[studentName]) return;
    const td=getTrailData(studentName);
    const id='extra_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    td.extras[id]={
      title: item.title,
      desc:  item.desc||'',
      exercises: JSON.parse(JSON.stringify(item.exercises)),
      answers:{}, done:false, createdAt:Date.now(),
      bankRef: item.id  // referência ao banco
    };
    td.trail.push({type:'extra', extraId:id, note, status:'required'});
    saveTrailData(studentName,td);
  });

  // Incrementa contador de uso
  const items=getBankItems();
  const idx=items.findIndex(b=>b.id===sendPanelId);
  if(idx>=0){ items[idx].timesUsed=(items[idx].timesUsed||0)+selected.length; saveBankItems(items); }

  sendPanelId=null;
  const names=selected.join(', ');
  alert(`✅ Atividade "${item.title}" enviada para: ${names}`);
  renderActivityBankTab();
}

================================================================ */
let sugGenState  = null; // { student, focus, query, skill }
let sugResults   = [];   // array de sugestões geradas
let autoSugOpen  = true; // painel de sugestões automáticas aberto/fechado

// ── Limpa HTML básico de conteúdo de módulo ────────────────
function stripHtml(s){ return (s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(); }

// ── Encontra módulos por palavras-chave ────────────────────
function findModulesByKeyword(query, limit=4){
  if(!query) return [];
  const words=query.toLowerCase().split(/\s+/).filter(w=>w.length>2);
  const scored=[];
  LEVELS.forEach(lv=>CONTENT[lv].forEach((m,i)=>{
    const text=(stripHtml(m.title)+' '+stripHtml(m.content||'')).toLowerCase();
    const score=words.reduce((s,w)=>s+(text.includes(w)?1:0),0);
    if(score>0) scored.push({level:lv,modIdx:i,mod:m,score});
  }));
  return scored.sort((a,b)=>b.score-a.score).slice(0,limit);
}

// ── Encontra módulos com mais dificuldade (por skill) ─────
function findModulesBySkill(skill, studentName, limit=4){
  const data=getStudents()[studentName]||{};
  const answers=data.answers||{};
  const scored=[];
  LEVELS.forEach(lv=>CONTENT[lv].forEach((m,i)=>{
    const skills=SKILL_TAGS[`${lv}-${i}`]||[];
    if(!skills.includes(skill)) return;
    const ma=answers[lv]?.[i]||{};
    const total=Object.keys(ma).length;
    const correct=Object.values(ma).filter(a=>a.correct).length;
    const pct=total>0?Math.round(correct/total*100):50;
    scored.push({level:lv,modIdx:i,mod:m,pct,total});
  }));
  return scored.sort((a,b)=>a.pct-b.pct).slice(0,limit);
}

// ── Extrai melhores exercícios de uma lista de módulos ─────
function extractExercises(modulesWithMeta, maxPerMod=3){
  const blocks=[];
  modulesWithMod: for(const {level,modIdx,mod} of modulesWithMeta){
    if(!mod.exercises||!mod.exercises.length) continue;
    // Adiciona um texto de contexto com o título do módulo
    blocks.push({type:'text', question:`<b>📖 ${mod.title}</b>`});
    let count=0;
    for(const ex of mod.exercises){
      if(count>=maxPerMod) break;
      if(!['mc','fill','tf'].includes(ex.type)) continue;
      blocks.push(JSON.parse(JSON.stringify(ex)));
      count++;
    }
  }
  return blocks;
}

// ── Constrói atividade a partir de módulos ─────────────────
function buildActivityFromModules(mods, title, desc){
  const exercises=extractExercises(mods);
  return {title, desc, exercises,
    tags: [...new Set(mods.flatMap(m=>(SKILL_TAGS[`${m.level}-${m.modIdx}`]||[]).map(s=>SKILL_LABELS[s])))].slice(0,3)
  };
}

// ── Sugestões automáticas (sem input do professor) ─────────
function generateAutoSuggestions(){
  const students=getStudents(), all=[];

  Object.entries(students).forEach(([name,data])=>{
    const stats=getSkillStats(name);

    // 1. Habilidade crítica
    const weakest=getWeakSkills(stats).filter(w=>w.pct<60&&w.total>=3)[0];
    if(weakest){
      const mods=findModulesBySkill(weakest.skill,name,3);
      if(mods.length){
        all.push({
          title:`Reforço de ${SKILL_LABELS[weakest.skill]} — ${name}`,
          desc:`Exercícios focados na habilidade mais fraca do aluno (${weakest.pct}% de acerto).`,
          why:`${name} está com ${weakest.pct}% em ${SKILL_LABELS[weakest.skill]} — abaixo do esperado.`,
          urgency:'high', student:name,
          exercises:extractExercises(mods,3),
          tags:[SKILL_LABELS[weakest.skill], name]
        });
      }
    }

    // 2. Erros do diário
    const log=getStudentLog(name);
    const lastError=log.find(e=>e.erros);
    if(lastError){
      const mods=findModulesByKeyword(lastError.erros,3);
      if(mods.length){
        all.push({
          title:`Correção de erros — ${name}`,
          desc:`Baseado nos erros anotados em aula: "${lastError.erros.substring(0,80)}…"`,
          why:`Erro registrado no diário em ${lastError.date||'aula recente'}.`,
          urgency:'medium', student:name,
          exercises:extractExercises(mods,2),
          tags:['erros recentes', name]
        });
      }
    }

    // 3. Prova diagnóstica reprovada
    const diag=data.diagnosticResults||{};
    const failed=LEVELS.filter(lv=>diag[lv]&&!diag[lv].passed&&diag[lv].pct<60);
    if(failed.length){
      const lv=failed[0], breakdown=diag[lv].skillBreakdown||{};
      const weakSkill=Object.entries(breakdown)
        .filter(([,v])=>v.t>0).map(([k,v])=>({k,p:Math.round(v.c/v.t*100)}))
        .sort((a,b)=>a.p-b.p)[0];
      if(weakSkill){
        const mods=findModulesBySkill(weakSkill.k,name,3);
        if(mods.length) all.push({
          title:`Revisão para Nível ${lv} — ${name}`,
          desc:`Aluno foi reprovado na prova diagnóstica do Nível ${lv} (${diag[lv].pct}%). Foco em ${SKILL_LABELS[weakSkill.k]}.`,
          why:`Diagnóstico ${lv}: ${diag[lv].pct}%. Ponto mais fraco: ${SKILL_LABELS[weakSkill.k]} (${weakSkill.p}%).`,
          urgency:'high', student:name,
          exercises:extractExercises(mods,3),
          tags:[`Nível ${lv}`, SKILL_LABELS[weakSkill.k]]
        });
      }
    }
  });

  // Ordena por urgência e limita a 5
  const ORDER={high:1,medium:2,low:3};
  return all.sort((a,b)=>(ORDER[a.urgency]||9)-(ORDER[b.urgency]||9)).slice(0,5);
}

// ── Sugestões sob demanda (form do professor) ─────────────
function generateOnDemand(){
  if(!sugGenState) return;
  const {student, focus, query, skill}=sugGenState;
  const results=[];
  const students=getStudents();

  if(focus==='tema' && query){
    const mods=findModulesByKeyword(query,4);
    if(mods.length){
      results.push({
        title:`Atividade: ${query.substring(0,50)}`,
        desc:`Exercícios selecionados sobre o tema "${query}".`,
        why:`Você pediu atividades sobre "${query}".`,
        urgency:'medium', student,
        exercises:extractExercises(mods,3),
        tags:[query.substring(0,20)].concat(student?[student]:[])
      });
      // Segunda sugestão: só texto + vocabulário
      results.push({
        title:`Vocabulário: ${query.substring(0,45)}`,
        desc:`Exercícios de vocabulário relacionados ao tema.`,
        why:`Complemento de vocabulário para o tema "${query}".`,
        urgency:'low', student,
        exercises:[
          {type:'text', question:`<b>📚 Tema: ${query}</b><br>Complete os exercícios de vocabulário a seguir.`},
          ...mods.flatMap(m=>(m.mod.exercises||[])
            .filter(e=>e.type==='fill').slice(0,2)
            .map(e=>JSON.parse(JSON.stringify(e))))
        ].filter((_,i)=>i<6),
        tags:['vocabulário'].concat(student?[student]:[])
      });
    }
  }

  if(focus==='habilidade' && skill && student && students[student]){
    const mods=findModulesBySkill(skill,student,4);
    if(mods.length) results.push({
      title:`Reforço de ${SKILL_LABELS[skill]} — ${student}`,
      desc:`Exercícios focados na habilidade "${SKILL_LABELS[skill]}" para ${student}.`,
      why:`Você pediu reforço em ${SKILL_LABELS[skill]} para ${student}.`,
      urgency:'high', student,
      exercises:extractExercises(mods,3),
      tags:[SKILL_LABELS[skill], student]
    });
  }

  if(focus==='erros' && student){
    const log=getStudentLog(student);
    const allErros=log.filter(e=>e.erros).map(e=>e.erros).join(' ');
    if(allErros){
      const mods=findModulesByKeyword(allErros,3);
      if(mods.length) results.push({
        title:`Correção de erros — ${student}`,
        desc:`Atividade gerada a partir dos erros registrados no diário de ${student}.`,
        why:`Erros do diário: "${allErros.substring(0,100)}…"`,
        urgency:'high', student,
        exercises:extractExercises(mods,3),
        tags:['erros registrados', student]
      });
    }
    // Fallback: habilidade mais fraca
    if(!results.length){
      const stats=getSkillStats(student);
      const w=getWeakSkills(stats)[0];
      if(w){ const mods=findModulesBySkill(w.skill,student,3);
        if(mods.length) results.push({
          title:`Reforço baseado no desempenho — ${student}`,
          desc:`Exercícios para a habilidade mais fraca de ${student}: ${SKILL_LABELS[w.skill]} (${w.pct}%).`,
          why:`Nenhum erro no diário. Usando dados de desempenho: ${SKILL_LABELS[w.skill]} (${w.pct}%).`,
          urgency:'medium', student,
          exercises:extractExercises(mods,3),
          tags:[SKILL_LABELS[w.skill], student]
        });
      }
    }
  }

  if(focus==='prox' && student){
    // Próximo módulo na trilha do aluno
    const data=students[student]||{};
    for(const lv of LEVELS){
      for(let i=0;i<CONTENT[lv].length;i++){
        if(!(data.progress?.[lv]||[]).includes(i)){
          const mod=CONTENT[lv][i];
          results.push({
            title:`Preparação: ${mod.title}`,
            desc:`Atividade de aquecimento para o próximo módulo de ${student}.`,
            why:`Próximo módulo desbloqueado de ${student}: Nível ${lv} — Módulo ${i+1}.`,
            urgency:'low', student,
            exercises:extractExercises([{level:lv,modIdx:i,mod}],4),
            tags:[`Nível ${lv}`, student]
          });
          break; }
      }
      if(results.length) break;
    }
  }

  sugResults = results.length ? results : [{
    title:'Prática Geral de Espanhol',
    desc:'Exercícios gerais de vocabulário e gramática.',
    why:'Não encontrei dados suficientes para uma sugestão específica. Aqui está uma atividade geral.',
    urgency:'low', student,
    exercises: extractExercises(
      findModulesByKeyword('vocabulario gramática',3), 3),
    tags:['geral']
  }];

  renderActivityBankTab();
}

    tags:sug.tags||[], exercises:sug.exercises, timesUsed:0, createdAt:Date.now(), updatedAt:Date.now()});

function sendSuggestionDirect(idx){

function renderTeacherDashboard(){
  const students = getStudents();
  const names    = Object.keys(students);

  // --- Grid de alunos ---
  let grid = '';
  if(names.length === 0){
    grid = `<p style="color:#718096">Nenhum aluno cadastrado ainda.</p>`;
  } else {
    grid = `<div class="student-grid">`;
    names.forEach(name => {
      const data = students[name];
      const progress = data.progress||{};
      let totalDone=0, totalMods=0;
      LEVELS.forEach(lv=>{ totalDone+=(progress[lv]||[]).length; totalMods+=CONTENT[lv].length; });
      const pct    = Math.round(totalDone/totalMods*100)||0;
      const status = getEngagementStatus(data);
      const sc     = ENG_COLOR[status];
      const stats  = getSkillStats(name);
      const weak   = getWeakSkills(stats);
      const skillBar = Object.entries(stats).filter(([,v])=>v.t>0)
        .map(([sk,v])=>`<div style="flex:1;height:5px;background:${SKILL_COLORS[sk]};opacity:${v.c/v.t};border-radius:2px" title="${SKILL_LABELS[sk]}: ${Math.round(v.c/v.t*100)}%"></div>`).join('');
      grid += `<div class="student-card" onclick="showStudentDetail('${name}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div class="student-overall">${pct}%</div>
          <span style="font-size:.71rem;font-weight:700;color:${sc};background:${sc}18;padding:2px 8px;border-radius:10px">${ENG_LABEL[status]}</span>
        </div>
        <h3>${name}</h3>
        <p>${totalDone} de ${totalMods} modulos completados</p>
        <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
        ${skillBar?`<div style="display:flex;gap:2px;margin-top:6px">${skillBar}</div>`:''}
        ${weak[0]&&weak[0].pct<60?`<div style="font-size:.71rem;color:#ef4444;margin-top:4px">Dificuldade: ${SKILL_LABELS[weak[0].skill]} (${weak[0].pct}%)</div>`:''}
      </div>`;
    });
    grid += `</div>`;
  }

  document.getElementById('teacher-content').innerHTML =
    teacherNav('students') +
    `<div class="t-section-title">Alunos (${names.length})</div>${grid}`;
}

function renderAnalyticsDashboard(){
  const students = getStudents();
  const names    = Object.keys(students);
  const classStats = getClassStats();
  const classWeak  = getWeakSkills(classStats);

  // Habilidades da turma
  const classSkillHtml = renderSkillBars(classStats) || '<p style="color:#718096;font-size:.82rem">Sem dados ainda.</p>';

  // Erros mais comuns
  const errorsHtml = classWeak.length
    ? classWeak.slice(0,5).map(w=>`<div class="alert-item">
        <div class="alert-dot" style="background:${SKILL_COLORS[w.skill]}"></div>
        <div style="flex:1">
          <div class="alert-text">${SKILL_LABELS[w.skill]}</div>
          <div class="alert-sub">${w.pct}% de acerto médio · ${w.total} questões respondidas</div>
        </div>
        <div style="font-weight:700;font-size:.85rem;color:${w.pct<60?'#ef4444':'#f59e0b'}">${w.pct}%</div>
      </div>`).join('')
    : '<p style="color:#718096;font-size:.82rem">Dados insuficientes.</p>';

  // Tempo médio de resposta
  const timeRows = names.flatMap(name => {
    const times = Object.values(students[name].responseTimes||{});
    if(!times.length) return [];
    const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);
    return [{name, avg, count:times.length}];
  }).sort((a,b)=>b.avg-a.avg);
  const timeHtml = timeRows.length
    ? timeRows.map(r=>`<div class="alert-item">
        <div style="flex:1">
          <div class="alert-text">${r.name}</div>
          <div class="alert-sub">${r.count} módulos cronometrados</div>
        </div>
        <div style="font-weight:700;color:#F57F17">${formatTime(r.avg)}</div>
      </div>`).join('')
    : '<p style="color:#718096;font-size:.82rem">Nenhum tempo registrado ainda.</p>';

  // Alunos com mais dificuldade
  const diffRows = names.map(name => {
    const s = getSkillStats(name);
    const t = Object.values(s).reduce((a,v)=>a+v.t,0);
    const c = Object.values(s).reduce((a,v)=>a+v.c,0);
    return t>0 ? {name, pct:Math.round(c/t*100), total:t} : null;
  }).filter(Boolean).sort((a,b)=>a.pct-b.pct);
  const diffHtml = diffRows.length
    ? diffRows.map(d=>`<div class="alert-item">
        <div class="alert-dot" style="background:${d.pct<60?'#ef4444':d.pct<80?'#f59e0b':'#10b981'}"></div>
        <div style="flex:1">
          <div class="alert-text">${d.name}</div>
          <div class="alert-sub">${d.total} questões respondidas</div>
        </div>
        <div style="font-weight:700;color:${d.pct<60?'#ef4444':d.pct<80?'#f59e0b':'#10b981'}">${d.pct}%</div>
      </div>`).join('')
    : '<p style="color:#718096;font-size:.82rem">Sem dados suficientes.</p>';

  // Engajamento geral
  const engCount = {ativo:0, risco:0, inativo:0, novo:0};
  names.forEach(n=>{ engCount[getEngagementStatus(students[n])]++; });
  const engHtml = Object.entries(engCount).filter(([,v])=>v>0).map(([k,v])=>`
    <div class="alert-item">
      <div class="alert-dot" style="background:${ENG_COLOR[k]}"></div>
      <div style="flex:1"><div class="alert-text">${ENG_LABEL[k]}</div></div>
      <div style="font-weight:700;color:${ENG_COLOR[k]}">${v} aluno${v>1?'s':''}</div>
    </div>`).join('') || '<p style="color:#718096;font-size:.82rem">Sem alunos.</p>';

  // Todos os alertas da turma
  let allAlerts = [];
  names.forEach(n => allAlerts = allAlerts.concat(generateAlerts(n, students[n])));
  allAlerts.sort((a,b) => a.priority - b.priority);
  const alertSection = allAlerts.length
    ? allAlerts.map(renderAlertCard).join('')
    : '<p style="color:#10b981;font-size:.82rem">Nenhum alerta crítico na turma.</p>';

  // Evolução média da turma por habilidade
  const classEvoRows = Object.keys(SKILL_LABELS).map(sk => {
    const vals = names.map(n => {
      const evo = getSkillEvolution(n);
      if(!evo) return null;
      const e = evo.early[sk], r = evo.recent[sk];
      if(!e||e.t===0||!r||r.t===0) return null;
      return { early: Math.round(e.c/e.t*100), recent: Math.round(r.c/r.t*100) };
    }).filter(Boolean);
    if(!vals.length) return '';
    const avgEarly  = Math.round(vals.reduce((s,v)=>s+v.early,0)/vals.length);
    const avgRecent = Math.round(vals.reduce((s,v)=>s+v.recent,0)/vals.length);
    const diff = avgRecent - avgEarly;
    const arrow = diff > 3 ? '▲' : diff < -3 ? '▼' : '→';
    const arrowCls = diff > 3 ? 'evo-arrow-up' : diff < -3 ? 'evo-arrow-down' : 'evo-arrow-flat';
    const badge = diff > 3 ? `<span class="evo-badge evo-badge-up">+${diff}%</span>`
                : diff < -3 ? `<span class="evo-badge evo-badge-down">${diff}%</span>`
                : `<span class="evo-badge evo-badge-flat">estável</span>`;
    return `<tr>
      <td class="evo-name">${SKILL_ICONS[sk]} ${SKILL_LABELS[sk]}</td>
      <td class="evo-bar-wrap">
        <div class="evo-mini-bar"><div class="evo-mini-early" style="width:${avgEarly}%;background:${SKILL_COLORS[sk]}"></div></div>
        <div class="evo-mini-bar" style="margin-top:2px"><div class="evo-mini-now" style="width:${avgRecent}%;background:${SKILL_COLORS[sk]}"></div></div>
      </td>
      <td class="evo-pcts">
        <span class="evo-pct-early">${avgEarly}%</span>
        <span class="evo-arrow ${arrowCls}">${arrow}</span>
        <span class="evo-pct-now" style="color:${SKILL_COLORS[sk]}">${avgRecent}%</span>
        ${badge}
      </td>
    </tr>`;
  }).join('');
  const classEvoHtml = classEvoRows
    ? `<table class="evo-table">
        <thead><tr>
          <td style="font-size:.7rem;color:#94a3b8;padding-bottom:4px">Habilidade</td>
          <td style="font-size:.7rem;color:#94a3b8">Início → Agora (média)</td>
          <td style="font-size:.7rem;color:#94a3b8">Variação</td>
        </tr></thead><tbody>${classEvoRows}</tbody></table>`
    : '<p style="color:#94a3b8;font-size:.8rem">Dados insuficientes para mostrar evolução da turma.</p>';

  document.getElementById('teacher-content').innerHTML = teacherNav('analytics') + `
    <div class="t-section-title">Analiticos da Turma</div>

    <div class="analytics-grid" style="margin-bottom:10px">
      <div class="analytics-card" style="grid-column:1/-1">
        <h4>Alertas da Turma (${allAlerts.length})</h4>
        ${alertSection}
      </div>
    </div>

    <div class="analytics-grid">
      <div class="analytics-card">
        <h4>Desempenho por Habilidade (turma)</h4>
        <div class="sp-profile">${classSkillHtml}</div>
        ${classWeak[0]?`<div style="margin-top:10px;padding:8px 10px;background:#fff7ed;border-radius:6px;font-size:.8rem;color:#92400e">
          Sugestao para proxima aula: reforce <strong>${SKILL_ICONS[classWeak[0].skill]} ${SKILL_LABELS[classWeak[0].skill]}</strong>
          (${classWeak[0].pct}% de acerto médio)</div>`:''}
      </div>
      <div class="analytics-card">
        <h4>Evolucao da Turma (inicio vs agora)</h4>
        ${classEvoHtml}
      </div>
    </div>

    <div class="analytics-grid">
      <div class="analytics-card">
        <h4>Alunos com Maior Dificuldade</h4>
        ${diffHtml}
      </div>
      <div class="analytics-card">
        <h4>Tempo Medio por Modulo</h4>
        ${timeHtml}
      </div>
    </div>

    <div class="analytics-grid">
      <div class="analytics-card">
        <h4>Erros Mais Comuns</h4>
        ${errorsHtml}
      </div>
      <div class="analytics-card">
        <h4>Status de Engajamento</h4>
        ${engHtml}
      </div>
    </div>`;
}

   ANÁLISE INDIVIDUAL — funções auxiliares
================================================================ */
function getExerciseTypeStats(studentName){
  const data = getStudents()[studentName] || {};
  const answers = data.answers || {};
  const s = {mc:{c:0,t:0,label:'Múltipla Escolha',color:'#C62828'},
              fill:{c:0,t:0,label:'Completar Frase',color:'#f59e0b'},
              tf:{c:0,t:0,label:'Verdadeiro/Falso',color:'#10b981'}};
  LEVELS.forEach(lv => {
    Object.keys(answers[lv]||{}).forEach(mi => {
      const mod = CONTENT[lv]?.[parseInt(mi)];
      if(!mod?.exercises) return;
      Object.keys(answers[lv][mi]).forEach(ei => {
        const ex  = mod.exercises[parseInt(ei)];
        const ans = answers[lv][mi][ei];
        if(ex && s[ex.type]){ s[ex.type].t++; if(ans.correct) s[ex.type].c++; }
      });
    });
  });
  return s;
}

function getProgressSummary(studentName){
  const data = getStudents()[studentName] || {};
  const answers  = data.answers || {};
  const progress = data.progress || {};
  let totalDone=0, totalMods=0, totalAnswered=0, totalCorrect=0;
  LEVELS.forEach(lv => {
    totalDone += (progress[lv]||[]).length;
    totalMods += CONTENT[lv].length;
    Object.values(answers[lv]||{}).forEach(mod => {
      const vals = Object.values(mod);
      totalAnswered += vals.length;
      totalCorrect  += vals.filter(a=>a.correct).length;
    });
  });
  const avgTime = (() => {
    const times = Object.values(data.responseTimes||{});
    return times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length) : null;
  })();
  return {totalDone, totalMods, totalAnswered, totalCorrect, avgTime,
          accuracy: totalAnswered ? Math.round(totalCorrect/totalAnswered*100) : null};
}

function generateTeacherRecommendations(studentName, data){
  const progress = data.progress || {};
  const answers  = data.answers  || {};
  const stats    = getSkillStats(studentName);
  const weak     = getWeakSkills(stats);
  const retries  = data.moduleRetries || {};
  const recs     = [];

  // ── Módulos travados (3+ tentativas) ────────────────────────
  Object.entries(retries).forEach(([key, count]) => {
    if(count < 3) return;
    const [lv, mi] = key.split('-');
    const mod  = CONTENT[lv]?.[parseInt(mi)];
    const done = (progress[lv]||[]).includes(parseInt(mi));
    if(mod && !done)
      recs.push({ cat:'urgent', icon:'🆘', priority:1,
        title:'Intervenção presencial necessária',
        desc:`"${mod.title}" (Nível ${lv}, Módulo ${parseInt(mi)+1}) foi tentado <strong>${count} vezes</strong> sem conclusão. Revisar este conteúdo diretamente em aula.`,
        tags:[SKILL_LABELS[(SKILL_TAGS[key]||['grammar'])[0]]] });
  });

  // ── Aluno nunca iniciou ──────────────────────────────────────
  const totalDone = LEVELS.reduce((s,lv)=>(progress[lv]||[]).length+s, 0);
  if(totalDone === 0){
    recs.push({ cat:'urgent', icon:'🚫', priority:1,
      title:'Aluno ainda não iniciou nenhum módulo',
      desc:'Apresentar a plataforma em aula. Começar pelo Nível A1 — Módulo 1.',
      tags:['A1'] });
    return recs;
  }

  // ── Habilidades muito fracas (<50%) — trabalho em aula ───────
  weak.filter(w=>w.pct<50&&w.total>=4).forEach(w => {
    const failedMods = [];
    LEVELS.forEach(lv => Object.keys(answers[lv]||{}).forEach(mi => {
      const key = `${lv}-${mi}`;
      if(!(SKILL_TAGS[key]||[]).includes(w.skill)) return;
      const vals = Object.values(answers[lv][mi]);
      const pct  = vals.length ? Math.round(vals.filter(a=>a.correct).length/vals.length*100) : 100;
      if(pct < 60){ const m = CONTENT[lv]?.[parseInt(mi)]; if(m) failedMods.push(m.title); }
    }));
    recs.push({ cat:'urgent', icon:'📉', priority:2,
      title:`Dedicar aula a: ${SKILL_ICONS[w.skill]} ${SKILL_LABELS[w.skill]}`,
      desc:`Apenas <strong>${w.pct}%</strong> de acerto (${w.total} questões). ${failedMods.length?`Módulos com mais erros: ${failedMods.slice(0,2).join(', ')}.`:'Preparar material de apoio específico.'}`,
      tags:[`${w.pct}% acerto`, 'Prioridade alta'] });
  });

  // ── Habilidades medianas (50–70%) — reforço fora de aula ─────
  weak.filter(w=>w.pct>=50&&w.pct<70&&w.total>=3).forEach(w => {
    recs.push({ cat:'review', icon:'📋', priority:3,
      title:`Reforçar: ${SKILL_ICONS[w.skill]} ${SKILL_LABELS[w.skill]}`,
      desc:`${w.pct}% de acerto. Sugerir ao aluno revisar os módulos desta habilidade e praticar fora da aula.`,
      tags:[`Meta: 70%+`] });
  });

  // ── Habilidades fortes (≥80%) — avançar ─────────────────────
  const strong = Object.entries(stats).filter(([,v])=>v.t>=3&&Math.round(v.c/v.t*100)>=80);
  if(strong.length){
    const nextAvail = [];
    LEVELS.forEach(lv => CONTENT[lv].forEach((m,i) => {
      if((progress[lv]||[]).includes(i)) return;
      const sk = SKILL_TAGS[`${lv}-${i}`]||[];
      if(strong.some(([k])=>sk.includes(k))) nextAvail.push({lv,i,title:m.title,sk});
    }));
    if(nextAvail.length)
      recs.push({ cat:'advance', icon:'🚀', priority:4,
        title:`Pronto para avançar em: ${strong.map(([k])=>SKILL_LABELS[k]).join(', ')}`,
        desc:`Desempenho acima de 80%. Próximos módulos recomendados:`,
        modules: nextAvail.slice(0,3) });
  }

  // ── Padrão de erros por tipo de exercício ───────────────────
  const exStats = getExerciseTypeStats(studentName);
  const worstType = Object.entries(exStats)
    .filter(([,v])=>v.t>=3)
    .map(([k,v])=>({k,pct:Math.round(v.c/v.t*100),label:v.label}))
    .sort((a,b)=>a.pct-b.pct)[0];
  if(worstType && worstType.pct < 65){
    const tips = {
      mc:   'Trabalhar compreensão de enunciados e eliminação de alternativas em aula.',
      fill: 'Praticar produção escrita — ditados e exercícios de lacuna no caderno.',
      tf:   'Reforçar regras conceituais — explicação + exemplos antes dos exercícios.'
    };
    recs.push({ cat:'normal', icon:'🔍', priority:5,
      title:`Dificuldade com: ${worstType.label}`,
      desc:`${worstType.pct}% de acerto neste formato. ${tips[worstType.k]}`,
      tags:[worstType.label] });
  }

  return recs.sort((a,b)=>a.priority-b.priority);
}

function renderStudentAnalysis(studentName, data){
  const stats   = getSkillStats(studentName);
  const evo     = getSkillEvolution(studentName);
  const summary = getProgressSummary(studentName);
  const recs    = generateTeacherRecommendations(studentName, data);
  const exStats = getExerciseTypeStats(studentName);
  const alerts  = generateAlerts(studentName, data);

  // ── Cartões de resumo ──────────────────────────────────────
  const summaryHtml = `<div class="astat-grid">
    <div class="astat-card"><div class="astat-val">${summary.totalDone}</div><div class="astat-lbl">Módulos concluídos</div></div>
    <div class="astat-card"><div class="astat-val">${summary.totalMods - summary.totalDone}</div><div class="astat-lbl">Módulos pendentes</div></div>
    <div class="astat-card"><div class="astat-val">${summary.totalAnswered}</div><div class="astat-lbl">Questões respondidas</div></div>
    <div class="astat-card"><div class="astat-val" style="color:${summary.accuracy===null?'#94a3b8':summary.accuracy>=70?'#10b981':'#ef4444'}">${summary.accuracy!==null?summary.accuracy+'%':'—'}</div><div class="astat-lbl">Precisão geral</div></div>
    <div class="astat-card"><div class="astat-val" style="font-size:1rem">${summary.avgTime?formatTime(summary.avgTime):'—'}</div><div class="astat-lbl">Tempo médio/módulo</div></div>
    <div class="astat-card"><div class="astat-val" style="font-size:1rem">${data.firstAccess?daysSince(data.firstAccess)+'d':'—'}</div><div class="astat-lbl">Dias na plataforma</div></div>
  </div>`;

  // ── Recomendações ──────────────────────────────────────────
  const recHtml = recs.length
    ? recs.map(r => `<div class="rec-card rec-${r.cat}">
        <span class="rec-icon">${r.icon}</span>
        <div>
          <div class="rec-title">${r.title}</div>
          <div class="rec-desc">${r.desc}
            ${(r.modules||[]).map(m=>`<div style="margin-top:5px;padding:5px 10px;background:#fff;border-radius:7px;font-size:.78rem;color:#C62828;font-weight:500;cursor:pointer;border:1.5px solid #e0e7ff;display:flex;align-items:center;gap:6px;transition:.15s"
              onclick="showTeacherModuleView('${studentName}','${m.lv}',${m.i})"
              onmouseover="this.style.background='#fff8e1';this.style.borderColor='#C62828'"
              onmouseout="this.style.background='#fff';this.style.borderColor='#ffebee'">
              <span style="color:#C62828">→</span>
              <span style="flex:1">${m.title}</span>
              <span style="color:#94a3b8;font-size:.72rem">Nível ${m.lv} · Módulo ${m.i+1}</span>
              <span style="color:#C62828;font-size:.75rem">&#8250; ver</span>
            </div>`).join('')}
          </div>
          ${(r.tags||[]).map(t=>`<span class="rec-tag">${t}</span>`).join('')}
        </div>
      </div>`).join('')
    : `<div style="color:#10b981;font-size:.85rem;padding:10px">Nenhuma necessidade crítica identificada. Aluno progredindo bem!</div>`;

  // ── Tipo de exercício ──────────────────────────────────────
  const exTypeHtml = Object.entries(exStats).map(([k,v]) => {
    if(v.t === 0) return '';
    const pct = Math.round(v.c/v.t*100);
    const col = pct<60?'#ef4444':pct<80?'#f59e0b':'#10b981';
    return `<div class="extype-row">
      <span class="extype-label">${v.label}</span>
      <div class="extype-bar"><div class="extype-fill" style="width:${pct}%;background:${col}"></div></div>
      <span class="extype-pct" style="color:${col}">${pct}%</span>
      <span style="font-size:.7rem;color:#94a3b8">(${v.t} questões)</span>
    </div>`;
  }).join('') || '<p style="color:#94a3b8;font-size:.82rem">Nenhuma questão respondida ainda.</p>';

  // ── Alertas ────────────────────────────────────────────────
  const alertHtml = alerts.length
    ? alerts.map(renderAlertCard).join('')
    : `<p style="color:#10b981;font-size:.82rem">Nenhum alerta para este aluno.</p>`;

  // ── Próximos módulos (por nível) ───────────────────────────
  const nextByLevel = LEVELS.map(lv => {
    const progress = data.progress || {};
    const pending  = CONTENT[lv].map((m,i)=>({m,i}))
      .filter(({i}) => !(progress[lv]||[]).includes(i))
      .slice(0,3);
    if(!pending.length) return '';
    const done  = (progress[lv]||[]).length;
    const total = CONTENT[lv].length;
    const pct   = Math.round(done/total*100)||0;
    return `<div style="margin-bottom:12px">
      <div style="font-size:.78rem;font-weight:700;color:#374151;margin-bottom:5px">
        Nível ${lv} — ${done}/${total} concluídos (${pct}%)
        <div style="display:inline-block;width:60px;height:6px;background:#e2e8f0;border-radius:3px;margin-left:6px;vertical-align:middle">
          <div style="width:${pct}%;height:100%;background:#C62828;border-radius:3px"></div>
        </div>
      </div>
      ${pending.map(({m,i}) => {
        const skills = (SKILL_TAGS[`${lv}-${i}`]||[]).map(s=>`<span style="font-size:.65rem;background:${SKILL_COLORS[s]}15;color:${SKILL_COLORS[s]};padding:1px 5px;border-radius:6px;font-weight:600">${SKILL_LABELS[s]}</span>`).join(' ');
        const tUnlocked = isTeacherUnlocked(studentName, lv, i);
        return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#FFFFFF;border-radius:7px;margin-bottom:4px;cursor:pointer;border:1.5px solid transparent;transition:.15s"
          onclick="showTeacherModuleView('${studentName}','${lv}',${i})"
          onmouseover="this.style.background='#fff8e1';this.style.borderColor='#FBC02D'"
          onmouseout="this.style.background='#FFFFFF';this.style.borderColor='transparent'">
          <span style="font-size:.72rem;color:#94a3b8;width:22px;flex-shrink:0">M${i+1}</span>
          <span style="font-size:.81rem;color:#C62828;flex:1;font-weight:500">${m.title} ${skills}</span>
          ${tUnlocked?`<span style="font-size:.68rem;color:#F57F17;font-weight:700">🔓</span>`:''}
          <span style="font-size:.75rem;color:#C62828;flex-shrink:0">&#8250; ver</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  // ── Diagnóstico por nível ──────────────────────────────────
  const diagResults = data.diagnosticResults || {};
  const diagHtml = `<div class="analytics-card" style="margin-bottom:16px">
    <h4>📋 Provas Diagnósticas por Nível</h4>
    ${LEVELS.map(lv => {
      const r = diagResults[lv];
      const progress2 = data.progress || {};
      const done2 = (progress2[lv]||[]).length;
      const total2 = CONTENT[lv].length;
      const pct2 = Math.round(done2/total2*100)||0;
      if(!r) return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f1f5f9">
        <span style="font-size:.8rem;font-weight:700;color:#374151;width:24px">${lv}</span>
        <div style="flex:1;font-size:.78rem;color:#9ca3af">
          ${pct2>=70?'Prova disponível — aluno ainda não realizou':'Completar ≥70% para liberar'}
          <span style="margin-left:6px;background:#F5F5F5;padding:1px 7px;border-radius:8px;font-size:.7rem">${pct2}% do nível</span>
        </div>
        <span style="font-size:.72rem;color:#94a3b8">—</span>
      </div>`;
      const col = r.passed ? '#10b981' : '#ef4444';
      const skillPills = Object.entries(r.skillBreakdown||{}).filter(([,v])=>v.t>0).map(([sk,v])=>{
        const p=Math.round(v.c/v.t*100);
        return `<span style="font-size:.68rem;background:${SKILL_COLORS[sk]}15;color:${SKILL_COLORS[sk]};padding:1px 6px;border-radius:6px;font-weight:700">${SKILL_LABELS[sk]}: ${p}%</span>`;
      }).join(' ');
      return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
        <span style="font-size:.8rem;font-weight:700;color:#374151;width:24px;margin-top:2px">${lv}</span>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <strong style="font-size:.84rem;color:${col}">${r.correct}/${r.total} (${r.pct}%)</strong>
            <span style="background:${r.passed?'#dcfce7':'#fee2e2'};color:${col};padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:700">${r.passed?'✓ Aprovado':'✗ Revisão necessária'}</span>
            <span style="font-size:.7rem;color:#9ca3af">${new Date(r.ts).toLocaleDateString('pt-BR')}</span>
          </div>
          <div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px">${skillPills}</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  return `
    ${summaryHtml}
    ${diagHtml}
    <div class="analytics-grid">
      <div class="analytics-card">
        <h4>📊 Mapa de Habilidades</h4>
        <div class="sp-profile">${renderSkillBars(stats)||'<span style="font-size:.8rem;color:#718096">Sem dados ainda.</span>'}</div>
      </div>
      <div class="analytics-card">
        <h4>📈 Evolução (início vs agora)</h4>
        ${renderSkillEvolutionTable(evo)}
      </div>
    </div>
    <div class="analytics-card" style="margin-bottom:16px">
      <h4>🎯 Desempenho por Tipo de Exercício</h4>
      ${exTypeHtml}
      ${(() => {
        const vals = Object.entries(exStats).filter(([,v])=>v.t>=3).map(([k,v])=>({k,pct:Math.round(v.c/v.t*100),label:v.label})).sort((a,b)=>a.pct-b.pct);
        if(!vals.length) return '';
        const best  = vals[vals.length-1];
        const worst = vals[0];
        return `<div style="margin-top:10px;font-size:.78rem;color:#374151;background:#FFFFFF;padding:8px 10px;border-radius:8px">
          ${worst.pct < 65 ? `⚠ Maior dificuldade: <strong>${worst.label}</strong> (${worst.pct}%). ` : ''}
          ${best.pct >= 75 ? `✓ Melhor desempenho: <strong>${best.label}</strong> (${best.pct}%).` : ''}
        </div>`;
      })()}
    </div>
    <div class="analytics-card" style="margin-bottom:16px">
      <h4>💡 Recomendações para a Próxima Aula</h4>
      ${recHtml}
    </div>
    <div class="analytics-card" style="margin-bottom:16px">
      <h4>🔔 Alertas Individuais</h4>
      ${alertHtml}
    </div>
    <div class="analytics-card">
      <h4>📋 Próximos Módulos Pendentes</h4>
      ${nextByLevel || '<p style="color:#10b981;font-size:.85rem">Todos os módulos concluídos!</p>'}
    </div>`;
}

}
function deleteLogEntry(studentName, id){
  if(!confirm('Excluir este registro de aula?')) return;
  let entries=getStudentLog(studentName);
  entries=entries.filter(e=>e.id!==id);
  saveStudentLog(studentName,entries);
  renderClassLogTab(studentName);
}
function saveLogEntry(studentName){
  const date   = document.getElementById('log-date')?.value||'';
  const taught = document.getElementById('log-taught')?.value.trim()||'';
  const situ   = document.getElementById('log-situ')?.value.trim()||'';
  const erros  = document.getElementById('log-erros')?.value.trim()||'';
  const obs    = document.getElementById('log-obs')?.value.trim()||'';
  if(!date && !taught){ alert('Preencha pelo menos a data ou o conteúdo ensinado.'); return; }
  let entries=getStudentLog(studentName);
  if(logFormState?.editId){
    entries=entries.map(e=>e.id===logFormState.editId
      ? {...e, date, taught, situ, erros, obs, updatedAt:Date.now()} : e);
  } else {
    entries.unshift({ id:'log_'+Date.now(), date, taught, situ, erros, obs, createdAt:Date.now() });
  }
  saveStudentLog(studentName, entries);
  logFormState=null;
  renderClassLogTab(studentName);
}

      <h4>📓 ${ed?'Editar registro':'Nova entrada no diário'}</h4>

        <div class="log-form-label" style="color:#dc2626">⚠️ Erros observados</div>

        <div class="log-form-label" style="color:#F57F17">💬 Observações gerais</div>
        <textarea id="log-obs" class="log-form-ta" rows="2"

          Cancelar
        </button>
      </div>
    </div>`;
  }

  const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    const p=d.split('-');
    if(p.length===3) return `${p[2]} ${MONTHS[parseInt(p[1])-1]} ${p[0]}`;
    return d;
  };

  const listHtml = entries.length
    ? entries.map(e=>{
        const preview=e.taught ? e.taught.substring(0,70)+(e.taught.length>70?'…':'') : '(sem descrição)';
        const hasErros=!!e.erros, hasSitu=!!e.situ;

        return `<div class="log-entry" id="logentry-${e.id}">

              <div class="log-field-label" style="color:#059669">🗣 Situações reais</div>
              <div class="log-field-text">${e.situ}</div>
            </div>`:''}
            ${e.erros?`<div class="log-field">
              <div class="log-field-label" style="color:#dc2626">⚠️ Erros observados</div>
              <div class="log-field-text" style="background:#fff5f5;border-left:3px solid #fca5a5">${e.erros}</div>
            </div>`:''}
            ${e.obs?`<div class="log-field">
              <div class="log-field-label" style="color:#F57F17">💬 Observações</div>
              <div class="log-field-text" style="background:#faf5ff;border-left:3px solid #ddd6fe">${e.obs}</div>
            </div>`:''}
            <div style="display:flex;gap:8px;margin-top:14px;padding-top:10px;border-top:1px solid #f1f5f9">

          </div>
        </div>`;
      }).join('')
    : `<div style="text-align:center;padding:32px 16px;background:#FFFFFF;border-radius:12px;border:2px dashed #e2e8f0">
        <div style="font-size:2rem;margin-bottom:8px">📓</div>
        <div style="font-weight:700;color:#374151;margin-bottom:4px">Nenhum registro ainda</div>
        <p style="color:#9ca3af;font-size:.84rem">Clique em "Nova Entrada" para registrar a primeira aula.</p>
      </div>`;

  // Painel de erros recorrentes (gerado automaticamente a partir dos logs)
  let errosSummary='';
  const allErros=entries.filter(e=>e.erros).map(e=>e.erros);
  if(allErros.length>=2){
    errosSummary=`<div style="background:#fff5f5;border:1.5px solid #fca5a5;border-radius:12px;padding:14px 16px;margin-bottom:16px">
      <div style="font-size:.82rem;font-weight:700;color:#dc2626;margin-bottom:8px">⚠️ Histórico de erros registrados (${allErros.length} aulas)</div>
      ${allErros.slice(0,3).map((e,i)=>`<div style="font-size:.81rem;color:#374151;padding:5px 0;border-bottom:1px solid #fee2e2${i===Math.min(allErros.length,3)-1?';border:none':''}">
        <span style="color:#9ca3af;font-size:.72rem">${fmtLogDate(entries.filter(en=>en.erros)[i]?.date)}</span> — ${e.substring(0,120)}${e.length>120?'…':''}
      </div>`).join('')}
      ${allErros.length>3?`<div style="font-size:.77rem;color:#9ca3af;margin-top:6px">+${allErros.length-3} registro${allErros.length-3!==1?'s':''} anteriores</div>`:''}
    </div>`;
  }

  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:.95rem;font-weight:700;color:#C62828">📓 Diário de Aula</div>

      </div>
      ${!logFormState?`<button onclick="openLogForm('${studentName}',null)"
        style="background:#FBC02D;color:#fff;border:none;padding:9px 20px;border-radius:9px;cursor:pointer;font-size:.84rem;font-weight:700;transition:.2s;display:flex;align-items:center;gap:6px"
        onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#F57F17'">
        ✏️ Nova Entrada

    </div>
    ${formHtml}
    ${errosSummary}
    ${listHtml}`;
}

let currentDetailStudent = '';
function showStudentTab(tab){
  document.getElementById('stab-analysis').style.display = tab==='analysis' ? '' : 'none';
  document.getElementById('stab-modules').style.display  = tab==='modules'  ? '' : 'none';
  const trailEl = document.getElementById('stab-trail');
  if(trailEl) trailEl.style.display = tab==='trail' ? '' : 'none';
  const logEl = document.getElementById('stab-log');
  if(logEl) logEl.style.display = tab==='log' ? '' : 'none';
  document.querySelectorAll('.stab').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='trail' && currentDetailStudent) renderTrailTab(currentDetailStudent);
  if(tab==='log'   && currentDetailStudent) renderClassLogTab(currentDetailStudent);
}

function showStudentDetail(studentName){
  currentDetailStudent = studentName;
  const students = getStudents();
  const data     = students[studentName]||{progress:{},answers:{}};
  const progress = data.progress||{};
  const answers  = data.answers||{};
  const notes    = getTeacherNotes();
  const studentNotes = notes[studentName]||{};
  const status   = getEngagementStatus(data);
  const sc       = ENG_COLOR[status];
  const summary  = getProgressSummary(studentName);

  // ── Cabeçalho ───────────────────────────────────────────────
  const header = `
    <button class="t-back-btn" onclick="renderTeacherDashboard()">&#8592; Voltar para lista de alunos</button>
    <div class="student-detail-header" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;width:100%">
        <div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <h2>${studentName}</h2>
            <span style="font-size:.72rem;font-weight:700;color:${sc};background:${sc}18;padding:3px 10px;border-radius:10px">${ENG_LABEL[status]}</span>
          </div>
          <div style="font-size:.75rem;color:#9ca3af;margin-top:3px">
            ${data.firstAccess?`Na plataforma desde ${fmtDate(data.firstAccess)} &nbsp;·&nbsp;`:''}
            ${summary.totalDone}/${summary.totalMods} módulos &nbsp;·&nbsp;
            Precisão geral: ${summary.accuracy!==null?summary.accuracy+'%':'sem dados'}
          </div>
        </div>
        <button onclick="showTeacherReport('${studentName}')" style="background:#F57F17;color:#fff;border:none;padding:9px 18px;border-radius:9px;cursor:pointer;font-size:.84rem;font-weight:700;display:flex;align-items:center;gap:7px;transition:.2s;white-space:nowrap" onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#F57F17'">
          📄 Gerar Relatório
        </button>
      </div>
    </div>`;

  // ── Aba: Módulos (lógica existente) ─────────────────────────
  let modulesHtml = '';
  LEVELS.forEach(lv => {
    const mods     = CONTENT[lv];
    const doneMods = (progress[lv]||[]);
    const pct      = Math.round(doneMods.length/mods.length*100)||0;
    modulesHtml += `<div class="level-block">
      <h3>Nivel ${lv} <span style="font-size:.85rem;color:#718096;font-weight:400">${doneMods.length}/${mods.length} modulos &middot; ${pct}%</span></h3>`;
    mods.forEach((mod,i) => {
      const done       = doneMods.includes(i);
      const modAnswers = answers[lv]&&answers[lv][i] ? answers[lv][i] : {};
      const noteKey    = `${lv}-${i}`;
      const savedNote  = studentNotes[noteKey] ? studentNotes[noteKey].note : '';
      const total      = mod.exercises ? mod.exercises.length : 0;
      const correct    = Object.values(modAnswers).filter(a=>a.correct).length;
      const answered   = Object.keys(modAnswers).length;

      let quickSummary = '';
      if(answered>0 && mod.exercises)
        mod.exercises.forEach((ex,ei) => {
          const ans = modAnswers[ei];
          if(ans) quickSummary += `<span class="${ans.correct?'ans-correct':'ans-wrong'}">Q${ei+1}</span>`;
        });

      let exercisesHtml = '';
      if(mod.exercises && mod.exercises.length>0){
        const toggleId = `tex_${lv}_${i}`;
        exercisesHtml += `<button class="mod-exercises-toggle" onclick="toggleExercises('${toggleId}',this)">Ver exercicios &#9660;</button>
          <div class="teacher-exercises" id="${toggleId}">`;
        mod.exercises.forEach((ex,ei) => {
          const ans = modAnswers[ei];
          let rowCls='t-ex-unanswered', metaHtml='';
          if(ans){
            rowCls = ans.correct ? 't-ex-ok' : 't-ex-fail';
            let studentTxt='', correctTxt='';
            if(ex.type==='mc')  { studentTxt=ex.options[ans.value]||ans.value; correctTxt=ex.options[ex.answer]; }
            else if(ex.type==='fill'){ studentTxt=ans.value; correctTxt=ex.answer.split('|')[0]; }
            else if(ex.type==='tf')  { studentTxt=ans.value?'Verdadeiro':'Falso'; correctTxt=ex.answer?'Verdadeiro':'Falso'; }
            metaHtml += `<span><span class="t-ex-label">Aluno:</span><span class="${ans.correct?'t-ex-student-ok':'t-ex-student-fail'}">${studentTxt}</span></span>`;
            if(!ans.correct) metaHtml += `<span><span class="t-ex-label">Correto:</span><span class="t-ex-correct-ans">${correctTxt}</span></span>`;
          } else metaHtml += `<span class="t-ex-unanswered-tag">Nao respondida</span>`;
          exercisesHtml += `<div class="t-ex-row ${rowCls}">
            <div class="t-ex-question">${ei+1}. ${ex.question}</div>
            <div class="t-ex-meta">${metaHtml}</div>
          </div>`;
        });
        exercisesHtml += `</div>`;
      }

      const tUnlocked = isTeacherUnlocked(studentName, lv, i);
      let unlockCtrl = '';
      if(done)
        unlockCtrl = `<span class="mod-status-done">&#10003; Concluido</span>`;
      else if(tUnlocked)
        unlockCtrl = `<span class="teacher-unlocked-badge">&#128275; Desbloqueado pelo professor</span>
          <button class="revoke-btn" onclick="teacherRevokeModule('${studentName}','${lv}',${i})">&#128274; Bloquear</button>`;
      else
        unlockCtrl = `<button class="unlock-btn" onclick="teacherUnlockModule('${studentName}','${lv}',${i})">&#128275; Desbloquear módulo</button>`;

      const cleanTitle = mod.title.replace(/^Módulo \d+ [–-] /,'').replace(/^Modulo \d+ [–-] /,'');
      modulesHtml += `<div class="mod-row">
        <div class="mod-info">
          <h4 style="cursor:pointer;color:#C62828;display:inline" onclick="showTeacherModuleView('${studentName}','${lv}',${i})"
              title="Clique para ver o conteúdo completo">
            Modulo ${i+1} – ${cleanTitle} <span style="font-size:.72rem;font-weight:400;color:#C62828">&#128065; ver</span>
          </h4>
          <div style="margin-top:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            ${unlockCtrl}
            ${answered>0?`<span style="font-size:.75rem;color:#718096">${correct}/${total} corretas</span>`:''}
            ${answered>0?`<span style="font-size:.72rem;color:#94a3b8">${quickSummary}</span>`:''}
          </div>
          ${exercisesHtml}
        </div>
        <div class="note-area">
          <textarea class="note-textarea" id="note_${lv}_${i}" placeholder="Adicionar observacao para o aluno...">${savedNote}</textarea>
          <br><button class="save-note-btn" onclick="saveTeacherNote('${studentName}','${noteKey}','${lv}',${i})">Salvar observacao</button>
          <div class="note-saved-label" id="note-saved-${lv}-${i}">Observacao salva!</div>
        </div>
      </div>`;
    });
    modulesHtml += `</div>`;
  });

  let html = header + `
    <div class="student-tabs">
      <button class="stab active" data-tab="analysis" onclick="showStudentTab('analysis')">📊 Resumo</button>
      <button class="stab" data-tab="modules" onclick="showStudentTab('modules')">📖 Módulos</button>
      <button class="stab" data-tab="trail" onclick="showStudentTab('trail')">🗺 Trilha</button>
      <button class="stab" data-tab="log" onclick="showStudentTab('log')">📓 Diário</button>
    </div>
    <div id="stab-analysis">${renderStudentAnalysis(studentName, data)}</div>
    <div id="stab-modules" style="display:none">${modulesHtml}</div>
    <div id="stab-trail" style="display:none"></div>
    <div id="stab-log" style="display:none"></div>`;

  document.getElementById('teacher-content').innerHTML = teacherNav('students') + html;
}

function showTeacherModuleView(studentName, level, modIdx){
  const mod        = CONTENT[level][modIdx];
  const students   = getStudents();
  const data       = students[studentName]||{};
  const modAnswers = (data.answers&&data.answers[level]&&data.answers[level][modIdx])||{};
  const notes      = getTeacherNotes();
  const savedNote  = (notes[studentName]&&notes[studentName][`${level}-${modIdx}`])||{};
  const done       = ((data.progress&&data.progress[level])||[]).includes(modIdx);
  const modSkills  = SKILL_TAGS[`${level}-${modIdx}`]||[];
  const answered   = Object.keys(modAnswers).length;
  const correct    = Object.values(modAnswers).filter(a=>a.correct).length;
  const pct        = answered ? Math.round(correct/answered*100) : null;
  const pctCol     = pct===null?'#94a3b8':pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444';

  const skillChips = modSkills.map(s=>
    `<span style="font-size:.72rem;background:${SKILL_COLORS[s]}18;color:${SKILL_COLORS[s]};padding:2px 9px;border-radius:10px;font-weight:700">${SKILL_ICONS[s]} ${SKILL_LABELS[s]}</span>`
  ).join(' ');

  // ── Cabeçalho do módulo ──────────────────────────────────────
  let html = `
    <button class="t-back-btn" onclick="showStudentDetail('${studentName}');setTimeout(()=>showStudentTab('modules'),50)">
      &#8592; Voltar para módulos de ${studentName}
    </button>

    <div style="background:#fff;border-radius:14px;padding:20px 26px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <span style="background:#ffebee;color:#C62828;font-size:.72rem;font-weight:700;padding:3px 11px;border-radius:12px">Nível ${level} · Módulo ${modIdx+1}</span>
        ${skillChips}
        <span style="background:${done?'#dcfce7':'#fef3c7'};color:${done?'#166534':'#92400e'};font-size:.72rem;font-weight:700;padding:3px 11px;border-radius:12px">${done?'✓ Concluído pelo aluno':'Não concluído'}</span>
        ${pct!==null?`<span style="font-size:.75rem;font-weight:700;color:${pctCol}">${correct}/${answered} corretas (${pct}%)</span>`:''}
      </div>
      <h2 style="font-size:1.3rem;color:#C62828;margin-bottom:14px">${mod.title}</h2>

      <!-- Conteúdo completo do módulo -->
      <div style="font-size:.92rem;line-height:1.7;color:#374151">
        ${mod.content}
      </div>

      ${savedNote.note?`
      <div style="background:#fff8e1;border-left:4px solid #FBC02D;border-radius:0 10px 10px 0;padding:12px 16px;margin-top:18px">
        <div style="font-size:.78rem;font-weight:700;color:#C62828;margin-bottom:4px">📝 Sua observação para ${studentName}</div>
        <p style="color:#374151;font-size:.88rem;margin:0">${savedNote.note}</p>
        <div style="font-size:.72rem;color:#9ca3af;margin-top:4px">${savedNote.date||''}</div>
      </div>`:''}
    </div>`;

  // ── Exercícios com respostas do aluno ────────────────────────
  if(mod.exercises && mod.exercises.length){
    html += `<div style="background:#FFFFFF;border-radius:12px;padding:20px 24px;margin-bottom:16px">
      <h3 style="font-size:.95rem;font-weight:700;color:#2d3748;margin-bottom:16px">
        Exercícios — respostas de ${studentName}
        ${pct!==null?`<span style="font-size:.82rem;font-weight:400;color:${pctCol};margin-left:8px">${correct}/${answered} corretas</span>`:''}
      </h3>`;

    mod.exercises.forEach((ex, ei) => {
      const ans = modAnswers[ei];
      let studentTxt='', correctTxt='', rowBg='#fff', rowBorder='#e2e8f0';

      if(ans){
        rowBg    = ans.correct ? '#f0fdf4' : '#fff1f2';
        rowBorder= ans.correct ? '#bbf7d0' : '#fecdd3';
        if(ex.type==='mc')  { studentTxt=ex.options[ans.value]||String(ans.value); correctTxt=ex.options[ex.answer]; }
        if(ex.type==='fill'){ studentTxt=ans.value; correctTxt=ex.answer.split('|')[0]; }
        if(ex.type==='tf')  { studentTxt=ans.value?'Verdadeiro':'Falso'; correctTxt=ex.answer?'Verdadeiro':'Falso'; }
      }

      const typeLabel = {mc:'Múltipla escolha',fill:'Completar',tf:'V ou F'}[ex.type]||ex.type;
      html += `<div style="background:${rowBg};border:1.5px solid ${rowBorder};border-radius:10px;padding:14px 16px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          <span style="font-size:.7rem;font-weight:700;background:#ffebee;color:#C62828;padding:2px 8px;border-radius:8px">${typeLabel}</span>
          ${ans
            ? `<span style="font-size:.75rem;font-weight:700;color:${ans.correct?'#059669':'#dc2626'}">${ans.correct?'✓ Correta':'✗ Incorreta'}</span>`
            : `<span style="font-size:.75rem;color:#94a3b8">Não respondida</span>`}
        </div>
        <p style="font-weight:600;color:#333333;font-size:.9rem;margin-bottom:10px">${ei+1}. ${ex.question}</p>`;

      // Mostrar opções (mc e tf) com destaque visual
      if(ex.type==='mc'){
        html += `<div style="display:flex;flex-direction:column;gap:5px">`;
        ex.options.forEach((opt,oi)=>{
          const isCorrect = oi===ex.answer;
          const isChosen  = ans && ans.value===oi;
          let bg='#F5F5F5', border2='#e2e8f0', col='#374151', prefix='';
          if(isCorrect){ bg='#dcfce7'; border2='#10b981'; col='#065f46'; prefix='✓ '; }
          if(isChosen&&!isCorrect){ bg='#fee2e2'; border2='#ef4444'; col='#7f1d1d'; prefix='✗ '; }
          html+=`<div style="background:${bg};border:1.5px solid ${border2};border-radius:7px;padding:7px 12px;font-size:.86rem;color:${col};font-weight:${isCorrect||isChosen?'600':'400'}">${prefix}${opt}</div>`;
        });
        html+=`</div>`;
      } else if(ex.type==='tf'){
        [true,false].forEach((val,vi)=>{
          const label = val?'Verdadeiro':'Falso';
          const isCorrect = val===ex.answer;
          const isChosen  = ans && ans.value===val;
          let bg='#F5F5F5', border2='#e2e8f0', col='#374151', prefix='';
          if(isCorrect){ bg='#dcfce7'; border2='#10b981'; col='#065f46'; prefix='✓ '; }
          if(isChosen&&!isCorrect){ bg='#fee2e2'; border2='#ef4444'; col='#7f1d1d'; prefix='✗ '; }
          html+=`<div style="background:${bg};border:1.5px solid ${border2};border-radius:7px;padding:7px 12px;font-size:.86rem;color:${col};font-weight:${isCorrect||isChosen?'600':'400'};margin-bottom:5px">${prefix}${label}</div>`;
        });
      } else if(ex.type==='fill'){
        html+=`<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">`;
        if(ans){
          const inputBg = ans.correct?'#dcfce7':'#fee2e2';
          const inputCol= ans.correct?'#065f46':'#7f1d1d';
          html+=`<div style="display:flex;flex-direction:column;gap:3px">
            <span style="font-size:.68rem;color:#94a3b8;font-weight:600">RESPOSTA DO ALUNO</span>
            <span style="background:${inputBg};color:${inputCol};padding:5px 14px;border-radius:7px;font-size:.88rem;font-weight:600">${studentTxt||'(vazio)'}</span>
          </div>`;
          if(!ans.correct)
            html+=`<div style="display:flex;flex-direction:column;gap:3px">
              <span style="font-size:.68rem;color:#94a3b8;font-weight:600">RESPOSTA CORRETA</span>
              <span style="background:#dbeafe;color:#1e40af;padding:5px 14px;border-radius:7px;font-size:.88rem;font-weight:600">${correctTxt}</span>
            </div>`;
        } else {
          html+=`<span style="background:#F5F5F5;color:#64748b;padding:5px 14px;border-radius:7px;font-size:.86rem">Não respondida — Resposta correta: <strong>${ex.answer.split('|')[0]}</strong></span>`;
        }
        html+=`</div>`;
      }

      html+=`</div>`; // end ex card
    });

    html+=`</div>`; // end exercises section
  }

  // ── Campo de observação (editável inline) ────────────────────
  const noteKey = `${level}-${modIdx}`;
  html+=`<div style="background:#fff;border-radius:12px;padding:18px 22px;box-shadow:0 2px 8px rgba(0,0,0,.07)">
    <h4 style="font-size:.88rem;font-weight:700;color:#C62828;margin-bottom:8px">📝 Observação para ${studentName}</h4>
    <textarea class="note-textarea" id="tmod-note" style="width:100%;min-height:80px" placeholder="Escreva uma observação para este aluno sobre este módulo...">${savedNote.note||''}</textarea>
    <br><button class="save-note-btn" onclick="saveTeacherNote('${studentName}','${noteKey}','${level}',${modIdx});document.getElementById('tmod-save-lbl').style.display='inline'">Salvar observação</button>
    <span id="tmod-save-lbl" style="display:none;color:#10b981;font-size:.78rem;margin-left:8px">✓ Salvo!</span>
  </div>`;

  document.getElementById('teacher-content').innerHTML = teacherNav('students') + html;
  window.scrollTo(0,0);
}

/* ================================================================
   RELATÓRIO DO PROFESSOR — gerado por aluno
================================================================ */
function showTeacherReport(studentName){
  document.getElementById('teacher-content').innerHTML =
    teacherNav('students') + generateReportHTML(studentName);
}

function generateReportHTML(studentName){
  const students = getStudents();
  const data     = students[studentName]||{progress:{},answers:{}};
  const summary  = getProgressSummary(studentName);
  const stats    = getSkillStats(studentName);
  const weak     = getWeakSkills(stats);
  const recs     = generateTeacherRecommendations(studentName, data);
  const alerts   = generateAlerts(studentName, data);
  const exStats  = getExerciseTypeStats(studentName);
  const status   = getEngagementStatus(data);
  const sc       = ENG_COLOR[status];
  const diagResults = data.diagnosticResults || {};
  const now      = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});

  // ── Executivo ──────────────────────────────────────────────────
  const bestSkill = Object.entries(stats).filter(([,v])=>v.t>0)
    .map(([k,v])=>({k,p:Math.round(v.c/v.t*100)})).sort((a,b)=>b.p-a.p)[0];
  const worstSkill= weak[0];
  const overallPct= summary.accuracy!==null?summary.accuracy:0;
  const overallCol= overallPct>=70?'#10b981':overallPct>=50?'#f59e0b':'#ef4444';

  const execHtml=`<div class="report-exec">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px">
      <div>
        <h2 style="margin:0">Relatório de Desempenho — ${studentName}</h2>
        <p style="opacity:.7;margin:2px 0 0">Professor: Gabriel &nbsp;·&nbsp; Gerado em: ${now}</p>
      </div>
      <span style="background:${sc};color:#fff;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:700">${ENG_LABEL[status]}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px">
      <div class="report-metric"><div class="report-metric-val">${summary.totalDone}</div><div class="report-metric-lbl">Módulos feitos</div></div>
      <div class="report-metric"><div class="report-metric-val" style="color:${overallCol}">${summary.accuracy!==null?summary.accuracy+'%':'—'}</div><div class="report-metric-lbl">Precisão geral</div></div>
      <div class="report-metric"><div class="report-metric-val">${summary.totalAnswered}</div><div class="report-metric-lbl">Questões respondidas</div></div>
      <div class="report-metric"><div class="report-metric-val" style="font-size:1rem">${summary.avgTime?formatTime(summary.avgTime):'—'}</div><div class="report-metric-lbl">Tempo médio/módulo</div></div>
      <div class="report-metric"><div class="report-metric-val" style="font-size:1rem">${data.firstAccess?daysSince(data.firstAccess)+'d':'—'}</div><div class="report-metric-lbl">Dias na plataforma</div></div>
    </div>
    ${bestSkill||worstSkill?`<div style="margin-top:12px;font-size:.84rem;opacity:.85;line-height:1.6">
      ${bestSkill&&bestSkill.p>=70?`✓ Ponto forte: <strong>${SKILL_LABELS[bestSkill.k]}</strong> (${bestSkill.p}%). `:''}
      ${worstSkill&&worstSkill.pct<70?`⚠ Precisa de atenção: <strong>${SKILL_LABELS[worstSkill.skill]}</strong> (${worstSkill.pct}%).`:''}
    </div>`:''}
  </div>`;

  // ── Diagnósticos por nível ─────────────────────────────────────
  const diagRows = LEVELS.map(lv => {
    const r = diagResults[lv];
    const progress = data.progress||{};
    const done = (progress[lv]||[]).length;
    const total = CONTENT[lv].length;
    const pct = Math.round(done/total*100)||0;
    if(!r) return `<tr>
      <td><strong>${lv}</strong></td>
      <td>${done}/${total} (${pct}%)</td>
      <td colspan="3" style="color:#94a3b8;font-size:.8rem">Prova não realizada${pct>=70?' — pode fazer agora':' — completar ≥70% do nível'}</td>
    </tr>`;
    const col=r.passed?'#10b981':'#ef4444';
    const skillCols=Object.entries(r.skillBreakdown||{}).filter(([,v])=>v.t>0)
      .map(([sk,v])=>{const p=Math.round(v.c/v.t*100);return `<span style="font-size:.72rem;background:${SKILL_COLORS[sk]}18;color:${SKILL_COLORS[sk]};padding:2px 7px;border-radius:6px;font-weight:700;margin-right:3px">${SKILL_LABELS[sk]}: ${p}%</span>`;}).join('');
    return `<tr>
      <td><strong>${lv}</strong></td>
      <td>${done}/${total} (${pct}%)</td>
      <td><strong style="color:${col}">${r.correct}/${r.total} (${r.pct}%)</strong></td>
      <td><span style="background:${r.passed?'#dcfce7':'#fee2e2'};color:${col};padding:2px 9px;border-radius:10px;font-size:.75rem;font-weight:700">${r.passed?'✓ Aprovado':'✗ Revisão necessária'}</span></td>
      <td style="font-size:.8rem">${skillCols||'—'}</td>
    </tr>`;
  }).join('');
  const diagHtml=`<div class="report-section">
    <h3>📋 Diagnóstico por Nível</h3>
    <table class="report-table">
      <thead><tr><th>Nível</th><th>Progresso</th><th>Nota</th><th>Status</th><th>Por Habilidade</th></tr></thead>
      <tbody>${diagRows}</tbody>
    </table>
  </div>`;

  // ── Habilidades ────────────────────────────────────────────────
  const skillRows2=Object.entries(stats).map(([sk,v])=>{
    if(v.t===0) return `<tr><td>${SKILL_ICONS[sk]} ${SKILL_LABELS[sk]}</td><td colspan="3" style="color:#94a3b8;font-size:.8rem">Sem dados</td></tr>`;
    const p=Math.round(v.c/v.t*100);
    const col=p<60?'#ef4444':p<80?'#f59e0b':'#10b981';
    const status2=p<60?'🔴 Crítico':p<80?'🟡 Em desenvolvimento':'🟢 Bom domínio';
    return `<tr>
      <td>${SKILL_ICONS[sk]} ${SKILL_LABELS[sk]}</td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden">
          <div style="width:${p}%;height:100%;background:${col};border-radius:4px"></div>
        </div>
        <span style="font-weight:700;color:${col};width:38px;font-size:.82rem">${p}%</span>
      </div></td>
      <td style="font-size:.75rem;color:#6b7280">${v.t} questões</td>
      <td style="font-size:.78rem">${status2}</td>
    </tr>`;
  }).join('');
  const skillHtml=`<div class="report-section">
    <h3>📊 Análise de Habilidades</h3>
    <table class="report-table">
      <thead><tr><th>Habilidade</th><th>Desempenho</th><th>Volume</th><th>Status</th></tr></thead>
      <tbody>${skillRows2}</tbody>
    </table>
  </div>`;

  // ── Plano de ação ──────────────────────────────────────────────
  const catOrder={urgent:1,review:2,advance:3,normal:4};
  const catIcon={urgent:'🔴',review:'🟡',advance:'🟢',normal:'🔵'};
  const actionRows = recs.length
    ? recs.map(r=>`<div class="action-row">
        <div class="action-priority" style="background:${r.cat==='urgent'?'#ef4444':r.cat==='review'?'#f59e0b':r.cat==='advance'?'#10b981':'#C62828'}"></div>
        <div>
          <div class="action-text">${catIcon[r.cat]||'•'} ${r.title}</div>
          <div class="action-sub">${r.desc.replace(/<[^>]*>/g,'')}</div>
          ${(r.tags||[]).map(t=>`<span class="plan-tag">${t}</span>`).join('')}
        </div>
      </div>`).join('')
    : `<div style="color:#10b981;font-size:.84rem;padding:8px">✓ Nenhuma ação urgente identificada — aluno progredindo bem.</div>`;
  const actionHtml=`<div class="report-section">
    <h3>🎯 Plano de Ação — Onde Agir</h3>
    ${actionRows}
  </div>`;

  // ── Plano sugerido para próximas 3 aulas ──────────────────────
  const urgentRec   = recs.find(r=>r.cat==='urgent');
  const reviewRec   = recs.find(r=>r.cat==='review');
  const advanceRec  = recs.find(r=>r.cat==='advance');
  const worstExType = Object.entries(exStats).filter(([,v])=>v.t>=3)
    .map(([k,v])=>({k,pct:Math.round(v.c/v.t*100),label:v.label})).sort((a,b)=>a.pct-b.pct)[0];

  const aula1 = urgentRec
    ? {title:'Intervenção direcionada', body: urgentRec.title+'. '+urgentRec.desc.replace(/<[^>]*>/g,''), tags:['Prioridade alta',...(urgentRec.tags||[])]}
    : {title:'Revisão das habilidades principais', body:`Revisar ${worstSkill?SKILL_LABELS[worstSkill.skill]+' ('+worstSkill.pct+'%)':' os módulos com mais erros'}. Exercícios práticos e exemplos contextualizados.`, tags:['Revisão']};
  const aula2 = reviewRec
    ? {title:'Reforço dirigido', body: reviewRec.desc.replace(/<[^>]*>/g,''), tags:['Reforço',...(reviewRec.tags||[])]}
    : worstExType&&worstExType.pct<70
      ? {title:`Prática de ${worstExType.label}`, body:`Aluno tem dificuldade com ${worstExType.label} (${worstExType.pct}%). Propor atividades específicas deste formato.`, tags:[worstExType.label]}
      : {title:'Consolidação e prática oral', body:'Atividade de conversação ou produção escrita para reforçar os conteúdos trabalhados.', tags:['Produção']};
  const aula3 = advanceRec
    ? {title:'Avançar para novos conteúdos', body: advanceRec.desc.replace(/<[^>]*>/g,''), tags:['Avanço']}
    : {title:'Avaliação de progresso', body:'Mini-avaliação oral ou escrita dos conteúdos trabalhados nas aulas 1 e 2. Verificar evolução e ajustar plano.', tags:['Avaliação']};

  const planHtml=`<div class="report-section">
    <h3>📅 Plano Sugerido — Próximas 3 Aulas</h3>
    ${[aula1,aula2,aula3].map((a,i)=>`<div class="plan-aula">
      <h4>Aula ${i+1} — ${a.title}</h4>
      <p>${a.body}</p>
      ${a.tags.map(t=>`<span class="plan-tag">${t}</span>`).join('')}
    </div>`).join('')}
  </div>`;

  // ── Módulos com mais erros ─────────────────────────────────────
  const problemMods=[];
  LEVELS.forEach(lv=>{
    const ans=data.answers&&data.answers[lv]||{};
    Object.keys(ans).forEach(mi=>{
      const mod=CONTENT[lv]?.[parseInt(mi)];
      if(!mod) return;
      const vals=Object.values(ans[mi]);
      if(!vals.length) return;
      const pct=Math.round(vals.filter(a=>a.correct).length/vals.length*100);
      const done=(data.progress&&data.progress[lv]||[]).includes(parseInt(mi));
      if(pct<70) problemMods.push({lv,mi:parseInt(mi),title:mod.title,pct,done,total:vals.length});
    });
  });
  problemMods.sort((a,b)=>a.pct-b.pct);
  const problemHtml=`<div class="report-section">
    <h3>⚠️ Módulos com Maior Dificuldade</h3>
    ${problemMods.length
      ? `<table class="report-table">
          <thead><tr><th>Nível</th><th>Módulo</th><th>Acerto</th><th>Status</th></tr></thead>
          <tbody>${problemMods.slice(0,10).map(m=>{
            const col=m.pct<50?'#ef4444':'#f59e0b';
            return `<tr style="cursor:pointer" onclick="showTeacherModuleView('${studentName}','${m.lv}',${m.mi})"
              onmouseover="this.style.background='#fff8e1'" onmouseout="this.style.background=''">
              <td>${m.lv}</td>
              <td style="color:#C62828;font-weight:500">${m.title} <span style="font-size:.7rem;color:#C62828">&#8250; ver</span></td>
              <td><strong style="color:${col}">${m.pct}%</strong> <span style="color:#9ca3af;font-size:.74rem">(${m.total} questões)</span></td>
              <td><span style="background:${m.done?'#dcfce7':'#fef3c7'};color:${m.done?'#166534':'#92400e'};padding:2px 8px;border-radius:8px;font-size:.74rem;font-weight:700">${m.done?'Concluído':'Incompleto'}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>`
      : `<p style="color:#10b981;font-size:.84rem">Nenhum módulo com acerto abaixo de 70%.</p>`}
  </div>`;

  // ── Alertas ────────────────────────────────────────────────────
  const alertsHtml=`<div class="report-section">
    <h3>🔔 Alertas Individuais</h3>
    ${alerts.length?alerts.map(renderAlertCard).join(''):`<p style="color:#10b981;font-size:.84rem">Nenhum alerta para este aluno.</p>`}
  </div>`;

  // ── Diário de aula ──────────────────────────────────────────
  const logEntries=getStudentLog(studentName);
  const MONTHS2=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const fmtLD=d=>{if(!d)return'—';const p=d.split('-');return p.length===3?`${p[2]} ${MONTHS2[parseInt(p[1])-1]} ${p[0]}`:d;};
  const logHtml = logEntries.length ? `
  <div class="report-section">
    <h3 class="report-section-title">📓 Diário de Aula (${logEntries.length} registro${logEntries.length!==1?'s':''})</h3>
    ${logEntries.slice(0,10).map(e=>`
    <div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:13px 16px;margin-bottom:10px">
      <div style="font-size:.8rem;font-weight:800;color:#F57F17;margin-bottom:8px">${fmtLD(e.date)}</div>
      ${e.taught?`<div style="margin-bottom:6px"><span style="font-size:.68rem;font-weight:700;color:#1d4ed8;text-transform:uppercase">O que foi ensinado</span><div style="font-size:.84rem;color:#374151;margin-top:2px;line-height:1.6">${e.taught}</div></div>`:''}
      ${e.situ?`<div style="margin-bottom:6px"><span style="font-size:.68rem;font-weight:700;color:#059669;text-transform:uppercase">Situações reais</span><div style="font-size:.84rem;color:#374151;margin-top:2px;line-height:1.6">${e.situ}</div></div>`:''}
      ${e.erros?`<div style="margin-bottom:6px"><span style="font-size:.68rem;font-weight:700;color:#dc2626;text-transform:uppercase">Erros observados</span><div style="font-size:.84rem;color:#374151;margin-top:2px;line-height:1.6;background:#fff5f5;padding:6px 10px;border-radius:6px;border-left:3px solid #fca5a5">${e.erros}</div></div>`:''}
      ${e.obs?`<div><span style="font-size:.68rem;font-weight:700;color:#F57F17;text-transform:uppercase">Observações</span><div style="font-size:.84rem;color:#374151;margin-top:2px;line-height:1.6">${e.obs}</div></div>`:''}
    </div>`).join('')}
    ${logEntries.length>10?`<p style="font-size:.8rem;color:#9ca3af;text-align:center">Exibindo os 10 registros mais recentes de ${logEntries.length}.</p>`:''}
  </div>` : '';

  return `<div class="report-container">
    <div class="report-print-bar no-print">
      <button class="t-back-btn" onclick="showStudentDetail('${studentName}')">&#8592; Voltar</button>
      <span style="flex:1;font-size:.9rem;font-weight:700">Relatório — ${studentName}</span>
      <button class="report-print-btn" onclick="window.print()">🖨 Imprimir / Salvar PDF</button>
    </div>
    ${execHtml}${diagHtml}${skillHtml}${actionHtml}${planHtml}${problemHtml}${alertsHtml}${logHtml}
  </div>`;
}

function toggleExercises(id, btn){
  const el=document.getElementById(id);
  const open=el.classList.toggle('open');
  btn.innerHTML=open?'Ocultar exercicios &#9650;':'Ver exercicios &#9660;';
}

function saveTeacherNote(studentName, noteKey, lv, modIdx){
  const val=document.getElementById(`note_${lv}_${modIdx}`).value.trim();
  const notes=getTeacherNotes();
  if(!notes[studentName]) notes[studentName]={};
  notes[studentName][noteKey]={
    note: val,
    date: new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  saveTeacherNotes(notes);
  const label=document.getElementById(`note-saved-${lv}-${modIdx}`);
  label.style.display='block';
  setTimeout(()=>label.style.display='none', 2000);
}

/* ================================================================
   INIT — restaura sessao salva
================================================================ */
(function initSession(){
  const raw = localStorage.getItem('esp_session');
  if(!raw) return;
  try {
    const sess = JSON.parse(raw);
    if(sess && sess.type==='student' && sess.name){
      currentUser = sess;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('user-badge').textContent = currentUser.name;
      showHome();
    } else if(sess && sess.type==='teacher'){
      currentUser = sess;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('teacher-area').style.display='block';
      renderTeacherPanel();
    }
  } catch(e){ localStorage.removeItem('esp_session'); }
})();
</script>
